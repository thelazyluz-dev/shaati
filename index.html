function ShiftsList({shifts,cfg,als,onDelete,onEdit,privacyMode}){
  const uT=useT();
  const[cid,setCid]=useState(null);
  const[editShift,setEditShift]=useState(null);
  const wMap=buildWeeklyThresholdMap(shifts,cfg);
  const grp={};shifts.forEach(s=>{const ym=s.date.substring(0,7);if(!grp[ym])grp[ym]=[];grp[ym].push(s);});
  const months=Object.keys(grp).sort().reverse();
  return(
    <div style={{padding:"16px",paddingBottom:"20px"}}>
      {editShift&&<EditModal shift={editShift} cfg={cfg} als={als} shifts={shifts} onSave={s=>{onEdit(s);setEditShift(null);}} onClose={()=>setEditShift(null)}/>}
      <div style={{fontSize:"18px",fontWeight:"800",marginBottom:"20px",color:"var(--txt-hi)"}}>{uT("sl_title")}</div>
      {months.length===0&&(
        <div style={{textAlign:"center",padding:"60px 20px"}}>
          <div style={{fontSize:"52px",marginBottom:"14px"}}>📭</div>
          <div style={{fontSize:"16px",fontWeight:"800",color:"var(--txt-dd)",marginBottom:"6px"}}>{uT("sl_empty")}</div>
          <div style={{fontSize:"12px",color:"var(--divider2)"}}>{uT("sl_empty_hint")}</div>
        </div>
      )}
      {months.map((ym,mi)=>(
        <div key={ym} style={{marginBottom:"28px"}}>
          {mi>0&&<div style={{height:"2px",background:"linear-gradient(90deg,#22c55e44,#22c55e,#22c55e44)",borderRadius:"2px",margin:"0 0 20px"}}/>}
          <div style={{background:"linear-gradient(135deg,#052e16,#0a3a1a)",border:"1px solid #166534",borderRadius:"12px",padding:"10px 14px",marginBottom:"12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:"15px",fontWeight:"900",color:"#4ade80"}}>📅 {mLbl(ym,uT("locale"))}</span>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <button onClick={()=>{const sorted=[...grp[ym]].sort((a,b)=>a.date.localeCompare(b.date));const html=generateMonthExportHTML(ym,sorted,cfg,als,wMap,uT);const w=window.open("","_blank");if(w){w.document.write(html);w.document.close();}}} style={{background:"#0c2a4a",border:"1px solid #3b82f6",color:"#93c5fd",borderRadius:"6px",padding:"3px 8px",cursor:"pointer",fontSize:"13px",fontWeight:"700",lineHeight:1}} title={uT("ex_title")}>{uT("ex_btn")}</button>
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:"13px",fontWeight:"800",color:"#4ade80"}}>{prv(grp[ym].reduce((acc,s)=>acc+getShiftTotal(s,cfg,als,wMap[s.id]),0)+cma(als),privacyMode)}</div>
                <div style={{fontSize:"10px",color:"#4ade8066"}}>{grp[ym].length} {uT("d_shifts")}</div>
              </div>
            </div>
          </div>
          {[...grp[ym]].sort((a,b)=>b.date.localeCompare(a.date)).map(s=>{
            const h=ch(s.start,s.end);
            const c=getShiftPay(s,cfg,wMap[s.id]);
            const isSpec=isSpecialDay(s.type);
            const spec=isSpec?SPECIAL[s.type]:null;
            const t=isSpec?spec:ST[s.type];
            const sa=isSpec?0:csa(s.allowanceIds||[],als);
            const holiday=IL_HOLIDAYS[s.date];
            return(
              <div key={s.id} style={{...CARD,marginBottom:"8px",borderRight:isSpec?`3px solid ${t.color}`:"none"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
                      <div style={{fontSize:"14px",fontWeight:"700",color:"var(--txt)"}}>{t.icon} {fD(s.date,uT("locale"))}</div>
                      {holiday&&<span style={{fontSize:"10px",color:"#fcd34d",fontWeight:"700"}}>{holiday.icon} {holiday.name}</span>}
                    </div>
                    <div style={{fontSize:"12px",color:"var(--txt-d)",marginTop:"3px"}}>{s.start}–{s.end} · {fH(h)}{uT("hr")}</div>
                    <div style={{marginTop:"6px",display:"flex",gap:"6px",flexWrap:"wrap"}}>
                      <span style={{background:t.bg,color:t.color,fontSize:"11px",padding:"2px 8px",borderRadius:"6px",fontWeight:"700"}}>
                        {isSpec?uT("sp_"+s.type+"_lbl"):`${uT("st_"+s.type)} ${Math.round(ST[s.type].mult*100)}%`}
                      </span>
                      {!isSpec&&c.ot125H>0&&<span style={{background:"#2d0505",color:"#f87171",fontSize:"11px",padding:"2px 8px",borderRadius:"6px",fontWeight:"700"}}>+{fH(c.ot125H)}{uT("hr")} ×{Math.round(ST[s.type].mult*125)}%</span>}
                      {!isSpec&&c.ot150H>0&&<span style={{background:"#2d0505",color:"#ef4444",fontSize:"11px",padding:"2px 8px",borderRadius:"6px",fontWeight:"700"}}>+{fH(c.ot150H)}{uT("hr")} ×{Math.round(ST[s.type].mult*150)}%</span>}
                      {sa>0&&<span style={{background:"#022c22",color:"#34d399",fontSize:"11px",padding:"2px 8px",borderRadius:"6px",fontWeight:"700"}}>🧾 {prv(sa,privacyMode)}</span>}
                    </div>
                    {s.note&&<div style={{fontSize:"11px",color:"var(--txt-dd)",marginTop:"4px"}}>📝 {s.note}</div>}
                  </div>
                  <div style={{textAlign:"left",marginRight:"6px",flexShrink:0}}>
                    <div style={{fontWeight:"800",color:isSpec?t.color:"#4ade80",fontSize:"16px"}}>{prv(c.gross+sa,privacyMode)}</div>
                    <div style={{display:"flex",gap:"4px",marginTop:"6px",justifyContent:"flex-end"}}>
                      <button onClick={()=>setEditShift(s)} style={{background:"#1e3a5f",border:"none",color:"#60a5fa",borderRadius:"6px",padding:"3px 8px",cursor:"pointer",fontSize:"12px",fontWeight:"700"}}>✏️</button>
                      {cid===s.id?(
                        <>
                          <button onClick={()=>{onDelete(s.id);setCid(null);}} style={{background:"#7f1d1d",border:"none",color:"#f87171",borderRadius:"6px",padding:"3px 8px",cursor:"pointer",fontSize:"12px"}}>{uT("sl_delete")}</button>
                          <button onClick={()=>setCid(null)} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"6px",padding:"3px 8px",cursor:"pointer",fontSize:"12px"}}>{uT("sl_cancel")}</button>
                        </>
                      ):(
                        <button onClick={()=>setCid(s.id)} style={{background:"#2d0505",border:"none",color:"#f87171",borderRadius:"6px",padding:"3px 8px",cursor:"pointer",fontSize:"12px",fontWeight:"700"}}>🗑</button>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ANNUAL GRAPH
// ════════════════════════════════════════
function Graph({shifts,cfg,als,privacyMode,manualMonths,onSaveManual}){
  const uT=useT();
  const[selBar,setSelBar]=useState(null);
  const[viewYear,setViewYear]=useState(()=>new Date().getFullYear());
  const[editingManual,setEditingManual]=useState(null);
  const[manualInput,setManualInput]=useState("");
  const loc=uT("locale");
  const MN=Array.from({length:12},(_,i)=>new Date(2024,i,1).toLocaleDateString(loc,{month:"short"}));
  const MNF=Array.from({length:12},(_,i)=>new Date(2024,i,1).toLocaleDateString(loc,{month:"long"}));

  const wMap=buildWeeklyThresholdMap(shifts,cfg);
  const months=Array.from({length:12},(_,i)=>{
    const ym=`${viewYear}-${String(i+1).padStart(2,"0")}`;
    const ms=shifts.filter(s=>s.date.startsWith(ym));
    let gross=0,hours=0,allow=0,count=0,workCount=0,baseS=0;
    ms.forEach(s=>{
      const c=getShiftPay(s,cfg,wMap[s.id]);
      const sa=isSpecialDay(s.type)?0:csa(s.allowanceIds||[],als);
      gross+=c.gross;allow+=sa;count++;
      if(!isSpecialDay(s.type)){hours+=ch(s.start,s.end);workCount++;}
      const baseMult=isSpecialDay(s.type)?1:(s.customMult?s.customMult/100:(ST[s.type]?.mult||1));
      baseS+=(c.regH||0)*cfg.baseRate*baseMult;
    });
    if(count>0) allow+=cma(als);
    const total=gross+allow;
    const ded=cfg.enableDeductions&&total>0?cd(total,cfg,baseS):null;
    const net=ded?total-ded.tot:total;
    const manualEntry=(manualMonths||{})[ym];
    const isManual=count===0&&!!manualEntry;
    return{ym,i,label:MN[i],labelFull:MNF[i],gross,allow,net:count>0?net:(manualEntry?manualEntry.net:0),hours,count,workCount,isManual};
  });

  const curMonth=new Date().getMonth();
  const curYear=new Date().getFullYear();
  const withData=months.filter(m=>m.count>0||m.isManual);
  const maxNet=Math.max(...months.map(m=>m.net),1);
  const avgData=withData.filter(m=>viewYear<curYear||m.i<curMonth);
  const avgNet=(avgData.length?avgData:withData).reduce((s,m)=>s+m.net,0)/Math.max(1,avgData.length||withData.length);
  const peakIdx=months.reduce((a,b)=>a.net>b.net?a:b).i;
  const lowIdx=withData.length?withData.reduce((a,b)=>a.net<b.net?a:b).i:-1;
  const totalYear=withData.reduce((s,m)=>s+m.net,0);
  const totalHours=withData.reduce((s,m)=>s+m.hours,0);

  if(withData.length===0){
    return(
      <div style={{padding:"16px",paddingBottom:"20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
          <button onClick={()=>setViewYear(y=>y-1)} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"9px",width:"36px",height:"36px",fontSize:"20px",cursor:"pointer"}}>‹</button>
          <div style={{fontSize:"18px",fontWeight:"800",color:"var(--txt-hi)"}}>📈 {viewYear}</div>
          <button onClick={()=>setViewYear(y=>y+1)} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"9px",width:"36px",height:"36px",fontSize:"20px",cursor:"pointer"}}>›</button>
        </div>
        <div style={{textAlign:"center",color:"var(--divider2)",padding:"60px 0"}}>
          <div style={{fontSize:"40px",marginBottom:"12px"}}>📊</div>
          <div>{uT("gr_no_data")}</div>
        </div>
      </div>
    );
  }

  const selData=selBar!==null?months[selBar]:null;

  return(
    <div style={{padding:"16px",paddingBottom:"20px"}}>
      {/* Year nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
        <button onClick={()=>{setViewYear(y=>y-1);setSelBar(null);setEditingManual(null);}} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"9px",width:"36px",height:"36px",fontSize:"20px",cursor:"pointer"}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:"18px",fontWeight:"800",color:"var(--txt-hi)"}}>📈 {viewYear}</div>
          {viewYear===curYear&&<div style={{fontSize:"11px",color:"#22c55e",marginTop:"2px"}}>{uT("gr_cur_year")}</div>}
        </div>
        <button onClick={()=>{setViewYear(y=>y+1);setSelBar(null);setEditingManual(null);}} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"9px",width:"36px",height:"36px",fontSize:"20px",cursor:"pointer"}}>›</button>
      </div>

// VACATION BALANCE (in Settings)
// ════════════════════════════════════════
function VacationBalance({shifts,vacCfg,onSaveVacCfg}){
  const uT=useT();
  const[form,setForm]=useState({...vacCfg});
  const[saved,setSaved]=useState(false);

  const vacUsed=shifts.filter(s=>s.type==="vacation").length;
  const sickUsed=shifts.filter(s=>["sick_1","sick_23","sick_4p"].includes(s.type)).length;

  // Accrue only from payslip date forward (user's current balance already includes everything before)
  const now=new Date();
  const monthsSincePayslip=form.payslipDate?(
    Math.max(0,
      (now.getFullYear()-parseInt(form.payslipDate.split("-")[0]))*12+
      (now.getMonth()-(parseInt(form.payslipDate.split("-")[1])-1))
    )
  ):0;
  const vacAccrued=Math.floor(monthsSincePayslip*(form.accrualPerMonth||1.5)*10)/10;
  const sickAccrued=Math.floor(monthsSincePayslip*1.5*10)/10;

  // Balance = payslip balance + accrued since payslip - used in app
  const vacBalance=Math.max(0,(form.currentBalance||0)+vacAccrued-vacUsed);
  const sickBalance=Math.max(0,(form.sickBalance||0)+sickAccrued-sickUsed);

  const save=()=>{onSaveVacCfg(form);setSaved(true);setTimeout(()=>setSaved(false),2000);};

  return(
    <div>
      {/* Balance display */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"16px"}}>
        <div style={{background:"linear-gradient(145deg,#0c1a3e,#1e3a8a)",border:"1px solid #1e40af",borderRadius:"14px",padding:"14px",textAlign:"center"}}>
          <div style={{fontSize:"11px",color:"#93c5fd",marginBottom:"6px",fontWeight:"700"}}>{uT("vac_days_vac")}</div>
          <div style={{fontSize:"30px",fontWeight:"900",color:"#60a5fa"}}>{vacBalance.toFixed(1)}</div>
          <div style={{fontSize:"10px",color:"#3b82f6",marginTop:"4px"}}>
            {vacUsed>0?`${vacUsed} ${uT("vac_used")} · `:""}
            {vacAccrued>0?`+${vacAccrued.toFixed(1)} ${uT("vac_accrued")}`:""}
          </div>
        </div>
        <div style={{background:"linear-gradient(145deg,#1a0c3e,#3b1d8a)",border:"1px solid #5b21b6",borderRadius:"14px",padding:"14px",textAlign:"center"}}>
          <div style={{fontSize:"11px",color:"#c4b5fd",marginBottom:"6px",fontWeight:"700"}}>{uT("vac_days_sick")}</div>
          <div style={{fontSize:"30px",fontWeight:"900",color:"#a78bfa"}}>{sickBalance.toFixed(1)}</div>
          <div style={{fontSize:"10px",color:"#7c3aed",marginTop:"4px"}}>
            {sickUsed>0?`${sickUsed} ${uT("vac_used")} · `:""}
            {sickAccrued>0?`+${sickAccrued.toFixed(1)} ${uT("vac_accrued")}`:""}
          </div>
        </div>
      </div>

      {/* Settings */}
      <div style={CARD}>
        <div style={SEC}>{uT("vac_settings")}</div>

        {/* Info box */}
        <div style={{background:"var(--bg2)",border:"1px solid #1f2937",borderRadius:"10px",padding:"12px",marginBottom:"16px"}}>
          <div style={{fontSize:"12px",color:"#60a5fa",fontWeight:"700",marginBottom:"6px"}}>{uT("vac_how")}</div>
          <div style={{fontSize:"11px",color:"var(--txt-d)",lineHeight:"1.7"}}>
            {uT("vac_how_desc_1")} <span style={{color:"var(--txt)",fontWeight:"700"}}>{uT("vac_how_desc_2")}</span> {uT("vac_how_desc_3")} <span style={{color:"var(--txt)",fontWeight:"700"}}>{uT("vac_how_desc_4")}</span>.<br/>
            {uT("vac_how_desc_5")}
          </div>
        </div>

        {/* Payslip date */}
        <Field label={uT("vac_payslip_date")}>
          <input type="date" value={form.payslipDate||""} onChange={e=>setForm({...form,payslipDate:e.target.value})} style={SI}/>
        </Field>

        {/* Vacation section */}
        <div style={{background:"#0c1a3e33",border:"1px solid #1e3a8a",borderRadius:"10px",padding:"12px",marginBottom:"12px"}}>
          <div style={{fontSize:"11px",color:"#93c5fd",fontWeight:"700",marginBottom:"10px"}}>{uT("vac_annual_vac")}</div>
          <Field label={uT("vac_bal_label")}>
            <NumInput value={form.currentBalance||0} onChange={v=>setForm({...form,currentBalance:v})} step={0.5}/>
          </Field>
          <Field label={uT("vac_accrual")} hint={uT("vac_accrual_h")}>
            <NumInput value={form.accrualPerMonth||1.5} onChange={v=>setForm({...form,accrualPerMonth:v})} step={0.5}/>
          </Field>
          {monthsSincePayslip>0&&<div style={{fontSize:"11px",color:"#3b82f6",marginTop:"4px"}}>{monthsSincePayslip} {uT("vac_months_ago")}{vacAccrued.toFixed(1)} {uT("vac_days_accr")}</div>}
        </div>

        {/* Sick section */}
        <div style={{background:"#1a0c3e33",border:"1px solid #5b21b6",borderRadius:"10px",padding:"12px",marginBottom:"16px"}}>
          <div style={{fontSize:"11px",color:"#c4b5fd",fontWeight:"700",marginBottom:"10px"}}>{uT("vac_sick_title")}</div>
          <Field label={uT("vac_bal_label")}>
            <NumInput value={form.sickBalance||0} onChange={v=>setForm({...form,sickBalance:v})} step={0.5}/>
          </Field>
          <div style={{fontSize:"11px",color:"var(--txt-d)",marginTop:"4px"}}>{uT("vac_sick_fixed")}</div>
          {monthsSincePayslip>0&&<div style={{fontSize:"11px",color:"#7c3aed",marginTop:"4px"}}>+{sickAccrued.toFixed(1)} {uT("vac_days_since")}</div>}
        </div>

        <button onClick={save} style={{width:"100%",padding:"13px",background:saved?"#15803d":"#22c55e",border:"none",borderRadius:"12px",color:saved?"#dcfce7":"#000",fontSize:"14px",fontWeight:"800",cursor:"pointer"}}>
          {saved?uT("vac_saved"):uT("vac_save")}
        </button>
      </div>
    </div>
  );
}

// AUTO-CALC NI + HEALTH INSURANCE
// ════════════════════════════════════════
function calcNIRates(grossSalary){
  // 2026 thresholds (official btl.gov.il)
  const LOW_THRESH = 7703;
  const NI_LOW = 1.04, NI_HIGH = 7.00;
  const HEALTH_LOW = 3.23, HEALTH_HIGH = 5.17;
  const low = Math.min(grossSalary, LOW_THRESH);
  const high = Math.max(0, grossSalary - LOW_THRESH);
  const niTotal = (low*NI_LOW + high*NI_HIGH) / 100;
  const healthTotal = (low*HEALTH_LOW + high*HEALTH_HIGH) / 100;
  const niPct = Math.round((niTotal/grossSalary)*1000)/10;
  const healthPct = Math.round((healthTotal/grossSalary)*1000)/10;
  return {niPct, healthPct, niTotal, healthTotal};
}

function AutoCalcNI({form,setForm}){
  const uT=useT();
  const[show,setShow]=useState(false);
  const[salary,setSalary]=useState(form.baseRate*190||0);
  const[result,setResult]=useState(null);

  const calc=()=>{
    if(!salary||salary<=0) return;
    const r=calcNIRates(salary);
    setResult(r);
  };

  const apply=()=>{
    if(!result) return;
    setForm(f=>({...f,
      bituachLeumi:Math.round(result.niPct*10)/10,
      masBriut:Math.round(result.healthPct*10)/10,
    }));
    setShow(false);
    setResult(null);
  };

  return(
    <div style={{...CARD,marginBottom:"12px",background:"#0a1628",border:"1px solid #1e3a5f"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:"13px",fontWeight:"700",color:"#60a5fa"}}>{uT("ni_title")}</div>
          <div style={{fontSize:"11px",color:"var(--txt-dd)",marginTop:"2px"}}>{uT("ni_desc")}</div>
        </div>
        <button onClick={()=>setShow(!show)} style={{background:"#1e3a5f",border:"none",color:"#93c5fd",borderRadius:"8px",padding:"6px 12px",cursor:"pointer",fontWeight:"700",fontSize:"12px"}}>
          {show?uT("ni_close"):uT("ni_open")}
        </button>
      </div>

      {show&&(
        <div style={{marginTop:"14px"}}>
          <div style={{fontSize:"11px",color:"var(--txt-d)",marginBottom:"6px",lineHeight:"1.6"}}>
            {uT("ni_hint")}
          </div>
          <Field label={uT("ni_salary")}>
            <NumInput value={salary} onChange={v=>setSalary(v)} step={100}/>
          </Field>
          <button onClick={calc} style={{width:"100%",padding:"11px",background:"#1e3a8a",border:"none",borderRadius:"10px",color:"#93c5fd",fontWeight:"800",fontSize:"14px",cursor:"pointer",marginBottom:"12px"}}>
            {uT("ni_calc")}
          </button>

          {result&&(
            <div style={{background:"var(--bg2)",borderRadius:"10px",padding:"12px",marginBottom:"12px"}}>
              <div style={{fontSize:"11px",color:"var(--txt-d)",marginBottom:"10px"}}>{uT("ni_result_pfx")} {fM(salary)}:</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
                <div style={{background:"#0c1a3e",borderRadius:"8px",padding:"10px",textAlign:"center"}}>
                  <div style={{fontSize:"10px",color:"#93c5fd",marginBottom:"4px"}}>{uT("ni_ni")}</div>
                  <div style={{fontSize:"20px",fontWeight:"900",color:"#60a5fa"}}>{result.niPct}%</div>
                  <div style={{fontSize:"10px",color:"var(--divider2)",marginTop:"2px"}}>{fM(result.niTotal)}{uT("ni_per_month")}</div>
                </div>
                <div style={{background:"#1a0c3e",borderRadius:"8px",padding:"10px",textAlign:"center"}}>
                  <div style={{fontSize:"10px",color:"#c4b5fd",marginBottom:"4px"}}>{uT("ni_health")}</div>
                  <div style={{fontSize:"20px",fontWeight:"900",color:"#a78bfa"}}>{result.healthPct}%</div>
                  <div style={{fontSize:"10px",color:"var(--divider2)",marginTop:"2px"}}>{fM(result.healthTotal)}{uT("ni_per_month")}</div>
                </div>
              </div>
              <div style={{fontSize:"10px",color:"var(--txt-dd)",marginBottom:"10px",lineHeight:"1.5"}}>
                {uT("ni_footnote")}
              </div>
              <button onClick={apply} style={{width:"100%",padding:"11px",background:"#22c55e",border:"none",borderRadius:"10px",color:"#000",fontWeight:"800",fontSize:"14px",cursor:"pointer"}}>
                {uT("ni_apply")}
              </button>
            </div>
          )}

          {/* Reference table */}
          <div style={{fontSize:"11px",color:"var(--txt-dd)",marginBottom:"6px",fontWeight:"700"}}>{uT("ni_ref_table")}</div>
          <div style={{borderRadius:"8px",overflow:"hidden",border:"1px solid #1f2937"}}>
            {[6000,8000,10000,12000,15000].map((s,i)=>{
              const r=calcNIRates(s);
              return(
              <div key={i} onClick={()=>{setSalary(s);setResult(calcNIRates(s));}}
                style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",background:i%2===0?"var(--bg2)":"var(--card)",cursor:"pointer",fontSize:"11px"}}>
                <span style={{color:"var(--txt-m)"}}>{fM(s)}</span>
                <span style={{color:"#60a5fa"}}>{uT("ni_bl")} {r.niPct}%</span>

// ── Income Tax Helper ──
function IncomeTaxHelper({form,setForm}){
  const uT=useT();
  const[show,setShow]=useState(false);
  const POINTS=[
    {l:uT("tx_pt0"),v:2.25,desc:uT("tx_pt0d")},
    {l:uT("tx_pt1"),v:0.5,desc:uT("tx_pt1d")},
    {l:uT("tx_pt2"),v:2.5,desc:uT("tx_pt2d")},
    {l:uT("tx_pt3"),v:2.0,desc:uT("tx_pt3d")},
    {l:uT("tx_pt4"),v:1.0,desc:uT("tx_pt4d")},
    {l:uT("tx_pt5"),v:1.0,desc:uT("tx_pt5d")},
  ];
  const POINT_VALUE=242; // ₪ per month per point (2025)

  const [points,setPoints]=useState(form.taxRate===0?2.25:2.25);

  const calcTax=(gross,pts)=>{
    // Simplified marginal tax calculation
    const credit=pts*POINT_VALUE;
    let tax=0;
    const brackets=[[6790,0.10],[9730,0.14],[15620,0.20],[21670,0.31],[44190,0.35],[56190,0.47],[Infinity,0.50]];
    let remaining=gross;
    let prev=0;
    for(const[top,rate] of brackets){
      const chunk=Math.min(remaining,top-prev);
      if(chunk<=0) break;
      tax+=chunk*rate;
      remaining-=chunk;
      prev=top;
      if(remaining<=0) break;
    }
    const netTax=Math.max(0,tax-credit);
    const pct=gross>0?Math.round((netTax/gross)*1000)/10:0;
    return{netTax,pct};
  };

  const gross=form.baseRate*(form.overtimeThreshold||8.6)*22;
  const result=calcTax(gross,points);

  return(
    <div style={{background:"#1a1000",border:"1px solid #92400e",borderRadius:"10px",padding:"12px",marginBottom:"14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:"12px",fontWeight:"700",color:"#fbbf24"}}>{uT("tx_title")}</div>
          <div style={{fontSize:"11px",color:"var(--txt-dd)",marginTop:"2px"}}>{uT("tx_desc")}</div>
        </div>
        <button onClick={()=>setShow(!show)} style={{background:"#2a1800",border:"none",color:"#fbbf24",borderRadius:"8px",padding:"5px 10px",cursor:"pointer",fontSize:"12px",fontWeight:"700"}}>
          {show?uT("tx_close"):uT("tx_open")}
        </button>
      </div>

      {show&&(
        <div style={{marginTop:"12px"}}>
          <div style={{fontSize:"11px",color:"var(--txt-d)",lineHeight:"1.7",marginBottom:"12px"}}>
            {uT("tx_hint_1")}<span style={{color:"#fbbf24",fontWeight:"700"}}>{uT("tx_hint_pts")}</span>{uT("tx_hint_2")}₪{POINT_VALUE}{uT("tx_hint_3")}<br/>
            <span style={{color:"#22c55e"}}>{uT("tx_hint_tip")}</span>
          </div>

          <div style={{fontSize:"11px",color:"#fbbf24",fontWeight:"700",marginBottom:"8px"}}>{uT("tx_pts_title")}</div>
          {POINTS.map((p,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #2a1800",fontSize:"11px"}}>
              <span style={{color:"var(--txt)"}}>{p.l}</span>
              <span style={{color:"#fbbf24",fontWeight:"700"}}>+{p.v} {uT("tx_pts_sfx")}</span>
            </div>
          ))}

          <div style={{marginTop:"12px",background:"var(--bg2)",borderRadius:"8px",padding:"10px"}}>
            <div style={{fontSize:"11px",color:"var(--txt-d)",marginBottom:"6px"}}>{uT("tx_estimate_pfx")}{fM(Math.round(gross))}{uT("tx_estimate_sfx")}</div>
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
              <span style={{fontSize:"11px",color:"var(--txt-m)"}}>{uT("tx_pts_lbl")}</span>
              <NumInput value={points} onChange={v=>setPoints(v)} step={0.25} style={{...SI,width:"80px"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",background:"var(--card)",borderRadius:"6px",padding:"8px",marginBottom:"10px"}}>
              <span style={{fontSize:"11px",color:"var(--txt-d)"}}>{uT("tx_estimated")}</span>
              <span style={{fontSize:"14px",fontWeight:"800",color:result.pct===0?"#22c55e":"#f87171"}}>
                {result.pct===0?uT("tx_exempt"):`${result.pct}% · ${fM(result.netTax)}${uT("tx_per_month")}`}
              </span>
            </div>
            <button onClick={()=>{setForm(f=>({...f,taxRate:result.pct}));setShow(false);}}
              style={{width:"100%",padding:"9px",background:"#92400e",border:"none",borderRadius:"8px",color:"#fde68a",fontWeight:"800",fontSize:"13px",cursor:"pointer"}}>
              {uT("tx_apply_pfx")}{result.pct}{uT("tx_apply_sfx")}
            </button>
          </div>

          <div style={{marginTop:"10px",fontSize:"10px",color:"var(--divider2)",lineHeight:"1.6"}}>
            {uT("tx_warning")}
          </div>
        </div>
      )}
    </div>
  );
}

                <div style={LBL}>{uT("sg_custom_pct")}</div>
                <button onClick={()=>setNewT({...newT,customMult:newT.customMult===null?ST[newT.type].mult*100:null})}
                  style={{background:newT.customMult!==null?"#052e16":"var(--divider)",border:`1.5px solid ${newT.customMult!==null?"#22c55e":"var(--divider2)"}`,color:newT.customMult!==null?"#22c55e":"var(--txt-d)",borderRadius:"20px",padding:"3px 12px",cursor:"pointer",fontWeight:"700",fontSize:"12px"}}>
                  {newT.customMult!==null?uT("sg_custom_on"):uT("sg_default")}
                </button>
              </div>
              {newT.customMult===null?(
                <div style={{fontSize:"12px",color:"var(--txt-dd)"}}>
                  {uT("sg_using_pct")}&nbsp;
                  <span style={{color:ST[newT.type].color,fontWeight:"700"}}>{Math.round(ST[newT.type].mult*100)}%</span>
                </div>
              ):(
                <>
                  <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                    <input type="number" step="1" min="100" max="300" value={newT.customMult}
                      onChange={e=>setNewT({...newT,customMult:parseFloat(e.target.value)||100})}
                      style={{...SI,flex:1}}
                    />
                    <span style={{color:"var(--txt)",fontWeight:"800",fontSize:"18px"}}>%</span>
                  </div>
                  <div style={{fontSize:"11px",color:"var(--txt-dd)",marginTop:"6px"}}>
                    {uT("sg_pct_hint")}
                  </div>
                  <div style={{marginTop:"8px",display:"flex",gap:"6px",flexWrap:"wrap"}}>
                    {[{l:"100%",v:100},{l:"117%",v:117},{l:"125%",v:125},{l:"133%",v:133},{l:"140%",v:140},{l:"150%",v:150},{l:"175%",v:175}].map(p=>(
                      <button key={p.v} onClick={()=>setNewT({...newT,customMult:p.v})}
                        style={{padding:"5px 10px",borderRadius:"8px",cursor:"pointer",fontWeight:"700",fontSize:"12px",
                          background:newT.customMult===p.v?"#1e3a5f":"var(--bg2)",
                          color:newT.customMult===p.v?"#60a5fa":"var(--txt-d)",
                          border:`1px solid ${newT.customMult===p.v?"#60a5fa":"var(--divider)"}`}}>
                        {p.l}
                      </button>
                    ))}
                  </div>
                </>
              )}
            </div>
            <Field label={uT("sg_emoji")}>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                {["⭐","🔵","🟡","🔴","🟢","💜","🏃","🌟","⚡","🎯","💼","🔥","🌙","☀️","🌤️"].map(e=>(
                  <button key={e} onClick={()=>setNewT({...newT,emoji:e})} style={{padding:"8px",borderRadius:"8px",cursor:"pointer",border:newT.emoji===e?"2px solid #22c55e":"2px solid #1f2937",background:newT.emoji===e?"#052e16":"var(--bg2)",fontSize:"18px"}}>
                    {e}
                  </button>
                ))}
              </div>
            </Field>
            <Field label={uT("sg_color")}>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                {["#22c55e","#60a5fa","#f87171","#fbbf24","#a78bfa","#34d399","#fb923c","#e879f9","#38bdf8","#4ade80"].map(c=>(
                  <button key={c} onClick={()=>setNewT({...newT,color:c})} style={{width:"32px",height:"32px",borderRadius:"50%",cursor:"pointer",background:c,border:newT.color===c?"3px solid #fff":"3px solid transparent",outline:newT.color===c?"2px solid "+c:"none",outlineOffset:"2px"}}>
                  </button>
                ))}
              </div>
            </Field>
            {/* Preview */}
            {newT.name&&(
              <div style={{background:newT.color+"15",border:`1px solid ${newT.color}44`,borderRadius:"10px",padding:"10px 12px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"8px"}}>
                <span style={{fontSize:"18px"}}>{newT.emoji}</span>
                <div>
                  <div style={{fontWeight:"800",color:newT.color,fontSize:"13px"}}>{newT.name}</div>
                  {newT.start&&newT.end&&<div style={{fontSize:"11px",color:"var(--txt-d)"}}>{newT.start}–{newT.end}</div>}
                </div>
              </div>
            )}
            {tErr&&<div style={{color:"#f87171",fontSize:"12px",marginBottom:"8px"}}>⚠ {tErr}</div>}
            <Btn onClick={addT} color="#1e3a8a" textColor="#93c5fd" style={{fontSize:"14px"}}>{uT("sg_add_tpl")}</Btn>
          </div>
        </>
      )}

      {(sub==="pay"||sub==="ded")&&<Btn onClick={save} color={saved?"#15803d":"#22c55e"} textColor={saved?"#dcfce7":"#000"} style={{marginTop:"16px"}}>{saved?uT("sg_saved"):uT("sg_save")}</Btn>}

      {sub==="pay"&&onReset&&(
        <>
          {/* Theme selector */}
          {onSaveTheme&&(
            <div style={{...CARD,marginTop:"16px",background:"var(--bg2)",border:"1px solid #1f2937"}}>
              <div style={{fontSize:"12px",color:"var(--txt-d)",fontWeight:"700",marginBottom:"10px"}}>{uT("sg_theme")}</div>
              <div style={{display:"flex",gap:"8px"}}>
                {[{v:"dark",label:uT("sg_theme_dark")},{v:"light",label:uT("sg_theme_light")}].map(opt=>(
                  <button key={opt.v} onClick={()=>onSaveTheme(opt.v)}
                    style={{flex:1,padding:"10px",borderRadius:"12px",cursor:"pointer",fontWeight:"800",fontSize:"14px",
                      background:theme===opt.v?"#1e3a5f":"var(--card)",
                      color:theme===opt.v?"#60a5fa":"var(--txt-dd)",
                      border:`2px solid ${theme===opt.v?"#3b82f6":"var(--divider)"}`,
                      transition:"all 0.2s ease"}}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>
          )}
          {/* Privacy mode setting */}
          <div style={{...CARD,marginTop:"16px",background:"var(--bg2)",border:"1px solid #1f2937"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:"13px",fontWeight:"700",color:"var(--txt)"}}>
                  {privacyMode?"🙈":"👁"} {uT("sg_privacy")}
                </div>
                <div style={{fontSize:"11px",color:"var(--txt-dd)",marginTop:"2px"}}>
                  {uT("sg_privacy_h")}
                </div>
              </div>
              <Toggle on={privacyMode} onToggle={togglePrivacy}/>
            </div>
          </div>
          <InstallSettingsBtn/>
          <button onClick={()=>{if(window.confirm(uT("sg_reset_c")))onReset();}}
            style={{width:"100%",padding:"12px",background:"none",border:"1px solid #1f2937",borderRadius:"12px",color:"var(--txt-dd)",fontSize:"13px",fontWeight:"700",cursor:"pointer",marginTop:"10px"}}>
            {uT("sg_reset")}
          </button>
        </>
      )}

      {sub==="vac"&&<VacationBalance shifts={shifts} vacCfg={vacCfg} onSaveVacCfg={onSaveVacCfg}/>}
    </div>
  );
}

// ════════════════════════════════════════
// ONBOARDING WIZARD
// ════════════════════════════════════════
function Onboarding({onDone,lang="he",setLang,theme="dark",setTheme}){
  const t=useT();
  const[step,setStep]=useState(0);
  const[form,setForm]=useState({...DEF_CFG});
  const[salary,setSalary]=useState(()=>Math.round(DEF_CFG.baseRate*190));
  const[niResult,setNiResult]=useState(null);
  const[animDir,setAnimDir]=useState("right");
  const[als,setAls]=useState([]);
  const[newAl,setNewAl]=useState({name:"",type:"per_shift",amount:""});
  const[alErr,setAlErr]=useState("");
  const contentRef=useRef(null);

  const STEPS=[
    {title:t("ob_s0t"),subtitle:t("ob_s0s")},
    {title:t("ob_s1t"),subtitle:t("ob_s1s")},
    {title:t("ob_s2_shifts_t"),subtitle:t("ob_s2_shifts_s")},
    {title:t("ob_s2t"),subtitle:t("ob_s2s")},
    {title:t("ob_s3t"),subtitle:t("ob_s3s")},
    {title:t("ob_s4t"),subtitle:t("ob_s4s")},
    {title:t("ob_s5t"),subtitle:t("ob_s5s")},
  ];

  const go=(dir)=>{
    setAnimDir(dir>0?"right":"left");
    setStep(s=>s+dir);
    setTimeout(()=>{if(contentRef.current)contentRef.current.scrollTop=0;},30);
  };

  const calcNI=()=>{
    const s=salary>0?salary:Math.round(form.baseRate*190);
    const r=calcNIRates(s);
    setNiResult(r);
    setForm(f=>({...f,
      bituachLeumi:Math.round(r.niPct*10)/10,
      masBriut:Math.round(r.healthPct*10)/10,
    }));
  };

  const addAl=()=>{
    if(!newAl.name.trim()){setAlErr(t("sg_al_err_n"));return;}
    const amt=parseFloat(newAl.amount);
    if(!amt||amt<=0){setAlErr(t("sg_al_err_a"));return;}
    setAlErr("");
    setAls(a=>[...a,{...newAl,amount:amt,id:Date.now(),active:true}]);
    setNewAl({name:"",type:"per_shift",amount:""});
  };

  const finish=()=>{
    onDone(form,als);
  };

  const progress=step/(STEPS.length-1);

  return(
    <div dir={lang==="ru"?"ltr":"rtl"} style={{
      fontFamily:"'Heebo','Arial Hebrew',Arial,sans-serif",
      height:"100%",background:"var(--bg)",color:"var(--txt)",
      display:"flex",flexDirection:"column",maxWidth:"430px",margin:"0 auto",
    }}>
      {/* Header */}
      <div style={{padding:"env(safe-area-inset-top,28px) 20px 0",background:"var(--bg)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
          <div style={{fontSize:"17px",fontWeight:"900",color:"var(--txt-hi)"}}>שעתי ⏱</div>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            {step>0&&step<STEPS.length-1&&(
            <button onClick={finish} style={{background:"none",border:"none",color:"var(--txt-dd)",fontSize:"12px",cursor:"pointer",fontWeight:"700"}}>
              {t("ob_skip")}
            </button>
            )}
          </div>
        </div>
        {/* Progress bar */}
        <div style={{height:"4px",background:"var(--divider)",borderRadius:"2px",marginBottom:"20px"}}>
          <div style={{height:"100%",width:`${progress*100}%`,background:"linear-gradient(90deg,#22c55e,#4ade80)",borderRadius:"2px",transition:"width 0.4s ease"}}/>
        </div>
        {/* Steps dots */}
        <div style={{display:"flex",justifyContent:"center",gap:"8px",marginBottom:"24px"}}>
          {STEPS.map((_,i)=>(
            <div key={i} style={{width:i===step?20:8,height:"8px",borderRadius:"4px",background:i<=step?"#22c55e":"var(--divider)",transition:"all 0.3s ease"}}/>
          ))}
        </div>
      </div>

      {/* Content */}
      <div ref={contentRef} style={{flex:1,padding:"0 20px",overflowY:"auto"}}>
        <div style={{animation:`${animDir==="right"?"slideInRight":"slideInLeft"} 0.25s ease-out`}}>
          <div style={{marginBottom:"24px"}}>
            <div style={{fontSize:"22px",fontWeight:"900",color:"var(--txt-hi)",marginBottom:"6px"}}>{STEPS[step].title}</div>
            <div style={{fontSize:"13px",color:"var(--txt-d)"}}>{STEPS[step].subtitle}</div>
          </div>

          {/* ── Step 0: Welcome ── */}
          {step===0&&(
            <div>
              {/* Language selector */}
              {setLang&&(
                <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
                  {[{v:"he",label:"🇮🇱 עברית"},{v:"ru",label:"🇷🇺 Русский"},{v:"ar",label:"🇸🇦 العربية"}].map(opt=>(
                    <button key={opt.v} onClick={()=>setLang(opt.v)}
                      style={{flex:1,padding:"10px",borderRadius:"12px",cursor:"pointer",fontWeight:"800",fontSize:"14px",
                        background:lang===opt.v?"#052e16":"var(--card)",
                        color:lang===opt.v?"#4ade80":"var(--txt-dd)",
                        border:`2px solid ${lang===opt.v?"#22c55e":"var(--divider)"}`,
                        transition:"all 0.2s ease"}}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              )}
              {/* Theme selector */}
              {setTheme&&(
                <div style={{display:"flex",gap:"8px",marginBottom:"20px"}}>
                  {[{v:"dark",label:t("sg_theme_dark")},{v:"light",label:t("sg_theme_light")}].map(opt=>(
                    <button key={opt.v} onClick={()=>setTheme(opt.v)}
                      style={{flex:1,padding:"10px",borderRadius:"12px",cursor:"pointer",fontWeight:"800",fontSize:"14px",
                        background:theme===opt.v?"#1e3a5f":"var(--card)",
                        color:theme===opt.v?"#60a5fa":"var(--txt-dd)",
                        border:`2px solid ${theme===opt.v?"#3b82f6":"var(--divider)"}`,
                        transition:"all 0.2s ease"}}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              )}
              <div style={{background:"linear-gradient(145deg,#052e16,#14532d)",border:"1px solid #166534",borderRadius:"20px",padding:"24px",textAlign:"center",marginBottom:"24px"}}>
                <div style={{fontSize:"56px",marginBottom:"12px",animation:"spinShekel 3s linear infinite",display:"inline-block"}}>₪</div>
                <div style={{fontSize:"16px",fontWeight:"800",color:"#4ade80",marginBottom:"8px"}}>{t("ob_tagline")}</div>
                <div style={{fontSize:"13px",color:"#86efac88",lineHeight:"1.7",whiteSpace:"pre-line"}}>{t("ob_feat_desc")}</div>
              </div>
              {[
                {icon:"⏱",t:t("ob_f0t"),s:t("ob_f0s")},
                {icon:"📊",t:t("ob_f1t"),s:t("ob_f1s")},
                {icon:"🏦",t:t("ob_f2t"),s:t("ob_f2s")},
              ].map((f,i)=>(
                <div key={i} style={{display:"flex",gap:"14px",alignItems:"center",padding:"14px",background:"var(--card)",borderRadius:"14px",marginBottom:"10px",border:"1px solid #1f2937"}}>
                  <div style={{fontSize:"28px",flexShrink:0}}>{f.icon}</div>
                  <div><div style={{fontWeight:"700",color:"var(--txt)",fontSize:"14px"}}>{f.t}</div><div style={{fontSize:"12px",color:"var(--txt-d)",marginTop:"2px"}}>{f.s}</div></div>
                </div>
              ))}
            </div>
          )}

          {/* ── Step 1: Base pay ── */}
          {step===1&&(
            <div>
              <div style={{...CARD,marginBottom:"16px"}}>
                <div style={{fontSize:"12px",color:"var(--txt-d)",marginBottom:"16px",lineHeight:"1.6",background:"var(--bg2)",borderRadius:"10px",padding:"12px",border:"1px solid #1f2937"}}>
                  {t("ob_s1_tip")}
                </div>
                <Field label={t("sg_base_rate")} hint={t("ob_s1_from_contract")}>
                  <NumInput value={form.baseRate} onChange={v=>setForm(f=>({...f,baseRate:v}))} step={0.01} min={0}/>
                </Field>
                <div style={{fontSize:"11px",color:"var(--txt-dd)",marginBottom:"16px",marginTop:"-8px"}}>
                  {t("ob_s1_min_wage")}
                </div>
                <Field label={t("sg_daily_h")} hint={t("ob_s1_daily_hint")}>
                  <NumInput value={form.overtimeThreshold} onChange={v=>setForm(f=>({...f,overtimeThreshold:v}))} step={0.1} min={1}/>
                </Field>
                <div style={{fontSize:"11px",color:"var(--txt-dd)",marginBottom:"16px",marginTop:"-8px"}}>
                  {t("ob_s1_ot_hint")}
                </div>
                <div style={{background:"#0c1a3e",border:"1px solid #1e3a8a",borderRadius:"10px",padding:"12px",marginTop:"4px"}}>
                  <div style={{fontSize:"11px",color:"#93c5fd",fontWeight:"700",marginBottom:"8px"}}>{t("ob_s1_ot_title")}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                    <div>
                      <div style={{fontSize:"10px",color:"#93c5fd",marginBottom:"6px"}}>{t("ob_s1_ot_first")}</div>
                      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                        <NumInput value={form.overtime125Pct||125} onChange={v=>setForm(f=>({...f,overtime125Pct:v}))} step={5} min={100} max={200} style={{fontSize:"14px",padding:"8px 10px"}}/>
                        <span style={{color:"#93c5fd",fontWeight:"700"}}>%</span>
                      </div>
                    </div>
                    <div>
                      <div style={{fontSize:"10px",color:"#93c5fd",marginBottom:"6px"}}>{t("ob_s1_ot_from3")}</div>
                      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                        <NumInput value={form.overtime150Pct||150} onChange={v=>setForm(f=>({...f,overtime150Pct:v}))} step={5} min={100} max={200} style={{fontSize:"14px",padding:"8px 10px"}}/>
                        <span style={{color:"#93c5fd",fontWeight:"700"}}>%</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── Step 2: Shifts ── */}
          {step===2&&(
            <div>
              <div style={{fontSize:"11px",color:"var(--txt-dd)",marginBottom:"14px"}}>{t("sg_sh_times_hint")}</div>
              {[
                {key:"morning",  labelKey:"sg_sh_morning",  enabledK:"morningEnabled",  startK:"morningStart",  multK:"morningMult",  knownK:"morningMultKnown",  defMult:100},
                {key:"afternoon",labelKey:"sg_sh_afternoon",enabledK:"afternoonEnabled",startK:"afternoonStart",multK:"afternoonMult",knownK:"afternoonMultKnown",defMult:117},
                {key:"night",    labelKey:"sg_sh_night",    enabledK:"nightEnabled",    startK:"nightStart",    multK:"nightMult",    knownK:"nightMultKnown",    defMult:140},
              ].map(s=>(
                <div key={s.key} style={{...CARD,marginBottom:"12px",opacity:form[s.enabledK]===false?0.5:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                    <div style={{fontSize:"14px",fontWeight:"800",color:"var(--txt)"}}>{t(s.labelKey)}</div>
                    <Toggle on={form[s.enabledK]!==false} onToggle={()=>setForm(f=>({...f,[s.enabledK]:f[s.enabledK]===false}))}/>
                  </div>
                  {form[s.enabledK]!==false&&(
                    <>
                      <div style={{fontSize:"11px",color:"var(--txt-d)",fontWeight:"700",marginBottom:"6px"}}>{t("sg_sh_from")}</div>
                      <input type="time" value={form[s.startK]||"06:00"} onChange={e=>setForm(f=>({...f,[s.startK]:e.target.value}))} style={{...SI,marginBottom:"12px"}}/>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
                        <div style={{fontSize:"11px",color:"var(--txt-d)",fontWeight:"700"}}>{t("sg_sh_pct")}</div>
                        <button onClick={()=>setForm(f=>({...f,[s.knownK]:f[s.knownK]===false?true:false}))}
                          style={{background:form[s.knownK]===false?"#052e16":"var(--divider)",border:`1.5px solid ${form[s.knownK]===false?"#22c55e":"var(--divider2)"}`,color:form[s.knownK]===false?"#22c55e":"var(--txt-d)",borderRadius:"16px",padding:"3px 10px",cursor:"pointer",fontWeight:"700",fontSize:"11px"}}>
                          {form[s.knownK]===false?t("sg_sh_legal"):t("sg_sh_known")}
                        </button>
                      </div>
                      {form[s.knownK]===false?(
                        <div style={{fontSize:"12px",color:"var(--txt-dd)",background:"var(--bg2)",borderRadius:"8px",padding:"8px"}}>
                          {t("sg_sh_unknown")} ({s.defMult}%)
                        </div>
                      ):(
                        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                          <NumInput value={form[s.multK]??s.defMult} onChange={v=>setForm(f=>({...f,[s.multK]:v}))} step={1} min={100} max={300}/>
                          <span style={{color:"var(--txt)",fontWeight:"800",fontSize:"16px"}}>%</span>
                        </div>
                      )}
                      <div style={{fontSize:"10px",color:"var(--txt-dd)",marginTop:"4px"}}>{t("sg_sh_pct_hint")}</div>
                    </>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* ── Step 3: Tax & NI ── */}
          {step===3&&(
            <div>
              {/* Auto NI calculator */}
              <div style={{...CARD,background:"#0a1628",border:"1px solid #1e3a5f",marginBottom:"14px"}}>
                <div style={{fontSize:"13px",fontWeight:"700",color:"#60a5fa",marginBottom:"4px"}}>{t("ni_title")}</div>
                <div style={{fontSize:"11px",color:"var(--txt-dd)",marginBottom:"12px"}}>{t("ob_s2_ni_hint")}</div>
                <Field label={t("ob_s2_salary_lbl")}>
                  <NumInput value={salary} onChange={v=>setSalary(v>0?v:0)} step={100}/>
                </Field>
                <button onClick={calcNI} style={{width:"100%",padding:"11px",background:"#1e3a8a",border:"none",borderRadius:"10px",color:"#93c5fd",fontWeight:"800",fontSize:"14px",cursor:"pointer",marginBottom:niResult?"12px":"0"}}>
                  {t("ob_s2_calc")}
                </button>
                {niResult&&(
                  <div style={{background:"var(--bg2)",borderRadius:"10px",padding:"12px",marginTop:"4px"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                      <div style={{background:"#0c1a3e",borderRadius:"8px",padding:"10px",textAlign:"center"}}>
                        <div style={{fontSize:"10px",color:"#93c5fd",marginBottom:"4px"}}>{t("ded_ni")}</div>
                        <div style={{fontSize:"20px",fontWeight:"900",color:"#60a5fa"}}>{niResult.niPct}%</div>
                      </div>
                      <div style={{background:"#1a0c3e",borderRadius:"8px",padding:"10px",textAlign:"center"}}>
                        <div style={{fontSize:"10px",color:"#c4b5fd",marginBottom:"4px"}}>{t("ded_health")}</div>
                        <div style={{fontSize:"20px",fontWeight:"900",color:"#a78bfa"}}>{niResult.healthPct}%</div>
                      </div>
                    </div>
                    <div style={{fontSize:"10px",color:"#22c55e",textAlign:"center",marginTop:"8px",fontWeight:"700"}}>{t("ob_s2_updated")}</div>
                  </div>
                )}
              </div>

              <div style={CARD}>
                <div style={{fontSize:"12px",color:"var(--txt-d)",fontWeight:"700",marginBottom:"12px"}}>{t("ob_s2_manual")}</div>
                <Field label={t("sg_tax_pct")} hint={t("ob_s2_tax_hint")}>
                  <NumInput value={form.taxRate} onChange={v=>setForm(f=>({...f,taxRate:v}))} step={0.1} min={0} max={50}/>
                </Field>
                <Field label={t("sg_ni_pct")}>
                  <NumInput value={form.bituachLeumi} onChange={v=>setForm(f=>({...f,bituachLeumi:v}))} step={0.1} min={0}/>

  );

// SHIFT NEON BORDER — clean gold bar that grows
// ════════════════════════════════════════
function ShiftNeonBorder({clockIn,cfg}){
  const[elapsed,setElapsed]=useState(0);
  const[dims,setDims]=useState({w:window.innerWidth||390,h:window.innerHeight||800});

  useEffect(()=>{
    const up=()=>setDims({w:window.innerWidth,h:window.innerHeight});
    window.addEventListener('resize',up);
    return()=>window.removeEventListener('resize',up);
  },[]);

  useEffect(()=>{
    const tick=()=>setElapsed(Math.max(0,(Date.now()-new Date(clockIn.iso).getTime())/3600000));
    tick();
    const id=setInterval(tick,5000);
    return()=>clearInterval(id);
  },[clockIn.iso]);

  const threshold=cfg.overtimeThreshold||8.6;
  const{w,h}=dims;
  const inset=3;
  const rw=w-2*inset,rh=h-2*inset;
  const perim=2*rw+2*rh;
  const elapsedMin=elapsed*60;
  const totalMin=Math.round(threshold*60);
  const regLen=Math.round((Math.min(elapsedMin,totalMin)/totalMin)*perim);
  const isOT=elapsed>=threshold;

  // Path starts at top-center and goes clockwise back to top-center — no dashoffset needed
  const cx=Math.round(w/2);
  const borderPath=`M ${cx},${inset} H ${w-inset} V ${h-inset} H ${inset} V ${inset} H ${cx}`;

  // OT inset border
  const otOff=5;
  const oRW=rw-2*otOff,oRH=rh-2*otOff;
  const oPerim=2*oRW+2*oRH;
  const otLen=Math.min(Math.round((Math.max(0,elapsedMin-totalMin)/totalMin)*oPerim),oPerim);
  const otPath=`M ${cx},${inset+otOff} H ${w-inset-otOff} V ${h-inset-otOff} H ${inset+otOff} V ${inset+otOff} H ${cx}`;

  const tipSz=5;

  return(
    <svg style={{position:"fixed",inset:0,zIndex:60,pointerEvents:"none"}} width="100%" height="100%">
      <defs>
        <filter id="snb-g"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="snb-gs"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      {/* Ghost track */}
      <path d={borderPath} fill="none" stroke="#fbbf24" strokeWidth="1" strokeOpacity="0.07"/>
      {/* Gold bar — starts at top-center, fills clockwise */}
      {regLen>0&&<path d={borderPath} fill="none"
        stroke="#fbbf24" strokeWidth="2.5" strokeOpacity="0.65"
        strokeDasharray={`${regLen} ${perim+100}`}
        filter="url(#snb-g)"/>}
      {/* Tip glow */}
      {regLen>0&&regLen<perim&&(
        <path d={borderPath} fill="none"
          stroke="#fef08a" strokeWidth="4" strokeLinecap="round"
          strokeDasharray={`${tipSz} ${perim+100}`} strokeDashoffset={regLen-tipSz}
          filter="url(#snb-gs)">
          <animate attributeName="stroke-opacity" values="0.9;0.2;0.9" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="stroke-width" values="4;1.5;4" dur="2s" repeatCount="indefinite"/>
        </path>
      )}
      {/* OT inset blue bar */}
      {isOT&&otLen>0&&(
        <>
          <path d={otPath} fill="none" stroke="#7dd3fc" strokeWidth="0.8" strokeOpacity="0.1"/>
          <path d={otPath} fill="none"
            stroke="#7dd3fc" strokeWidth="2" strokeOpacity="0.6"
            strokeDasharray={`${otLen} ${oPerim+100}`}
            filter="url(#snb-g)"/>
          {otLen<oPerim&&(
            <path d={otPath} fill="none"
              stroke="#bae6fd" strokeWidth="3.5" strokeLinecap="round"
              strokeDasharray={`${tipSz} ${oPerim+100}`} strokeDashoffset={otLen-tipSz}
              filter="url(#snb-gs)">
              <animate attributeName="stroke-opacity" values="0.9;0.2;0.9" dur="2s" repeatCount="indefinite"/>
              <animate attributeName="stroke-width" values="3.5;1.5;3.5" dur="2s" repeatCount="indefinite"/>
            </path>
          )}
        </>
      )}
    </svg>
  );
}

// MAIN APP
// ════════════════════════════════════════
function App(){
  const[tab,setTab]=useState("clock");
  const[prevTab,setPrevTab]=useState("clock");
  const[tabKey,setTabKey]=useState(0);
  const[nightMode,setNightMode]=useState(isNightTime);

  const[toast,setToast]=useState(null);
  const scrollRef=useRef(null);

  const showToast=(msg,color="#22c55e")=>{
    setToast({msg,color});
    setTimeout(()=>setToast(null),2500);
  };

  const scrollTop=()=>{if(scrollRef.current)scrollRef.current.scrollTop=0;};

  const switchTab=(t)=>{setPrevTab(tab);setTab(t);setTabKey(k=>k+1);scrollTop();};

  useEffect(()=>{
    const id=setInterval(()=>setNightMode(isNightTime()),60000);
    return()=>clearInterval(id);
  },[]);
  const[shifts,setShifts]=useState([]);
  const[cfg,setCfg]=useState(DEF_CFG);
  const[tpls,setTpls]=useState([]);
  const[als,setAls]=useState(DEF_ALS);
  const[vacCfg,setVacCfg]=useState(DEF_VAC);
  const[clockIn,setClockInState]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[onboarded,setOnboarded]=useState(false);
  const[privacyMode,setPrivacyMode]=useState(false);
  const[manualMonths,setManualMonths]=useState(()=>LS.get(K.manualMonths)||{});
  const saveManualMonth=(ym,net)=>{
    setManualMonths(prev=>{
      const upd=net==null?Object.fromEntries(Object.entries(prev).filter(([k])=>k!==ym)):{...prev,[ym]:{net}};
      LS.set(K.manualMonths,upd);return upd;
    });
  };
  const[payslips,setPayslips]=useState(()=>LS.get(K.payslips)||{});
  const savePayslip=(ym,data)=>{
    setPayslips(prev=>{
      const upd=data==null?Object.fromEntries(Object.entries(prev).filter(([k])=>k!==ym)):{...prev,[ym]:data};
      LS.set(K.payslips,upd);return upd;
    });
  };
  const[lang,setLang]=useState("he");
  const[theme,setTheme]=useState("dark");
  const[selM,setSelM]=useState(()=>tdy().substring(0,7));
  const[addForm,setAddForm]=useState(()=>({date:null,start:"",end:"",type:"regular",note:"",templateName:"",allowanceIds:LS.get(K.addAlsIds)||[],customMult:null}));

  useEffect(()=>{
    const c=LS.get(K.cfg);const loadedCfg=c?{...DEF_CFG,...c}:DEF_CFG;if(c)setCfg(loadedCfg);
    const s=LS.get(K.shifts);if(s){
      // one-time migration: recalculate shift types using dominant hours
      const migrated=s.map(sh=>{
        if(!sh.start||!sh.end||isSpecialDay(sh.type)||sh.customMult)return sh;
        return{...sh,type:dominantShiftType(sh.start,sh.end,loadedCfg)};
      });
      setShifts(migrated);LS.set(K.shifts,migrated);
    }
    const t=LS.get(K.tpls);if(t)setTpls(t);
    const a=LS.get(K.als);if(a){setAls(a);const allIds=a.filter(x=>x.active&&x.type==="per_shift").map(x=>x.id);const saved=LS.get(K.addAlsIds);const ids=saved===null?allIds:allIds.filter(id=>saved.includes(id));setAddForm(f=>({...f,allowanceIds:ids}));}
    const v=LS.get(K.vac);if(v)setVacCfg({...DEF_VAC,...v});
    const ci=LS.get(K.clockin);if(ci)setClockInState(ci);
    const ob=LS.get(K.onboarded);if(ob)setOnboarded(true);
    const pr=LS.get(K.privacy);if(pr)setPrivacyMode(true);
    const ln=LS.get(K.lang);if(ln){setLang(ln);document.documentElement.lang=ln;}
    const th=LS.get(K.theme);if(th){setTheme(th);document.documentElement.dataset.theme=th;}
    setLoaded(true);
  },[]);

  useEffect(()=>{LS.set(K.addAlsIds,addForm.allowanceIds);},[addForm.allowanceIds]);
  const saveTheme=t=>{setTheme(t);LS.set(K.theme,t);document.documentElement.dataset.theme=t;};
  const saveLang=l=>{setLang(l);LS.set(K.lang,l);document.documentElement.lang=l;};
  const togglePrivacy=()=>{
    const next=!privacyMode;
    setPrivacyMode(next);
    LS.set(K.privacy,next?true:null);
  };

  const setClockIn=(v)=>{setClockInState(v);LS.set(K.clockin,v);};
  const saveSh=useCallback(ns=>{setShifts(ns);LS.set(K.shifts,ns);},[]);
  const saveCfg=useCallback(ns=>{setCfg(ns);LS.set(K.cfg,ns);},[]);
  const saveTpls=useCallback(ns=>{setTpls(ns);LS.set(K.tpls,ns);},[]);
  const saveAls=useCallback(ns=>{setAls(ns);LS.set(K.als,ns);setAddForm(f=>({...f,allowanceIds:ns.filter(a=>a.active&&a.type==="per_shift").map(a=>a.id)}));},[]);
  const saveVacCfg=useCallback(ns=>{setVacCfg(ns);LS.set(K.vac,ns);},[]);
  const addSh=useCallback(s=>{
    // לא לשמור משמרת עבודה קצרה מ-3 דקות (0.05 שעות)
    if(!isSpecialDay(s.type)&&ch(s.start,s.end)<0.05)return;
    saveSh([...shifts,s]);
  },[shifts,saveSh]);
  const delSh=useCallback(id=>saveSh(shifts.filter(s=>s.id!==id)),[shifts,saveSh]);
  const editSh=useCallback(s=>saveSh(shifts.map(x=>x.id===s.id?s:x)),[shifts,saveSh]);

  const finishOnboarding=(newCfg,newAls)=>{
    saveCfg(newCfg);
    if(newAls&&newAls.length>0) saveAls(newAls);
    LS.set(K.onboarded,true);
    setOnboarded(true);
  };

  const appT=k=>TR[lang]?.[k]??TR.he[k]??k;

  const tabs=[
    {id:"clock",    icon:clockIn?"🔴":"🟢", label:clockIn?appT("tab_active"):appT("tab_clock")},
    {id:"dashboard",icon:"📊",label:appT("tab_dash")},
    {id:"add",      icon:"➕",label:appT("tab_add")},
    {id:"shifts",   icon:"📋",label:appT("tab_shifts")},
    {id:"graph",    icon:"📈",label:appT("tab_graph")},
    {id:"settings", icon:"⚙️",label:appT("tab_cfg")},
  ];

  if(!loaded)return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"16px"}}>
      <div style={{fontSize:"52px",animation:"spinShekel 1.2s linear infinite",display:"inline-block"}}>₪</div>
      <div style={{color:"#4ade80",fontSize:"16px",fontWeight:"700",animation:"blink 1.2s ease-in-out infinite"}}>{appT("app_loading")}</div>
    </div>
  );

  if(!onboarded)return <LangCtx.Provider value={lang}><Onboarding onDone={finishOnboarding} lang={lang} setLang={saveLang} theme={theme} setTheme={saveTheme}/></LangCtx.Provider>;

  return(
  <LangCtx.Provider value={lang}>
    <div dir={lang==="ru"?"ltr":"rtl"} style={{fontFamily:"'Heebo','Noto Sans Arabic','Arial Hebrew',sans-serif",minWidth:"100%",maxWidth:"430px",margin:"0 auto",height:"100%",display:"flex",flexDirection:"column",background:"var(--bg)",color:"var(--txt)",filter:nightMode?"brightness(0.82) saturate(0.9)":"none",transition:"filter 1s ease",position:"relative"}}>

      {/* Toast notification */}
      {toast&&(
        <div style={{
          position:"absolute",top:"env(safe-area-inset-top,28px)",left:"50%",transform:"translateX(-50%)",
          zIndex:999,background:toast.color,borderRadius:"12px",padding:"10px 20px",
          fontSize:"13px",fontWeight:"800",color:"#000",whiteSpace:"nowrap",
          boxShadow:`0 4px 20px ${toast.color}66`,
          animation:"slideInUp 0.25s ease-out",
        }}>{toast.msg}</div>
      )}

      {/* Header - sticky at top */}
      <div style={{paddingTop:"env(safe-area-inset-top, 28px)",background:"var(--bg)",borderBottom:"1px solid #1f2937",flexShrink:0,zIndex:10,position:"relative"}}>
        <div style={{padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontSize:"17px",fontWeight:"900",color:"var(--txt-hi)"}}>שעתי ⏱</div>
        <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
          {/* Privacy toggle */}
          <button onClick={togglePrivacy} style={{
            background:privacyMode?"#2d1f00":"var(--divider)",
            border:`1px solid ${privacyMode?"#f59e0b":"var(--divider2)"}`,
            borderRadius:"8px",padding:"3px 10px",
            fontSize:"14px",cursor:"pointer",
            transition:"all 0.2s ease",
          }} title={privacyMode?appT("app_privacy_show"):appT("app_privacy_hide")}>
            {privacyMode?"🙈":"👁"}
          </button>
          {clockIn&&<div style={{background:"#2d0505",border:"1px solid #ef4444",borderRadius:"8px",padding:"3px 10px",fontSize:"11px",color:"#f87171",fontWeight:"700",display:"flex",alignItems:"center",gap:"4px"}}>
            <span style={{animation:"blink 1s ease-in-out infinite"}}>●</span>
            <span style={{animation:"blink 1s ease-in-out infinite",animationDelay:"0.33s"}}>●</span>
            <span style={{animation:"blink 1s ease-in-out infinite",animationDelay:"0.66s"}}>●</span>
            <span>{appT("hdr_active")}</span>
          </div>}
          <div style={{background:"#052e16",border:"1px solid #166534",borderRadius:"8px",padding:"3px 10px",fontSize:"11px",color:"#4ade80",fontWeight:"700"}}>
            {shifts.filter(s=>s.date.startsWith(tdy().substring(0,7))&&!isSpecialDay(s.type)).length} {appT("hdr_month_shifts")}
          </div>
        </div>
        </div>
      </div>

      {/* Privacy mode banner */}
      {privacyMode&&(
        <div style={{
          background:"#2d1f00",borderBottom:"1px solid #f59e0b44",
          padding:"5px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",
          flexShrink:0,
        }}>
          <div style={{fontSize:"11px",color:"#f59e0b",fontWeight:"700"}}>🙈 {appT("hdr_privacy_on")}</div>
          <button onClick={togglePrivacy} style={{background:"none",border:"none",color:"#f59e0b",fontSize:"11px",cursor:"pointer",fontWeight:"700",padding:"0"}}>
            {appT("hdr_show")} 👁
          </button>
        </div>
      )}

      {/* Scrollable content */}
      <div ref={scrollRef} style={{flex:1,overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch",minHeight:0}}>
        {/* AddShift: always mounted so form state (incl. allowances) never resets on tab switch */}
        <div style={{display:tab==="add"?"block":"none",width:"100%"}}>
          <AddShift cfg={cfg} tpls={tpls} als={als} shifts={shifts} form={addForm} onFormChange={setAddForm} onAdd={s=>{addSh(s);showToast(appT("as_saved"));scrollTop();}} onEdit={editSh} onDelete={delSh} privacyMode={privacyMode} onResetForm={()=>{const ids=als.filter(a=>a.active&&a.type==="per_shift").map(a=>a.id);setAddForm({date:null,start:"",end:"",type:"regular",note:"",templateName:"",allowanceIds:ids,customMult:null});}}/>
        </div>
        <div key={tabKey} className={slideClass(prevTab,tab)} style={{display:tab==="add"?"none":"block",width:"100%"}}>
          {tab==="clock"    &&<ClockScreen clockIn={clockIn} setClockIn={setClockIn} als={als} cfg={cfg} shifts={shifts} onShiftSaved={s=>{addSh(s);showToast(appT("as_saved"));}} privacyMode={privacyMode} togglePrivacy={togglePrivacy}/>}
          {tab==="dashboard"&&<Dashboard shifts={shifts} cfg={cfg} als={als} selM={selM} setSelM={setSelM} privacyMode={privacyMode} payslips={payslips} onSavePayslip={savePayslip} clockIn={clockIn}/>}
          {tab==="shifts"   &&<ShiftsList shifts={shifts} cfg={cfg} als={als} onDelete={delSh} onEdit={editSh} privacyMode={privacyMode}/>}
          {tab==="graph"    &&<Graph shifts={shifts} cfg={cfg} als={als} privacyMode={privacyMode} manualMonths={manualMonths} onSaveManual={saveManualMonth}/>}
          {tab==="settings" &&<Settings cfg={cfg} tpls={tpls} als={als} shifts={shifts} vacCfg={vacCfg} onSaveCfg={saveCfg} onSaveTpls={saveTpls} onSaveAls={saveAls} onSaveVacCfg={saveVacCfg} privacyMode={privacyMode} togglePrivacy={togglePrivacy} onReset={()=>{LS.set(K.onboarded,false);setOnboarded(false);}} lang={lang} onSaveLang={saveLang} theme={theme} onSaveTheme={saveTheme}/>}
        </div>
        {/* Watermark — inside scroll, above nav padding */}
        <div style={{textAlign:"center",padding:"12px 0 4px",fontSize:"10px",color:"var(--divider)",letterSpacing:"0.5px"}}>
          made by illouzman
        </div>
      </div>

      {/* Bottom nav — sliding pill indicator */}
      <div style={{flexShrink:0,background:"var(--bg2)",borderTop:"1px solid #1f2937",zIndex:20,paddingBottom:"env(safe-area-inset-bottom, 4px)"}}>
        <div style={{display:"flex",width:"100%",position:"relative",padding:"4px"}}>
          {/* Sliding pill */}
          <div style={{
            position:"absolute",
            top:"4px",bottom:"4px",
            right:`calc(${tabs.findIndex(t=>t.id===tab)}*${100/tabs.length}% + 4px)`,
            width:`calc(${100/tabs.length}% - 8px)`,
            background:"#052e16",
            border:"1px solid #166534",
            borderRadius:"10px",
            transition:"right 0.25s cubic-bezier(0.4,0,0.2,1)",
            pointerEvents:"none",
            zIndex:0,
          }}/>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>switchTab(t.id)} style={{
              flex:1,padding:"7px 2px 9px",background:"none",border:"none",
              cursor:"pointer",color:tab===t.id?"#4ade80":"var(--txt-dd)",
              position:"relative",zIndex:1,
              transition:"color 0.2s ease",
            }}>
              <div style={{fontSize:"18px"}}>{t.icon}</div>
              <div style={{fontSize:"9px",fontWeight:tab===t.id?"800":"500",marginTop:"3px",letterSpacing:"-0.2px"}}>{t.label}</div>
            </button>
          ))}
        </div>
      </div>
    <InstallBanner/>
    {clockIn&&<ShiftNeonBorder clockIn={clockIn} cfg={cfg}/>}
    </div>
  </LangCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
