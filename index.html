            <div style={{position:"absolute",top:"-30px",right:"-30px",width:"100px",height:"100px",background:"#38bdf822",borderRadius:"50%"}}/>
            <div style={{fontSize:"11px",color:"#7dd3fc",fontWeight:"700",marginBottom:"4px",letterSpacing:"1px"}}>{uT("sv_total")}</div>
            <div style={{fontSize:"38px",fontWeight:"900",color:"#38bdf8",letterSpacing:"-1px"}}>{fM(Math.round(grandTotal))}</div>
            <div style={{fontSize:"11px",color:"#334155",marginTop:"4px"}}>{uT("sv_no_future")}</div>
          </div>

          {/* Cards */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
            <div style={{background:"linear-gradient(145deg,#0c1a3e,#1e3a8a)",border:"1px solid #1e40af",borderRadius:"14px",padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:"11px",color:"#93c5fd",marginBottom:"4px",fontWeight:"700"}}>{uT("sv_pension")}</div>
              <div style={{fontSize:"20px",fontWeight:"900",color:"#60a5fa"}}>{fM(Math.round(totalPensionNow))}</div>
              {savCfg.pensionHistoric>0&&<div style={{fontSize:"10px",color:"#3b82f688",marginTop:"3px"}}>{uT("sv_incl")} {fM(savCfg.pensionHistoric)} {uT("sv_hist_sfx")}</div>}
              {(savCfg.pensionReturn||0)>0&&<div style={{fontSize:"10px",color:"#4ade80",marginTop:"2px"}}>{uT("sv_return_pfx")}{fM(Math.round(savCfg.pensionReturn))}</div>}
              <div style={{fontSize:"10px",color:"#3b82f6",marginTop:"3px"}}>{fM(Math.round(monthlyPension))}{uT("sv_per_month_e")}</div>
              <div style={{fontSize:"9px",color:"#1e40af",marginTop:"1px"}}>{cfg.pensionEmployee}% {uT("sv_emp")} + {cfg.pensionEmployer}% {uT("sv_er")}</div>
            </div>
            <div style={{background:"linear-gradient(145deg,#1a0c3e,#3b1d8a)",border:"1px solid #5b21b6",borderRadius:"14px",padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:"11px",color:"#c4b5fd",marginBottom:"4px",fontWeight:"700"}}>{uT("sv_keren")}</div>
              <div style={{fontSize:"20px",fontWeight:"900",color:"#a78bfa"}}>{fM(Math.round(totalKerenNow))}</div>
              {savCfg.kerenHistoric>0&&<div style={{fontSize:"10px",color:"#7c3aed88",marginTop:"3px"}}>{uT("sv_incl")} {fM(savCfg.kerenHistoric)} {uT("sv_hist_sfx")}</div>}
              {(savCfg.kerenReturn||0)>0&&<div style={{fontSize:"10px",color:"#4ade80",marginTop:"2px"}}>{uT("sv_return_pfx")}{fM(Math.round(savCfg.kerenReturn))}</div>}
              <div style={{fontSize:"10px",color:"#7c3aed",marginTop:"3px"}}>{fM(Math.round(monthlyKeren))}{uT("sv_per_month_e")}</div>
              <div style={{fontSize:"9px",color:"#4c1d95",marginTop:"1px"}}>{cfg.kerenEmployee}% {uT("sv_emp")} + {cfg.kerenEmployer}% {uT("sv_er")}</div>
            </div>
          </div>

          {extTotal>0&&(
            <div style={{...CARD,marginBottom:"10px",background:"#0d1f12",border:"1px solid #14532d"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:"12px",color:"#4ade80",fontWeight:"700"}}>{uT("sv_ext_savings")}</div>
                <div style={{fontSize:"16px",fontWeight:"800",color:"#4ade80"}}>{fM(extTotal)}</div>
              </div>
              {savCfg.externals.map(e=>(
                <div key={e.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderTop:"1px solid #14532d",marginTop:"6px"}}>
                  <span style={{fontSize:"12px",color:"var(--txt-m)"}}>{e.icon} {e.name}</span>
                  <span style={{fontSize:"12px",fontWeight:"700",color:"#34d399"}}>{fM(e.balance)}</span>
                </div>
              ))}
            </div>
          )}

          {/* יתרה היסטורית */}
          <div style={{...CARD,marginBottom:"10px"}}>
            <div style={{fontSize:"12px",color:"var(--txt-d)",fontWeight:"700",marginBottom:"12px"}}>{uT("sv_hist_bal")}</div>
            {!editingBalance?(
              <>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}>
                  <div style={{background:"var(--bg2)",borderRadius:"10px",padding:"10px",textAlign:"center"}}>
                    <div style={{fontSize:"10px",color:"#60a5fa",marginBottom:"4px"}}>{uT("sv_pension")}</div>
                    <div style={{fontSize:"18px",fontWeight:"900",color:"#4ade80"}}>₪{(savCfg.pensionHistoric||0).toLocaleString()}</div>
                  </div>
                  <div style={{background:"var(--bg2)",borderRadius:"10px",padding:"10px",textAlign:"center"}}>
                    <div style={{fontSize:"10px",color:"#a78bfa",marginBottom:"4px"}}>{uT("sv_keren")}</div>
                    <div style={{fontSize:"18px",fontWeight:"900",color:"#4ade80"}}>₪{(savCfg.kerenHistoric||0).toLocaleString()}</div>
                  </div>
                </div>
                <Btn onClick={()=>setEditingBalance(true)} color="#1e3a8a" textColor="#93c5fd" style={{fontSize:"13px"}}>
                  {uT("sv_hist_btn")}
                </Btn>
              </>
            ):(
              <>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}>
                  <Field label={uT("sv_pen_hist_f")}>
                    <NumInput value={savCfg.pensionHistoric} onChange={v=>setSavCfg(c=>({...c,pensionHistoric:v}))} step={100}/>
                  </Field>
                  <Field label={uT("sv_ker_hist_f")}>
                    <NumInput value={savCfg.kerenHistoric} onChange={v=>setSavCfg(c=>({...c,kerenHistoric:v}))} step={100}/>
                  </Field>
                </div>
                <Btn onClick={()=>{save(savCfg);setTimeout(()=>setEditingBalance(false),1500);}} color={savedMsg?"#15803d":"#22c55e"} textColor={savedMsg?"#dcfce7":"#000"} style={{fontSize:"13px"}}>
                  {savedMsg?uT("sv_saved"):uT("sv_save_hist")}
                </Btn>
              </>
            )}
          </div>

        </>
      )}

      {/* ── TAB: RETURNS ── */}
      {tab==="returns"&&(
        <>
          {/* כרטיס סטטוס עדכון */}
          <div style={{...CARD,marginBottom:"12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
              <div style={{fontSize:"12px",color:"var(--txt-d)",fontWeight:"700"}}>{uT("sv_ret_update")}</div>
              <Btn onClick={handleApplyReturns} color={savedMsg?"#15803d":"#22c55e"} textColor={savedMsg?"#dcfce7":"#000"} style={{fontSize:"11px",padding:"6px 14px"}}>
                {savedMsg?uT("sv_updated"):uT("sv_update_now")}
              </Btn>
            </div>
            <div style={{fontSize:"11px",color:"var(--txt-dd)"}}>
              {uT("sv_auto_calc")}{" "}
              <span style={{color:"#4ade80",fontWeight:"700"}}>{savCfg.lastReturnApplied||uT("sv_never_upd")}</span>
            </div>
          </div>

          {/* פנסיה */}
          <div style={{background:"linear-gradient(145deg,#0c1a3e,#1e3a8a)",border:"1px solid #1e40af",borderRadius:"14px",padding:"14px",marginBottom:"10px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
              <div style={{fontSize:"13px",fontWeight:"800",color:"#60a5fa"}}>{uT("sv_pension")}</div>
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:"9px",color:"#3b82f688"}}>{uT("sv_return_acc")}</div>
                <div style={{fontSize:"15px",fontWeight:"800",color:"#4ade80"}}>+{fM(Math.round(savCfg.pensionReturn||0))}</div>
              </div>
            </div>
            <ReturnPresetRow
              selectedId={savCfg.pensionReturnPreset||"general"}
              customPct={savCfg.pensionReturnCustom||6.5}
              onSelect={id=>save({...savCfg,pensionReturnPreset:id})}
              onCustomChange={v=>save({...savCfg,pensionReturnCustom:v})}
            />
          </div>

          {/* קרן השתלמות */}
          <div style={{background:"linear-gradient(145deg,#1a0c3e,#3b1d8a)",border:"1px solid #5b21b6",borderRadius:"14px",padding:"14px",marginBottom:"10px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
              <div style={{fontSize:"13px",fontWeight:"800",color:"#a78bfa"}}>{uT("sv_keren")}</div>
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:"9px",color:"#7c3aed88"}}>{uT("sv_return_acc")}</div>
                <div style={{fontSize:"15px",fontWeight:"800",color:"#4ade80"}}>+{fM(Math.round(savCfg.kerenReturn||0))}</div>
              </div>
            </div>
            <ReturnPresetRow
              selectedId={savCfg.kerenReturnPreset||"general"}
              customPct={savCfg.kerenReturnCustom||6.5}
              onSelect={id=>save({...savCfg,kerenReturnPreset:id})}
              onCustomChange={v=>save({...savCfg,kerenReturnCustom:v})}
            />
          </div>

          {/* חסכונות חיצוניים */}
          {savCfg.externals.map(e=>(
            <div key={e.id} style={{background:"#0d1f12",border:"1px solid #14532d",borderRadius:"14px",padding:"14px",marginBottom:"10px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                <div style={{fontSize:"13px",fontWeight:"800",color:"#4ade80"}}>{e.icon} {e.name}</div>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:"9px",color:"#166534"}}>{uT("sv_annual_int")}</div>
                  <div style={{fontSize:"15px",fontWeight:"800",color:"#34d399"}}>{getPct(e.returnPreset||"custom",e.returnPct||0)}%</div>
                </div>
              </div>
              <ReturnPresetRow
                selectedId={e.returnPreset||"custom"}
                customPct={e.returnPct||0}
                onSelect={id=>{
                  const pct=id==="custom"?e.returnPct:(RETURN_PRESETS.find(p=>p.id===id)?.pct||0);
                  const upd=savCfg.externals.map(x=>x.id===e.id?{...x,returnPreset:id,returnPct:pct}:x);
                  save({...savCfg,externals:upd});
                }}
                onCustomChange={v=>{
                  const upd=savCfg.externals.map(x=>x.id===e.id?{...x,returnPct:v,returnPreset:"custom"}:x);
                  save({...savCfg,externals:upd});
                }}
              />
            </div>
          ))}

          {savCfg.externals.length===0&&(
            <div style={{textAlign:"center",padding:"16px 0",color:"var(--divider2)",fontSize:"12px"}}>
              {uT("sv_no_ext_ret")}
            </div>
          )}
        </>
      )}

      {/* ── TAB: EXTERNAL SAVINGS ── */}
      {tab==="external"&&(
        <>
          <div style={{...CARD,marginBottom:"14px",background:"#0d1f12",border:"1px solid #14532d"}}>
            <div style={{fontSize:"13px",color:"#4ade80",fontWeight:"700",marginBottom:"4px"}}>{uT("sv_ext_savings")}</div>
            <div style={{fontSize:"11px",color:"var(--txt-dd)",marginBottom:"14px"}}>{uT("sv_ext_desc")}</div>

            {savCfg.externals.length===0&&!showExtForm&&(
              <div style={{textAlign:"center",padding:"20px 0",color:"var(--divider2)"}}>
                <div style={{fontSize:"32px",marginBottom:"8px"}}>🏦</div>
                <div style={{fontSize:"12px"}}>{uT("sv_no_ext")}</div>
              </div>
            )}

            {savCfg.externals.map(e=>(
              <div key={e.id} style={{background:"var(--card)",borderRadius:"10px",padding:"12px",marginBottom:"8px",border:"1px solid #1f2937"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                    <span style={{fontSize:"20px"}}>{e.icon}</span>
                    <div>
                      <div style={{fontSize:"13px",fontWeight:"700",color:"var(--txt)"}}>{e.name}</div>
                      <div style={{fontSize:"11px",color:"var(--txt-d)"}}>{EXT_TYPES.find(t=>t.id===e.type)?.label||e.type} · {uT("sv_return_sfx")} {e.returnPct}%{e.monthlyDeposit>0?` · ${uT("sv_dep_pfx")} ${fM(e.monthlyDeposit)}${uT("sv_per_month_s")}`:""}{ e.depositDay>0?` · ${uT("sv_dep_on")}${e.depositDay} ${uT("sv_of_month")}`:""}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"left",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px"}}>
                    <div style={{fontSize:"15px",fontWeight:"800",color:"#34d399"}}>{fM(e.balance)}</div>
                    <div style={{display:"flex",gap:"6px"}}>
                      <button onClick={()=>setEditExt({...e})}
                        style={{background:"none",border:"none",color:"#60a5fa",fontSize:"11px",cursor:"pointer",padding:0}}>{uT("sv_edit_btn")}</button>
                      <button onClick={()=>{const u=savCfg.externals.filter(x=>x.id!==e.id);save({...savCfg,externals:u});}}
                        style={{background:"none",border:"none",color:"#f87171",fontSize:"11px",cursor:"pointer",padding:0}}>{uT("sv_delete_btn")}</button>
                    </div>
                  </div>
                </div>
              </div>
            ))}

            {editExt&&(
              <div style={{background:"var(--card)",borderRadius:"12px",padding:"14px",border:"1px solid #60a5fa44",marginTop:"8px"}}>
                <div style={{fontSize:"12px",color:"#60a5fa",fontWeight:"700",marginBottom:"12px"}}>{uT("sv_edit_sav")}</div>
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"12px"}}>
                  {EXT_ICONS.map(ic=>(
                    <button key={ic} onClick={()=>setEditExt(e=>({...e,icon:ic}))}
                      style={{width:"36px",height:"36px",borderRadius:"8px",border:`2px solid ${editExt.icon===ic?"#60a5fa":"var(--divider)"}`,background:editExt.icon===ic?"#0c1a3e":"var(--bg2)",fontSize:"18px",cursor:"pointer"}}>
                      {ic}
                    </button>
                  ))}
                </div>
                <Field label={uT("sv_sav_name")}>
                  <input type="text" value={editExt.name} onChange={e=>setEditExt(x=>({...x,name:e.target.value}))} style={SI}/>
                </Field>
                <Field label={uT("sv_type")}>
                  <select value={editExt.type} onChange={e=>setEditExt(x=>({...x,type:e.target.value}))} style={SI}>
                    {EXT_TYPES.map(tp=><option key={tp.id} value={tp.id}>{tp.label}</option>)}
                  </select>
                </Field>
                <Field label={uT("sv_balance")}>
                  <NumInput value={editExt.balance||0} onChange={v=>setEditExt(x=>({...x,balance:v}))} step={100}/>
                </Field>
                <Field label={uT("sv_return_rate")} hint={uT("sv_hint_unk")}>
                  <NumInput value={editExt.returnPct||0} onChange={v=>setEditExt(x=>({...x,returnPct:v}))} step={0.1} min={0}/>
                </Field>
                <Field label={uT("sv_monthly_dep")} hint={uT("sv_hint_none")}>
                  <NumInput value={editExt.monthlyDeposit||0} onChange={v=>setEditExt(x=>({...x,monthlyDeposit:v}))} step={50} min={0}/>
                </Field>
                <Field label={uT("sv_dep_day")} hint={uT("sv_hint_unk0")}>
                  <NumInput value={editExt.depositDay||0} onChange={v=>setEditExt(x=>({...x,depositDay:Math.min(31,Math.max(0,v))}))} step={1} min={0} max={31}/>
                </Field>
                <div style={{display:"flex",gap:"8px"}}>
                  <Btn onClick={()=>{
                    if(!editExt.name.trim())return;
                    const u=savCfg.externals.map(x=>x.id===editExt.id?{...editExt,balance:Number(editExt.balance)||0,returnPct:Number(editExt.returnPct)||0,monthlyDeposit:Number(editExt.monthlyDeposit)||0,depositDay:Number(editExt.depositDay)||0}:x);
                    save({...savCfg,externals:u});
                    setEditExt(null);
                  }} color="#1e3a5f" textColor="#60a5fa" style={{border:"1px solid #1e3a5f",fontSize:"13px"}}>{uT("sv_save_ch")}</Btn>
                  <button onClick={()=>setEditExt(null)} style={{flex:1,padding:"13px",background:"var(--divider)",border:"none",borderRadius:"12px",color:"var(--txt-m)",fontWeight:"700",cursor:"pointer"}}>{uT("sl_cancel")}</button>
                </div>
              </div>
            )}

            {showExtForm?(
              <div style={{background:"var(--card)",borderRadius:"12px",padding:"14px",border:"1px solid #1f2937",marginTop:"8px"}}>
                <div style={{fontSize:"12px",color:"var(--txt-d)",fontWeight:"700",marginBottom:"12px"}}>{uT("sv_add_ext_hdr")}</div>
                {/* Icon picker */}
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"12px"}}>
                  {EXT_ICONS.map(ic=>(
                    <button key={ic} onClick={()=>setNewExt(e=>({...e,icon:ic}))}
                      style={{width:"36px",height:"36px",borderRadius:"8px",border:`2px solid ${newExt.icon===ic?"#22c55e":"var(--divider)"}`,background:newExt.icon===ic?"#052e16":"var(--bg2)",fontSize:"18px",cursor:"pointer"}}>
                      {ic}
                    </button>
                  ))}
                </div>
                <Field label={uT("sv_sav_name")}>
                  <input type="text" value={newExt.name} onChange={e=>setNewExt(x=>({...x,name:e.target.value}))} placeholder={uT("sv_type_dep")+"..."} style={SI}/>
                </Field>
                <Field label={uT("sv_type")}>
                  <select value={newExt.type} onChange={e=>setNewExt(x=>({...x,type:e.target.value}))} style={SI}>
                    {EXT_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
                  </select>
                </Field>
                <Field label={uT("sv_balance")}>
                  <NumInput value={newExt.balance||0} onChange={v=>setNewExt(x=>({...x,balance:v}))} step={100}/>
                </Field>
                <Field label={uT("sv_return_rate")} hint={uT("sv_hint_unk")}>
                  <NumInput value={newExt.returnPct||0} onChange={v=>setNewExt(x=>({...x,returnPct:v}))} step={0.1} min={0}/>
                </Field>
                <Field label={uT("sv_monthly_dep")} hint={uT("sv_hint_no_dep")}>
                  <NumInput value={newExt.monthlyDeposit||0} onChange={v=>setNewExt(x=>({...x,monthlyDeposit:v}))} step={50} min={0}/>
                </Field>
                <Field label={uT("sv_dep_day")} hint={uT("sv_hint_unk0")}>
                  <NumInput value={newExt.depositDay||0} onChange={v=>setNewExt(x=>({...x,depositDay:Math.min(31,Math.max(0,v))}))} step={1} min={0} max={31}/>
                </Field>
                <div style={{display:"flex",gap:"8px"}}>
                  <Btn onClick={()=>{
                    if(!newExt.name.trim())return;
                    const u=[...savCfg.externals,{...newExt,id:Date.now(),balance:Number(newExt.balance)||0,returnPct:Number(newExt.returnPct)||0,monthlyDeposit:Number(newExt.monthlyDeposit)||0,depositDay:Number(newExt.depositDay)||0}];
                    save({...savCfg,externals:u});
                    setNewExt({name:"",balance:"",returnPct:"",monthlyDeposit:"",type:"deposit",icon:"🏦"});
                    setShowExtForm(false);
                  }} color="#22c55e" textColor="#000" style={{fontSize:"13px"}}>{uT("sv_add")}</Btn>
                  <button onClick={()=>setShowExtForm(false)} style={{flex:1,padding:"13px",background:"var(--divider)",border:"none",borderRadius:"12px",color:"var(--txt-m)",fontWeight:"700",cursor:"pointer"}}>{uT("sl_cancel")}</button>
                </div>
              </div>
            ):(
              <button onClick={()=>setShowExtForm(true)}
                style={{width:"100%",padding:"13px",background:"#052e16",border:"1.5px dashed #166534",borderRadius:"12px",color:"#4ade80",fontWeight:"800",fontSize:"14px",cursor:"pointer",marginTop:"8px"}}>
                {uT("sv_add_ext_btn")}
              </button>
            )}
          </div>
        </>
      )}

      {/* ── TAB: HISTORY ── */}
      {tab==="history"&&(
        <>
          {rows.length>0?[...rows].reverse().map(r=>(
            <div key={r.ym} style={{...CARD,marginBottom:"8px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"8px"}}>
                <span style={{fontWeight:"700",color:"var(--txt)"}}>{mLbl(r.ym)}</span>
                <span style={{fontSize:"12px",color:"var(--txt-d)"}}>{uT("sv_base")} {fM(Math.round(r.base))}</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                <div style={{background:"#0c1a3e55",borderRadius:"8px",padding:"8px"}}>
                  <div style={{fontSize:"10px",color:"#93c5fd",marginBottom:"3px"}}>{uT("sv_pen_both")}</div>
                  <div style={{fontSize:"14px",fontWeight:"700",color:"#60a5fa"}}>{fM(Math.round(r.pe+r.pr))}</div>
                  <div style={{fontSize:"9px",color:"#3b82f6",marginTop:"2px"}}>{fM(Math.round(r.pe))} {uT("sv_emp")} · {fM(Math.round(r.pr))} {uT("sv_er")}</div>
                </div>
                <div style={{background:"#1a0c3e55",borderRadius:"8px",padding:"8px"}}>

// ANNUAL GRAPH
// ════════════════════════════════════════
function Graph({shifts,cfg,als,privacyMode}){
  const uT=useT();
  const[selBar,setSelBar]=useState(null);
  const[viewYear,setViewYear]=useState(()=>new Date().getFullYear());
  const loc=uT("locale");
  const MN=Array.from({length:12},(_,i)=>new Date(2024,i,1).toLocaleDateString(loc,{month:"short"}));
  const MNF=Array.from({length:12},(_,i)=>new Date(2024,i,1).toLocaleDateString(loc,{month:"long"}));

  const wMap=buildWeeklyThresholdMap(shifts,cfg);
  const months=Array.from({length:12},(_,i)=>{
    const ym=`${viewYear}-${String(i+1).padStart(2,"0")}`;
    const ms=shifts.filter(s=>s.date.startsWith(ym));
    let gross=0,hours=0,allow=0,count=0,workCount=0,baseS=0;
    ms.forEach(s=>{
      const c=getShiftPay(s,cfg,wMap[s.id]);
      const sa=isSpecialDay(s.type)?0:csa(s.allowanceIds||[],als);
      gross+=c.gross;allow+=sa;count++;
      if(!isSpecialDay(s.type)){hours+=ch(s.start,s.end);workCount++;}
      const baseMult=isSpecialDay(s.type)?1:(s.customMult?s.customMult/100:(ST[s.type]?.mult||1));
      baseS+=(c.regH||0)*cfg.baseRate*baseMult;
    });
    if(count>0) allow+=cma(als);
    const total=gross+allow;
    const ded=cfg.enableDeductions&&total>0?cd(total,cfg,baseS):null;
    const net=ded?total-ded.tot:total;
    return{ym,i,label:MN[i],labelFull:MNF[i],gross,allow,net,hours,count,workCount};
  });

  const withData=months.filter(m=>m.count>0);
  const maxNet=Math.max(...months.map(m=>m.net),1);
  const avgNet=withData.length?withData.reduce((s,m)=>s+m.net,0)/withData.length:0;
  const peakIdx=months.reduce((a,b)=>a.net>b.net?a:b).i;
  const lowIdx=withData.length?withData.reduce((a,b)=>a.net<b.net?a:b).i:-1;
  const totalYear=withData.reduce((s,m)=>s+m.net,0);
  const totalHours=withData.reduce((s,m)=>s+m.hours,0);
  const curMonth=new Date().getMonth();
  const curYear=new Date().getFullYear();

  if(withData.length===0){
    return(
      <div style={{padding:"16px",paddingBottom:"20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
          <button onClick={()=>setViewYear(y=>y-1)} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"9px",width:"36px",height:"36px",fontSize:"20px",cursor:"pointer"}}>‹</button>
          <div style={{fontSize:"18px",fontWeight:"800",color:"var(--txt-hi)"}}>📈 {viewYear}</div>
          <button onClick={()=>setViewYear(y=>y+1)} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"9px",width:"36px",height:"36px",fontSize:"20px",cursor:"pointer"}}>›</button>
        </div>
        <div style={{textAlign:"center",color:"var(--divider2)",padding:"60px 0"}}>
          <div style={{fontSize:"40px",marginBottom:"12px"}}>📊</div>
          <div>{uT("gr_no_data")}</div>
        </div>
      </div>
    );
  }

  const selData=selBar!==null?months[selBar]:null;

  return(
    <div style={{padding:"16px",paddingBottom:"20px"}}>
      {/* Year nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
        <button onClick={()=>{setViewYear(y=>y-1);setSelBar(null);}} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"9px",width:"36px",height:"36px",fontSize:"20px",cursor:"pointer"}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:"18px",fontWeight:"800",color:"var(--txt-hi)"}}>📈 {viewYear}</div>
          {viewYear===curYear&&<div style={{fontSize:"11px",color:"#22c55e",marginTop:"2px"}}>{uT("gr_cur_year")}</div>}
        </div>
        <button onClick={()=>{setViewYear(y=>y+1);setSelBar(null);}} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"9px",width:"36px",height:"36px",fontSize:"20px",cursor:"pointer"}}>›</button>
      </div>

      <div style={{filter:privacyMode?"blur(10px)":"none",transition:"filter 0.25s ease",userSelect:privacyMode?"none":"auto"}}>

      {/* Summary cards */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"16px"}}>
        <div style={{...CARD,textAlign:"center"}}>
          <div style={{fontSize:"11px",color:"var(--txt-d)",marginBottom:"4px"}}>{uT("gr_total_year")}</div>
          <div style={{fontSize:"19px",fontWeight:"900",color:"#4ade80"}}>{fM(totalYear)}</div>
          <div style={{fontSize:"10px",color:"var(--divider2)",marginTop:"2px"}}>{fH(totalHours)} {uT("gr_hours_sfx")}</div>
        </div>
        <div style={{...CARD,textAlign:"center"}}>
          <div style={{fontSize:"11px",color:"var(--txt-d)",marginBottom:"4px"}}>{uT("gr_avg_month")}</div>
          <div style={{fontSize:"19px",fontWeight:"900",color:"#60a5fa"}}>{fM(avgNet)}</div>
          <div style={{fontSize:"10px",color:"var(--divider2)",marginTop:"2px"}}>{withData.length} {uT("gr_active_months")}</div>
        </div>
      </div>

      {/* Highlights */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"16px"}}>
        <div style={{...CARD,background:"#052e16",border:"1px solid #166534",textAlign:"center"}}>
          <div style={{fontSize:"10px",color:"#86efac",marginBottom:"3px"}}>{uT("gr_peak")}</div>
          <div style={{fontSize:"13px",fontWeight:"800",color:"#4ade80"}}>{MNF[peakIdx]}</div>
          <div style={{fontSize:"12px",color:"#34d399"}}>{fM(months[peakIdx].net)}</div>
        </div>
        {lowIdx>=0&&<div style={{...CARD,background:"#1a0505",border:"1px solid #7f1d1d",textAlign:"center"}}>
          <div style={{fontSize:"10px",color:"#fca5a5",marginBottom:"3px"}}>{uT("gr_low")}</div>
          <div style={{fontSize:"13px",fontWeight:"800",color:"#f87171"}}>{MNF[lowIdx]}</div>
          <div style={{fontSize:"12px",color:"#ef4444"}}>{fM(months[lowIdx].net)}</div>
        </div>}
      </div>

      {/* Bar chart */}
      <div style={{...CARD,marginBottom:"16px",padding:"16px 8px",position:"relative"}}>
        {/* Avg line */}
        <div style={{position:"absolute",left:"8px",right:"8px",top:`${16+(1-avgNet/maxNet)*140}px`,borderTop:"1px dashed #374151",zIndex:1,pointerEvents:"none"}}>
          <span style={{fontSize:"9px",color:"var(--divider2)",background:"var(--card)",padding:"0 3px"}}>{fM(avgNet)}</span>
        </div>
        {/* Bars */}
        <div style={{display:"flex",alignItems:"flex-end",gap:"3px",height:"156px",position:"relative",zIndex:2}}>
          {months.map((m,i)=>{
            const barH=m.net>0?Math.max(4,Math.round((m.net/maxNet)*140)):4;
            const isPeak=i===peakIdx&&m.count>0;
            const isLow=i===lowIdx&&m.count>0;
            const isCur=viewYear===curYear&&i===curMonth;
            const isSel=selBar===i;
            const hasData=m.count>0;
            const barColor=isPeak?"#4ade80":isLow?"#f87171":isCur?"#60a5fa":"#22c55e88";
            return(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",cursor:hasData?"pointer":"default"}}
                onClick={()=>hasData&&setSelBar(selBar===i?null:i)}>
                <div style={{
                  width:"100%",height:`${barH}px`,
                  background:isSel?"#4ade80":barColor,
                  borderRadius:"4px 4px 0 0",
                  border:isSel?"2px solid #fff":"2px solid transparent",
                  transition:"all 0.35s cubic-bezier(0.34,1.56,0.64,1)",

            );

        </div>
      </div>

      {/* Selected month detail */}
      {selData&&(
        <div style={{...CARD,marginBottom:"12px",background:"#0d1f0a",border:"1px solid #166534"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
            <div style={{fontSize:"15px",fontWeight:"800",color:"#4ade80"}}>{selData.labelFull} {viewYear}</div>
            <button onClick={()=>setSelBar(null)} style={{background:"none",border:"none",color:"var(--txt-dd)",cursor:"pointer",fontSize:"16px"}}>✕</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>

// VACATION BALANCE (in Settings)

function VacationBalance({shifts,vacCfg,onSaveVacCfg}){
  const uT=useT();
  const[form,setForm]=useState({...vacCfg});
  const[saved,setSaved]=useState(false);

  const vacUsed=shifts.filter(s=>s.type==="vacation").length;
  const sickUsed=shifts.filter(s=>["sick_1","sick_23","sick_4p"].includes(s.type)).length;

  // Accrue only from payslip date forward (user's current balance already includes everything before)
  const now=new Date();
  const monthsSincePayslip=form.payslipDate?(
    Math.max(0,
      (now.getFullYear()-parseInt(form.payslipDate.split("-")[0]))*12+
      (now.getMonth()-(parseInt(form.payslipDate.split("-")[1])-1))
    )
  ):0;
  const vacAccrued=Math.floor(monthsSincePayslip*(form.accrualPerMonth||1.5)*10)/10;
  const sickAccrued=Math.floor(monthsSincePayslip*1.5*10)/10;

  // Balance = payslip balance + accrued since payslip - used in app
  const vacBalance=Math.max(0,(form.currentBalance||0)+vacAccrued-vacUsed);
  const sickBalance=Math.max(0,(form.sickBalance||0)+sickAccrued-sickUsed);

  const save=()=>{onSaveVacCfg(form);setSaved(true);setTimeout(()=>setSaved(false),2000);};

  return(
    <div>
      {/* Balance display */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"16px"}}>
        <div style={{background:"linear-gradient(145deg,#0c1a3e,#1e3a8a)",border:"1px solid #1e40af",borderRadius:"14px",padding:"14px",textAlign:"center"}}>
          <div style={{fontSize:"11px",color:"#93c5fd",marginBottom:"6px",fontWeight:"700"}}>{uT("vac_days_vac")}</div>
          <div style={{fontSize:"30px",fontWeight:"900",color:"#60a5fa"}}>{vacBalance.toFixed(1)}</div>
          <div style={{fontSize:"10px",color:"#3b82f6",marginTop:"4px"}}>
            {vacUsed>0?`${vacUsed} ${uT("vac_used")} · `:""}
            {vacAccrued>0?`+${vacAccrued.toFixed(1)} ${uT("vac_accrued")}`:""}
          </div>
        </div>
        <div style={{background:"linear-gradient(145deg,#1a0c3e,#3b1d8a)",border:"1px solid #5b21b6",borderRadius:"14px",padding:"14px",textAlign:"center"}}>
          <div style={{fontSize:"11px",color:"#c4b5fd",marginBottom:"6px",fontWeight:"700"}}>{uT("vac_days_sick")}</div>
          <div style={{fontSize:"30px",fontWeight:"900",color:"#a78bfa"}}>{sickBalance.toFixed(1)}</div>
          <div style={{fontSize:"10px",color:"#7c3aed",marginTop:"4px"}}>
            {sickUsed>0?`${sickUsed} ${uT("vac_used")} · `:""}
            {sickAccrued>0?`+${sickAccrued.toFixed(1)} ${uT("vac_accrued")}`:""}
          </div>
        </div>
      </div>

      {/* Settings */}
      <div style={CARD}>
        <div style={SEC}>{uT("vac_settings")}</div>

        {/* Info box */}
        <div style={{background:"var(--bg2)",border:"1px solid #1f2937",borderRadius:"10px",padding:"12px",marginBottom:"16px"}}>
          <div style={{fontSize:"12px",color:"#60a5fa",fontWeight:"700",marginBottom:"6px"}}>{uT("vac_how")}</div>
          <div style={{fontSize:"11px",color:"var(--txt-d)",lineHeight:"1.7"}}>
            {uT("vac_how_desc_1")} <span style={{color:"var(--txt)",fontWeight:"700"}}>{uT("vac_how_desc_2")}</span> {uT("vac_how_desc_3")} <span style={{color:"var(--txt)",fontWeight:"700"}}>{uT("vac_how_desc_4")}</span>.<br/>
            {uT("vac_how_desc_5")}
          </div>
        </div>

        {/* Payslip date */}
        <Field label={uT("vac_payslip_date")}>
          <input type="date" value={form.payslipDate||""} onChange={e=>setForm({...form,payslipDate:e.target.value})} style={SI}/>
        </Field>

        {/* Vacation section */}
        <div style={{background:"#0c1a3e33",border:"1px solid #1e3a8a",borderRadius:"10px",padding:"12px",marginBottom:"12px"}}>
          <div style={{fontSize:"11px",color:"#93c5fd",fontWeight:"700",marginBottom:"10px"}}>{uT("vac_annual_vac")}</div>
          <Field label={uT("vac_bal_label")}>
            <NumInput value={form.currentBalance||0} onChange={v=>setForm({...form,currentBalance:v})} step={0.5}/>
          </Field>

          </Field>
          {monthsSincePayslip>0&&<div style={{fontSize:"11px",color:"#3b82f6",marginTop:"4px"}}>{monthsSincePayslip} {uT("vac_months_ago")}{vacAccrued.toFixed(1)} {uT("vac_days_accr")}</div>}
        </div>

        {/* Sick section */}

    </div>
  );

// ════════════════════════════════════════
// AUTO-CALC NI + HEALTH INSURANCE
// ════════════════════════════════════════
function calcNIRates(grossSalary){
  // 2026 thresholds (official btl.gov.il)
  const LOW_THRESH = 7703;
  const NI_LOW = 1.04, NI_HIGH = 7.00;
  const HEALTH_LOW = 3.23, HEALTH_HIGH = 5.17;
  const low = Math.min(grossSalary, LOW_THRESH);
  const high = Math.max(0, grossSalary - LOW_THRESH);
  const niTotal = (low*NI_LOW + high*NI_HIGH) / 100;
  const healthTotal = (low*HEALTH_LOW + high*HEALTH_HIGH) / 100;
  const niPct = Math.round((niTotal/grossSalary)*1000)/10;
  const healthPct = Math.round((healthTotal/grossSalary)*1000)/10;
  return {niPct, healthPct, niTotal, healthTotal};
}

function AutoCalcNI({form,setForm}){
  const uT=useT();
  const[show,setShow]=useState(false);
  const[salary,setSalary]=useState(form.baseRate*190||0);
  const[result,setResult]=useState(null);

  const calc=()=>{
    if(!salary||salary<=0) return;
    const r=calcNIRates(salary);
    setResult(r);
  };

  const apply=()=>{
    if(!result) return;
    setForm(f=>({...f,
      bituachLeumi:Math.round(result.niPct*10)/10,
      masBriut:Math.round(result.healthPct*10)/10,
    }));
    setShow(false);
    setResult(null);
  };

  return(
    <div style={{...CARD,marginBottom:"12px",background:"#0a1628",border:"1px solid #1e3a5f"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

        </div>
        <button onClick={()=>setShow(!show)} style={{background:"#1e3a5f",border:"none",color:"#93c5fd",borderRadius:"8px",padding:"6px 12px",cursor:"pointer",fontWeight:"700",fontSize:"12px"}}>
          {show?uT("ni_close"):uT("ni_open")}
        </button>
      </div>

      {show&&(
        <div style={{marginTop:"14px"}}>
          <div style={{fontSize:"11px",color:"var(--txt-d)",marginBottom:"6px",lineHeight:"1.6"}}>
            {uT("ni_hint")}
          </div>
          <Field label={uT("ni_salary")}>
            <NumInput value={salary} onChange={v=>setSalary(v)} step={100}/>
          </Field>
          <button onClick={calc} style={{width:"100%",padding:"11px",background:"#1e3a8a",border:"none",borderRadius:"10px",color:"#93c5fd",fontWeight:"800",fontSize:"14px",cursor:"pointer",marginBottom:"12px"}}>
            {uT("ni_calc")}
          </button>

          {result&&(
            <div style={{background:"var(--bg2)",borderRadius:"10px",padding:"12px",marginBottom:"12px"}}>

// ── Income Tax Helper ──
function IncomeTaxHelper({form,setForm}){
  const uT=useT();
  const[show,setShow]=useState(false);
  const POINTS=[
    {l:uT("tx_pt0"),v:2.25,desc:uT("tx_pt0d")},
    {l:uT("tx_pt1"),v:0.5,desc:uT("tx_pt1d")},
    {l:uT("tx_pt2"),v:2.5,desc:uT("tx_pt2d")},
    {l:uT("tx_pt3"),v:2.0,desc:uT("tx_pt3d")},
    {l:uT("tx_pt4"),v:1.0,desc:uT("tx_pt4d")},
    {l:uT("tx_pt5"),v:1.0,desc:uT("tx_pt5d")},
  ];
  const POINT_VALUE=242; // ₪ per month per point (2025)

  const [points,setPoints]=useState(form.taxRate===0?2.25:2.25);

  const calcTax=(gross,pts)=>{
    // Simplified marginal tax calculation
    const credit=pts*POINT_VALUE;
    let tax=0;
    const brackets=[[6790,0.10],[9730,0.14],[15620,0.20],[21670,0.31],[44190,0.35],[56190,0.47],[Infinity,0.50]];
    let remaining=gross;
    let prev=0;
    for(const[top,rate] of brackets){
      const chunk=Math.min(remaining,top-prev);
      if(chunk<=0) break;
      tax+=chunk*rate;
      remaining-=chunk;
      prev=top;
      if(remaining<=0) break;
    }
    const netTax=Math.max(0,tax-credit);
    const pct=gross>0?Math.round((netTax/gross)*1000)/10:0;
    return{netTax,pct};
  };

  const gross=form.baseRate*(form.overtimeThreshold||8.6)*22;
  const result=calcTax(gross,points);

  return(
    <div style={{background:"#1a1000",border:"1px solid #92400e",borderRadius:"10px",padding:"12px",marginBottom:"14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:"12px",fontWeight:"700",color:"#fbbf24"}}>{uT("tx_title")}</div>
          <div style={{fontSize:"11px",color:"var(--txt-dd)",marginTop:"2px"}}>{uT("tx_desc")}</div>
        </div>
        <button onClick={()=>setShow(!show)} style={{background:"#2a1800",border:"none",color:"#fbbf24",borderRadius:"8px",padding:"5px 10px",cursor:"pointer",fontSize:"12px",fontWeight:"700"}}>
          {show?uT("tx_close"):uT("tx_open")}
        </button>
      </div>

      {show&&(
        <div style={{marginTop:"12px"}}>
          <div style={{fontSize:"11px",color:"var(--txt-d)",lineHeight:"1.7",marginBottom:"12px"}}>
            {uT("tx_hint_1")}<span style={{color:"#fbbf24",fontWeight:"700"}}>{uT("tx_hint_pts")}</span>{uT("tx_hint_2")}₪{POINT_VALUE}{uT("tx_hint_3")}<br/>
            <span style={{color:"#22c55e"}}>{uT("tx_hint_tip")}</span>
          </div>

          <div style={{fontSize:"11px",color:"#fbbf24",fontWeight:"700",marginBottom:"8px"}}>{uT("tx_pts_title")}</div>
          {POINTS.map((p,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #2a1800",fontSize:"11px"}}>
              <span style={{color:"var(--txt)"}}>{p.l}</span>
              <span style={{color:"#fbbf24",fontWeight:"700"}}>+{p.v} {uT("tx_pts_sfx")}</span>
            </div>
          ))}

          <div style={{marginTop:"12px",background:"var(--bg2)",borderRadius:"8px",padding:"10px"}}>
            <div style={{fontSize:"11px",color:"var(--txt-d)",marginBottom:"6px"}}>{uT("tx_estimate_pfx")}{fM(Math.round(gross))}{uT("tx_estimate_sfx")}</div>
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
              <span style={{fontSize:"11px",color:"var(--txt-m)"}}>{uT("tx_pts_lbl")}</span>
              <NumInput value={points} onChange={v=>setPoints(v)} step={0.25} style={{...SI,width:"80px"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",background:"var(--card)",borderRadius:"6px",padding:"8px",marginBottom:"10px"}}>
              <span style={{fontSize:"11px",color:"var(--txt-d)"}}>{uT("tx_estimated")}</span>
              <span style={{fontSize:"14px",fontWeight:"800",color:result.pct===0?"#22c55e":"#f87171"}}>
                {result.pct===0?uT("tx_exempt"):`${result.pct}% · ${fM(result.netTax)}${uT("tx_per_month")}`}
              </span>
            </div>
            <button onClick={()=>{setForm(f=>({...f,taxRate:result.pct}));setShow(false);}}
              style={{width:"100%",padding:"9px",background:"#92400e",border:"none",borderRadius:"8px",color:"#fde68a",fontWeight:"800",fontSize:"13px",cursor:"pointer"}}>
              {uT("tx_apply_pfx")}{result.pct}{uT("tx_apply_sfx")}
            </button>
          </div>

          <div style={{marginTop:"10px",fontSize:"10px",color:"var(--divider2)",lineHeight:"1.6"}}>
            {uT("tx_warning")}
          </div>
        </div>
      )}
    </div>
  );
}
