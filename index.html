*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#090c14;--bg2:#0d1117;--card:#111827;
  --divider:#1f2937;--divider2:#374151;--inp-b:#2a2d3e;
  --txt:#e2e8f0;--txt-hi:#f1f5f9;--txt-m:#9ca3af;--txt-d:#6b7280;--txt-dd:#4b5563;
}
[data-theme="light"]{
  --bg:#f0f4f8;--bg2:#f8fafc;--card:#ffffff;
  --divider:#e2e8f0;--divider2:#d1d5db;--inp-b:#d1d5db;
  --txt:#1e293b;--txt-hi:#0f172a;--txt-m:#475569;--txt-d:#64748b;--txt-dd:#64748b;
}
body{background:var(--bg);font-family:'Heebo','Arial Hebrew',sans-serif;color:var(--txt);overscroll-behavior:none}
#root{height:100%;display:flex;flex-direction:column}
input,select,button{font-family:inherit}
input[type=date],input[type=time]{color-scheme:dark}
[data-theme="light"] input[type=date],[data-theme="light"] input[type=time]{color-scheme:light}
select option{background:var(--bg2);color:var(--txt)}
::-webkit-scrollbar{display:none}
.app{max-width:430px;margin:0 auto;min-height:100vh}

@keyframes slideInRight{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-32px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes pulseClock{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.02);opacity:0.85}}
@keyframes floatUp{0%{transform:translateY(0) scale(0.5);opacity:1}100%{transform:translateY(-140px) scale(1.3);opacity:0}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes growBar{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1);transform-origin:bottom}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 10px #22c55e55, 0 0 20px #22c55e22}50%{box-shadow:0 0 25px #22c55e99, 0 0 50px #22c55e44}}
@keyframes otGlow{0%,100%{box-shadow:0 0 12px #f9731655,0 0 24px #f9731622}50%{box-shadow:0 0 30px #f97316aa,0 0 60px #f9731644}}
@keyframes checkMorph{0%{border-radius:12px;width:100%}50%{border-radius:50%;width:52px}100%{border-radius:12px;width:100%}}
@keyframes flipIn{0%{transform:translateY(-100%);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes flipOut{0%{transform:translateY(0);opacity:1}100%{transform:translateY(100%);opacity:0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes spinShekel{0%{transform:rotateY(0deg)}100%{transform:rotateY(360deg)}}
@keyframes staggerIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes twinkle{0%,100%{opacity:0.15;transform:scale(0.8)}50%{opacity:0.7;transform:scale(1.3)}}
@keyframes sunRise{0%,100%{opacity:0.12;transform:translateY(0) scale(1)}50%{opacity:0.28;transform:translateY(-10px) scale(1.1)}}
@keyframes drift{0%{transform:translate(0,0)}33%{transform:translate(10px,-6px)}66%{transform:translate(-6px,-12px)}100%{transform:translate(0,0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes buttonSuccess{0%{width:100%}40%{width:52px;border-radius:50%}60%{width:52px;border-radius:50%}100%{width:100%;border-radius:12px}}
@keyframes slideInNew{from{opacity:0;transform:translateX(-24px) scaleY(0.8)}to{opacity:1;transform:translateX(0) scaleY(1)}}

.tab-slide-right{animation:slideInRight 0.22s ease-out}
.tab-slide-left{animation:slideInLeft 0.22s ease-out}
.slide-up{animation:slideInUp 0.2s ease-out}
.fade-in{animation:fadeIn 0.3s ease-out}
.stagger-in{animation:staggerIn 0.25s ease-out both}
.grow-bar{animation:growBar 0.5s cubic-bezier(0.34,1.56,0.64,1) both}
.new-item{animation:slideInNew 0.3s ease-out}
</style>

// Sick/vacation pay — no overtime, no allowances, only base salary
function calcSpecialPay(hours,type,cfg){
  const{baseRate,overtimeThreshold}=cfg;
  const regH=Math.min(hours,overtimeThreshold); // cap at regular hours, no OT
  if(type==="vacation") return{gross:regH*baseRate,hours,regH,pct:100};
  if(type==="holiday")  return{gross:regH*baseRate,hours,regH,pct:100};
  if(type==="sick_1")   return{gross:0,hours,regH,pct:0};
  if(type==="sick_23")  return{gross:regH*baseRate*0.5,hours,regH,pct:50};
  if(type==="sick_4p")  return{gross:regH*baseRate,hours,regH,pct:100};
  return{gross:0,hours,regH,pct:0};
}

function isSpecialDay(type){ return !!SPECIAL[type]; }

// ── Shift type detection by hour ──
function detectShiftType(hour,cfg){
  const mh=cfg?pt(cfg.morningStart||"06:00")/60:6;
  const ah=cfg?pt(cfg.afternoonStart||"14:00")/60:14;
  const nh=cfg?pt(cfg.nightStart||"22:00")/60:22;
  if(hour>=mh && hour<ah) return "regular";
  if(hour>=ah && hour<nh) return "afternoon";
  return "night";
}
// ── Shift multiplier from config ──
function getShiftMult(type,cfg){
  if(type==="regular")   return (cfg&&cfg.morningMultKnown!==false?(cfg.morningMult||100):100)/100;
  if(type==="afternoon") return (cfg&&cfg.afternoonMultKnown!==false?(cfg.afternoonMult||117):117)/100;
  if(type==="night")     return (cfg&&cfg.nightMultKnown!==false?(cfg.nightMult||140):140)/100;
  return ST[type]?.mult||1;
}

// ── Calc ──
function pt(t){if(!t)return 0;const parts=t.split(":").map(Number);return parts[0]*60+(parts[1]||0)+(parts[2]||0)/60;}
function ch(s,e){let d=pt(e)-pt(s);if(d<0)d+=1440;return Math.max(0,d/60);}

// ── שעות נוספות שבועיות ──
// מחזיר key של השבוע (יום ראשון) לפי תאריך
function getWeekKey(dateStr,startTime){
  const d=new Date(dateStr+"T12:00:00");
  // מוצאי שבת מ-20:00 — נחשב כבר שבוע חדש (ראשון)
  if(d.getDay()===6&&startTime&&startTime>="20:00"){
    const nd=new Date(d);nd.setDate(d.getDate()+1);
    const sun=new Date(nd);sun.setDate(nd.getDate()-nd.getDay());
    return sun.toISOString().split("T")[0];
  }
  const sun=new Date(d);sun.setDate(d.getDate()-d.getDay());
  return sun.toISOString().split("T")[0];
}
// בונה מפה: shiftId → סף יומי אפקטיבי (מינימום בין היומי לשארית השבועי)
// צו הרחבה 2018: 42 שעות שבועיות. מעבר לכך — שעות נוספות.
function buildWeeklyThresholdMap(allShifts,cfg){
  const wt=cfg.weeklyOTThreshold||42;
  const dt=cfg.overtimeThreshold||8.6;
  const workShifts=[...allShifts]
    .filter(s=>!isSpecialDay(s.type))
    .sort((a,b)=>a.date.localeCompare(b.date));
  const weekHours={};
  const map={};
  workShifts.forEach(s=>{
    const wk=getWeekKey(s.date,s.start);
    if(!weekHours[wk])weekHours[wk]=0;
    const remaining=Math.max(0,wt-weekHours[wk]);
    map[s.id]=Math.min(dt,remaining);
    weekHours[wk]+=ch(s.start,s.end);
  });
  return map;
}

// חישוב שכר אוטומטי לפי גבולות שעה (רגיל 06-14, צהריים 14-22, לילה 22-06)
// מחלק את שעות המשמרת לפי התקופות שנכחו בהן ומחשב שכר נכון לכל קטע
function cpAuto(startTime,endTime,cfg,thresholdOverride){
  const startM=pt(startTime);
  const totalH=ch(startTime,endTime);
  const endM=startM+totalH*60;
  const dailyThreshold=thresholdOverride!==undefined?thresholdOverride:(cfg.overtimeThreshold||8.6);
  const ot125Hrs=cfg.overtime125Hours||2;
  const br=cfg.baseRate;
  // תקופות בדקות מחצות — גבולות לפי הגדרות משתמש
  const mf_=pt(cfg.morningStart||"06:00");   // morning from (min)
  const af_=pt(cfg.afternoonStart||"14:00"); // afternoon from (min)
  const nf_=pt(cfg.nightStart||"22:00");     // night from (min)
  const mMult=getShiftMult("regular",cfg);
  const aMult=getShiftMult("afternoon",cfg);
  const nMult=getShiftMult("night",cfg);
  const PDEF=[
    {from:0,    to:mf_,  mult:nMult},
    {from:mf_,  to:af_,  mult:mMult},
    {from:af_,  to:nf_,  mult:aMult},
    {from:nf_,  to:1440, mult:nMult},
  ];
  const segs=[];
  for(const day of[0,1440]){
    for(const p of PDEF){
      const pf=p.from+day,pt_=p.to+day;
      const ov=Math.max(0,Math.min(endM,pt_)-Math.max(startM,pf));
      if(ov>0)segs.push({from:Math.max(startM,pf),hours:ov/60,mult:p.mult});
    }
  }
  segs.sort((a,b)=>a.from-b.from);
  let cumH=0,regH=0,ot125H=0,ot150H=0,regPay=0,ot125Pay=0,ot150Pay=0;
  const periodH={regular:0,afternoon:0,night:0};
  for(const seg of segs){
    const afMin=seg.from%1440;
    const pType=afMin>=mf_&&afMin<af_?"regular":afMin>=af_&&afMin<nf_?"afternoon":"night";
    periodH[pType]+=seg.hours;
    const prev=cumH,next=cumH+seg.hours;
    const r =Math.max(0,Math.min(next,dailyThreshold)-prev);
    const o1=Math.max(0,Math.min(next,dailyThreshold+ot125Hrs)-Math.max(prev,dailyThreshold));
    const o2=Math.max(0,next-Math.max(prev,dailyThreshold+ot125Hrs));
    regH+=r;ot125H+=o1;ot150H+=o2;
    regPay+=r*br*seg.mult;
    ot125Pay+=o1*br*seg.mult*1.25;
    ot150Pay+=o2*br*seg.mult*1.50;
    cumH=next;
  }
  return{regH,ot125H,ot150H,regPay,ot125Pay,ot150Pay,gross:regPay+ot125Pay+ot150Pay,hours:totalH,periodH};
}

// Fixed: overtime on night shifts = 140% * 125% = 175%, afternoon = 117% * 125% = 146.25%
function cp(hours,type,cfg,customMultPct,thresholdOverride){
  const{baseRate,overtimeThreshold,overtime125Hours}=cfg;
  const dailyThreshold=thresholdOverride!==undefined?thresholdOverride:overtimeThreshold;
  const baseMult=customMultPct?(customMultPct/100):getShiftMult(type,cfg);
  const regH=Math.min(hours,dailyThreshold);
  const ot=Math.max(0,hours-dailyThreshold);
  const ot125H=Math.min(ot,overtime125Hours);
  const ot150H=Math.max(0,ot-overtime125Hours);
  const regPay=regH*baseRate*baseMult;
  // Overtime uses base rate × overtime multiplier (not compounded with shift mult)
  // Per Israeli law: overtime is on top of base, shift premium is separate
  // Total for overtime hours = baseRate * shiftMult * overtimeMult
  const ot125Pay=ot125H*baseRate*baseMult*1.25;
  const ot150Pay=ot150H*baseRate*baseMult*1.50;
  return{regH,ot125H,ot150H,regPay,ot125Pay,ot150Pay,gross:regPay+ot125Pay+ot150Pay,hours};
}

// Unified pay calc — handles both regular shifts and special days
// שמשמרת עבודה ללא מכפיל מותאם: cpAuto מחשב אוטומטית לפי גבולות השעה
function getShiftPay(s,cfg,thresholdOverride){
  const h=ch(s.start,s.end);
  if(isSpecialDay(s.type)) return {...calcSpecialPay(h,s.type,cfg), ot125H:0,ot150H:0};
  if(s.customMult) return cp(h,s.type,cfg,s.customMult,thresholdOverride);
  return cpAuto(s.start,s.end,cfg,thresholdOverride);
}
function getShiftTotal(s,cfg,als,thresholdOverride){
  const c=getShiftPay(s,cfg,thresholdOverride);
  const allowances=isSpecialDay(s.type)?0:csa(s.allowanceIds||[],als);
  return c.gross+allowances;
}
function csa(ids=[],als){return als.filter(a=>a.active&&a.type==="per_shift"&&ids.includes(a.id)).reduce((s,a)=>s+a.amount,0);}
function cma(als){return als.filter(a=>a.active&&a.type==="per_month").reduce((s,a)=>s+a.amount,0);}
// baseSalary = שכר בסיס בלבד (ללא שעות נוספות ותוספות) — בסיס לפנסיה וקרן השתלמות
// gross = סה"כ ברוטו (כולל שעות נוספות) — בסיס לביטוח לאומי ומס הכנסה
// תקרת ביטוח לאומי 2026: 49,030 ₪/חודש (לפי btl.gov.il)
const NI_MAX_SALARY = 49030;
function cd(gross,c,baseSalary){
  const base=baseSalary!==undefined?baseSalary:gross; // fallback למצב שלא הועבר
  const pe=base*c.pensionEmployee/100,pr=base*c.pensionEmployer/100;
  const ke=base*c.kerenEmployee/100,kr=base*c.kerenEmployer/100;
  // ביטוח לאומי ומס בריאות — מוגבלים לתקרה החוקית
  const niBase=Math.min(gross,NI_MAX_SALARY);
  const bl=niBase*c.bituachLeumi/100,br=niBase*c.masBriut/100;
  const tx=gross*c.taxRate/100;
  const tot=pe+ke+bl+br+tx;
  const cappedNI=gross>NI_MAX_SALARY; // flag לתצוגה
  return{pe,pr,ke,kr,bl,br,tx,tot,net:gross-tot,base,cappedNI};
}

function elapsed(fromISO){
  const diff=Math.floor((Date.now()-new Date(fromISO).getTime())/1000);
  const h=Math.floor(diff/3600),m=Math.floor((diff%3600)/60),s=diff%60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

// Fixed number input — allows free editing, shows 0 only after blur if empty
function NumInput({value,onChange,step=1,min=0,max,style={}}){
  const[local,setLocal]=useState(String(value));
  const[focused,setFocused]=useState(false);

  useEffect(()=>{
    if(!focused) setLocal(value===0?"0":String(value));
  },[value,focused]);

  return(
    <input
      type="number" step={step} min={min} max={max}
      value={focused?local:(value===0?"0":value)}
      onChange={e=>{
        setLocal(e.target.value);
        const v=parseFloat(e.target.value);
        onChange(isNaN(v)?0:v);
      }}
      onFocus={()=>{
        setFocused(true);
        setLocal(value===0?"":String(value));
      }}
      onBlur={()=>{
        setFocused(false);
        if(local===""||isNaN(parseFloat(local))){
          setLocal("0");
          onChange(0);
        }
      }}
      style={{...SI,...style}}
    />
  );
}

// ── Haptic feedback ──
async function haptic(type){
  try{
    // Try Capacitor Haptics first (APK)
    if(window.Capacitor?.Plugins?.Haptics){
      const H=window.Capacitor.Plugins.Haptics;
      if(type==="in"){
        await H.impact({style:"MEDIUM"});
        setTimeout(()=>H.impact({style:"MEDIUM"}),120);
      } else {
        await H.impact({style:"HEAVY"});
        setTimeout(()=>H.impact({style:"LIGHT"}),100);
        setTimeout(()=>H.impact({style:"HEAVY"}),200);
      }
      return;
    }
    // Fallback: Web Vibration API (browser)
    if(navigator.vibrate){
      if(type==="in")  navigator.vibrate([60,40,60]);
      if(type==="out") navigator.vibrate([40,30,40,30,120]);
    }
  }catch(e){}
}

// ── Sound feedback via Web Audio ──
function playSound(type){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if(type==="in"){
      // Two ascending tones — uplifting
      osc.frequency.setValueAtTime(440,ctx.currentTime);
      osc.frequency.setValueAtTime(660,ctx.currentTime+0.15);
      gain.gain.setValueAtTime(0.18,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime+0.5);
    } else {
      // Descending resolution — satisfying end
      osc.frequency.setValueAtTime(660,ctx.currentTime);
      osc.frequency.setValueAtTime(523,ctx.currentTime+0.15);
      osc.frequency.setValueAtTime(392,ctx.currentTime+0.3);
      gain.gain.setValueAtTime(0.18,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.65);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime+0.65);
    }
  }catch(e){}
}

// ── Animated shift background ──
function ShiftBg({type}){
  const seeds=useMemo(()=>Array.from({length:type==="night"?22:type==="afternoon"?8:12},(_,i)=>({
    id:i,
    x:Math.random()*100,
    y:Math.random()*100,
    size:Math.random()*18+8,
    delay:Math.random()*4,
    dur:3+Math.random()*4,
  })),[type]);

  if(type==="night"){
    return(
      <div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
        {seeds.map(s=>(
          <div key={s.id} style={{
            position:"absolute",left:`${s.x}%`,top:`${s.y}%`,
            fontSize:`${s.size}px`,opacity:0,
            animation:`twinkle ${s.dur}s ${s.delay}s ease-in-out infinite`,
          }}>⭐</div>
        ))}
      </div>
    );
  }
  if(type==="regular"){
    return(
      <div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
        {seeds.map(s=>(
          <div key={s.id} style={{
            position:"absolute",left:`${s.x}%`,top:`${s.y}%`,
            fontSize:`${s.size}px`,opacity:0,
            animation:`sunRise ${s.dur}s ${s.delay}s ease-in-out infinite`,
          }}>{s.id%3===0?"☀️":s.id%3===1?"🌤️":"✨"}</div>
        ))}
      </div>
    );
  }
  if(type==="afternoon"){
    return(
      <div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
        {seeds.map(s=>(
          <div key={s.id} style={{
            position:"absolute",left:`${s.x}%`,top:`${s.y}%`,
            fontSize:`${s.size}px`,opacity:0,
            animation:`drift ${s.dur}s ${s.delay}s ease-in-out infinite`,
          }}>{s.id%2===0?"🌤️":"🌥️"}</div>
        ))}
      </div>
    );
  }
  return null;
}

function ClockScreen({clockIn,setClockIn,als,cfg,onShiftSaved,privacyMode}){
  const uT=useT();
  const lang=React.useContext(LangCtx);
  const[tick,setTick]=useState(0);
  const[selAls,setSelAls]=useState([]);
  const[note,setNote]=useState("");
  const[inMsg,setInMsg]=useState(null);
  const[outMsg,setOutMsg]=useState(null);
  const[shortMsg,setShortMsg]=useState(null);
  const[confetti,setConfetti]=useState([]);

  useEffect(()=>{
    if(!clockIn) return;
    const id=setInterval(()=>setTick(t=>t+1),1000);
    return()=>clearInterval(id);
  },[clockIn]);

  const shiftAls=als.filter(a=>a.active&&a.type==="per_shift");

  const handleClockIn=()=>{
    const now=new Date();
    const msg=randMsg(IN_MSGS[lang]||IN_MSGS.he);
    setInMsg(msg);
    haptic("in");
    playSound("in");
    setTimeout(()=>{
      setInMsg(null);
      const ci={date:tdy(),time:nowTime(),iso:now.toISOString(),type:detectShiftType(now.getHours(),cfg)};
      setClockIn(ci);
      LS.set(K.clockin,ci);
      setSelAls(shiftAls.map(a=>a.id));
    },2200);
  };

  const handleClockOut=()=>{
    if(!clockIn) return;
    const endTime=nowTime();
    const hours=ch(clockIn.time,endTime);
    if(hours<0.05){
      setShortMsg(true);
      setClockIn(null);LS.set(K.clockin,null);setSelAls([]);setNote("");
      setTimeout(()=>setShortMsg(null),2500);
      return;
    }
    const shift={id:Date.now(),date:clockIn.date,start:clockIn.time,end:endTime,type:clockIn.type,allowanceIds:selAls,note,templateName:""};
    onShiftSaved(shift);
    setClockIn(null);
    LS.set(K.clockin,null);
    setSelAls([]);setNote("");
    haptic("out");
    playSound("out");
    const msg=randMsg(OUT_MSGS[lang]||OUT_MSGS.he);
    setOutMsg(msg);
    // Confetti burst
    const pieces=Array.from({length:18},(_,i)=>({
      id:i, x:Math.random()*100, emoji:["💰","⭐","✨","🎉","💚","₪"][Math.floor(Math.random()*6)],
      delay:Math.random()*0.6, dur:1.2+Math.random()*0.8,
    }));
    setConfetti(pieces);
    setTimeout(()=>setConfetti([]),2800);
    setTimeout(()=>setOutMsg(null),3000);
  };

  const toggleAl=(id)=>setSelAls(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);

  const now=new Date();
  const curType=clockIn?clockIn.type:detectShiftType(now.getHours(),cfg);
  const sty=ST[curType]||ST.regular;

  // Funny message overlay
  if(inMsg||outMsg||shortMsg){
    if(shortMsg){
      return(
        <div style={{padding:"40px 24px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",textAlign:"center"}}>
          <div style={{fontSize:"72px",marginBottom:"20px"}}>⏱️</div>
          <div style={{fontSize:"20px",fontWeight:"900",color:"#f97316",lineHeight:"1.6",marginBottom:"16px"}}>
            {uT("cl_short_t")}<br/>{uT("cl_short_s")}
          </div>
          <div style={{fontSize:"16px",color:"var(--txt-d)",marginBottom:"8px"}}>{uT("cl_no_rec")}</div>
        </div>
      );
    }
    const msg=inMsg||outMsg;
    const isIn=!!inMsg;
    return(
      <div style={{padding:"40px 24px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",textAlign:"center",position:"relative"}}>
        {/* Confetti shows over the message */}
        {confetti.map(p=>(
          <div key={p.id} style={{position:"fixed",top:0,left:`${p.x}%`,fontSize:"22px",pointerEvents:"none",zIndex:999,
            animation:`confettiFall ${p.dur}s ${p.delay}s ease-in forwards`}}>
            {p.emoji}
          </div>
        ))}
        <div style={{fontSize:"72px",marginBottom:"20px"}}>{msg.emoji}</div>
        <div style={{fontSize:"20px",fontWeight:"900",color:isIn?"#4ade80":"#fbbf24",lineHeight:"1.5",marginBottom:"16px"}}>
          {msg.text}
        </div>
        <div style={{fontSize:"13px",color:"var(--txt-dd)"}}>
          {isIn?uT("cl_recording"):uT("cl_saved")}
        </div>
      </div>
    );
  }

  return(
    <div style={{padding:"12px 16px 16px",position:"relative",overflow:"hidden"}}>
      <ShiftBg type={curType}/>
      {confetti.map(p=>(
        <div key={p.id} style={{position:"fixed",top:0,left:`${p.x}%`,fontSize:"20px",pointerEvents:"none",zIndex:999,
          animation:`confettiFall ${p.dur}s ${p.delay}s ease-in forwards`}}>
          {p.emoji}
        </div>
      ))}

      {/* Header: date + clock + badge */}
      <div style={{textAlign:"center",marginBottom:"12px",position:"relative",zIndex:5}}>
        <div style={{fontSize:"12px",color:"var(--txt-d)",marginBottom:"2px"}}>
          {new Date().toLocaleDateString(uT("locale"),{weekday:"long",day:"numeric",month:"long"})}
        </div>
        <LiveClock/>
        <div style={{display:"inline-flex",alignItems:"center",gap:"6px",background:t.bg,border:`1px solid ${t.color}`,borderRadius:"20px",padding:"3px 12px",marginTop:"6px"}}>
          <span style={{fontSize:"13px"}}>{sty.icon}</span>
          <span style={{fontSize:"12px",color:sty.color,fontWeight:"700"}}>{uT("cl_shift")} {uT("st_"+curType)}</span>
        </div>
      </div>

      {!clockIn?(
        <div style={{position:"relative",zIndex:5}}>
          <button onClick={handleClockIn} style={{
            width:"100%",padding:"26px 0",borderRadius:"22px",cursor:"pointer",
            background:"linear-gradient(145deg,#052e16,#14532d)",
            border:"2px solid #22c55e",
            display:"flex",flexDirection:"column",alignItems:"center",gap:"10px",
            boxShadow:"0 0 40px #22c55e33",
            animation:"glowPulse 2.5s ease-in-out infinite",
          }}>
            <div style={{fontSize:"48px"}}>▶</div>
            <div style={{fontSize:"22px",fontWeight:"900",color:"#4ade80"}}>{uT("cl_in")}</div>
            <div style={{fontSize:"12px",color:"#86efac"}}>{nowTime()}</div>
          </button>
          <div style={{marginTop:"12px",textAlign:"center",fontSize:"12px",color:"var(--divider2)"}}>
            {uT("cl_in_hint")}
          </div>
        </div>
      ):(
        <div style={{position:"relative",zIndex:5}}>
          <LiveEarnings clockIn={clockIn} cfg={cfg} selAls={selAls} als={als} privacyMode={privacyMode}/>

          {shiftAls.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"10px"}}>
              {shiftAls.map(a=>{const on=selAls.includes(a.id);return(
                <button key={a.id} onClick={()=>toggleAl(a.id)} style={{padding:"8px 12px",borderRadius:"10px",cursor:"pointer",border:`1.5px solid ${on?"#34d399":"var(--inp-b)"}`,background:on?"#022c22":"var(--bg2)",color:on?"#34d399":"var(--txt-d)",fontWeight:"700",fontSize:"12px"}}>
                  🧾 {a.name} {fM(a.amount)}
                </button>
              );})}
            </div>
          )}

          <input type="text" value={note} onChange={e=>setNote(e.target.value)}
            placeholder={uT("cl_note_ph")}
            style={{...SI,fontSize:"13px",marginBottom:"10px",width:"100%",boxSizing:"border-box"}}/>

          <button onClick={handleClockOut} style={{
            width:"100%",padding:"20px 0",borderRadius:"20px",cursor:"pointer",
            background:"linear-gradient(145deg,#2d0505,#7f1d1d)",
            border:"2px solid #ef4444",
            display:"flex",flexDirection:"column",alignItems:"center",gap:"8px",
            boxShadow:"0 0 24px #ef444433",
          }}>
            <div style={{fontSize:"36px"}}>⏹</div>
            <div style={{fontSize:"19px",fontWeight:"900",color:"#f87171"}}>{uT("cl_out")}</div>
          </button>
        </div>
      )}
    </div>
  );
}

function LiveClock(){
  const[time,setTime]=useState(nowTime());
  useEffect(()=>{const id=setInterval(()=>setTime(nowTime()),1000);return()=>clearInterval(id);},[]);
  return <div style={{fontSize:"48px",fontWeight:"900",color:"var(--txt-hi)",letterSpacing:"2px",fontVariantNumeric:"tabular-nums"}}>{time}</div>;
}

// ════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════
function Dashboard({shifts,cfg,als,selM,setSelM,privacyMode}){
  const t=useT();
  const[nowStr,setNowStr]=useState(nowTime());
  useEffect(()=>{const id=setInterval(()=>setNowStr(nowTime()),30000);return()=>clearInterval(id);},[]);
  const[showNet,setShowNet]=useState(true);
  const[flipKey,setFlipKey]=useState(0);
  const toggleCard=()=>{setShowNet(v=>!v);setFlipKey(k=>k+1);};
  const ms=shifts.filter(s=>s.date.startsWith(selM));
  const wMap=buildWeeklyThresholdMap(shifts,cfg);
  let tG=0,tA=0,tH=0,regH=0,aftH=0,ngtH=0,ot125=0,ot150=0,tBase=0;
  ms.forEach(s=>{
    const h=ch(s.start,s.end);
    const c=getShiftPay(s,cfg,wMap[s.id]);
    const sa=isSpecialDay(s.type)?0:csa(s.allowanceIds||[],als);
    tG+=c.gross;tA+=sa;if(!isSpecialDay(s.type))tH+=h;
    // שכר בסיס = שעות רגילות בלבד (ללא שעות נוספות) — בסיס לפנסיה וקרן השתלמות
    tBase+=(c.regPay!==undefined?c.regPay:c.gross);
    // פירוט שעות לפי תקופה: cpAuto מחזיר periodH, cp מחזיר רק type
    if(c.periodH){regH+=c.periodH.regular;aftH+=c.periodH.afternoon;ngtH+=c.periodH.night;}
    else if(!isSpecialDay(s.type)){
      if(s.type==="regular")regH+=c.regH||0;
      if(s.type==="afternoon")aftH+=c.regH||0;
      if(s.type==="night")ngtH+=c.regH||0;
    }
    ot125+=c.ot125H||0;ot150+=c.ot150H||0;
  });
  tA+=cma(als);
  // חגים בתשלום אוטומטיים — חגים שאין עבורם אף משמרת מוגדרת
  const recordedDates=new Set(ms.map(s=>s.date));
  const autoHolDays=Object.entries(IL_HOLIDAYS).filter(([d,h])=>d.startsWith(selM)&&h.paid&&!recordedDates.has(d));
  const holPay=autoHolDays.length*(cfg.baseRate||34.32)*(cfg.overtimeThreshold||8.6);
  tG+=holPay;tBase+=holPay;
  const dedBase=tG+tA; // ברוטו כולל תוספות — בסיס לביטוח לאומי ומס הכנסה
  const ded=cfg.enableDeductions?cd(dedBase,cfg,tBase):null;
  const net=ded?dedBase-ded.tot:dedBase;
  const nav=(dir)=>{const[y,m]=selM.split("-").map(Number);const d=new Date(y,m-1+dir);setSelM(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);};

  // Live OT detection
  const today=tdy();const nowMins=pt(nowStr);
  let activeShift=null,hoursNow=0;
  for(const s of shifts.filter(s=>s.date===today&&!isSpecialDay(s.type)&&s.start&&s.end)){
    const sm=pt(s.start),em=pt(s.end);
    const inShift=(sm>em)?(nowMins>=sm||nowMins<=em):(nowMins>=sm&&nowMins<=em);
    if(inShift){activeShift=s;hoursNow=ch(s.start,nowStr);break;}
  }
  const wkKey=activeShift?getWeekKey(today,activeShift.start):"";
  const weekHT=activeShift?shifts.filter(s=>!isSpecialDay(s.type)&&s.id!==activeShift.id&&getWeekKey(s.date,s.start)===wkKey).reduce((a,s)=>a+ch(s.start,s.end),0)+hoursNow:0;
  const dTh=cfg.overtimeThreshold||8.6,wTh=cfg.weeklyOTThreshold||42;
  const isDOT=activeShift&&hoursNow>dTh,isWOT=activeShift&&weekHT>wTh;
  const OTM={
    daily:[{e:"🔥",t:t("ot_d0t"),s:t("ot_d0s")},{e:"⚡",t:t("ot_d1t"),s:t("ot_d1s")},{e:"💪",t:t("ot_d2t"),s:t("ot_d2s")}],
    weekly:[{e:"🚀",t:t("ot_w0t"),s:t("ot_w0s")},{e:"💥",t:t("ot_w1t"),s:t("ot_w1s")}],
    both:[{e:"🤯",t:t("ot_b0t"),s:t("ot_b0s")},{e:"🎯",t:t("ot_b1t"),s:t("ot_b1s")}],
  };
  const msgArr=(isDOT&&isWOT)?OTM.both:isDOT?OTM.daily:OTM.weekly;
  const otMsg=(isDOT||isWOT)?msgArr[Math.floor(Date.now()/(1000*60*5))%msgArr.length]:null;

  return(
    <div style={{padding:"16px",paddingBottom:"20px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"18px"}}>
        <button onClick={()=>nav(1)} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"9px",width:"36px",height:"36px",fontSize:"20px",cursor:"pointer"}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:"18px",fontWeight:"800",color:"var(--txt-hi)"}}>{mLbl(selM)}</div>
          {selM===tdy().substring(0,7)&&<div style={{fontSize:"11px",color:"#22c55e",marginTop:"2px"}}>{t("d_cur_month")}</div>}
        </div>
        <button onClick={()=>nav(-1)} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"9px",width:"36px",height:"36px",fontSize:"20px",cursor:"pointer"}}>›</button>
      </div>

      {otMsg&&(
        <div style={{background:"linear-gradient(135deg,#431407,#7c2d12)",border:"1px solid #f97316",borderRadius:"16px",padding:"16px",marginBottom:"12px",animation:"otGlow 2s ease-in-out infinite",textAlign:"center"}}>
          <div style={{fontSize:"28px",marginBottom:"6px"}}>{otMsg.e}</div>
          <div style={{fontSize:"15px",fontWeight:"900",color:"#fed7aa",marginBottom:"4px"}}>{otMsg.t}</div>
          <div style={{fontSize:"12px",color:"#fb923c",marginBottom:"10px"}}>{otMsg.s}</div>
          <div style={{display:"flex",justifyContent:"center",gap:"16px",fontSize:"11px",color:"var(--txt-m)"}}>
            {isDOT&&<span>{t("ot_daily")} <b style={{color:"#f97316"}}>{fH(hoursNow-dTh)}</b>{t("ot_above_th")}</span>}
            {isWOT&&<span>{t("ot_weekly")} <b style={{color:"#f97316"}}>{fH(weekHT-wTh)}</b>{t("ot_above_th")}</span>}
          </div>
        </div>
      )}

      <div
        onClick={ded?(()=>toggleCard()):undefined}
        style={{
          background:"linear-gradient(145deg,#041f10,#0a3a1a,#14532d)",
          border:"1px solid #166534",borderRadius:"18px",padding:"20px",
          marginBottom:"12px",textAlign:"center",position:"relative",overflow:"hidden",
          cursor:ded?"pointer":"default",
          boxShadow:"0 4px 24px #22c55e18",
        }}>
        {/* Decorative circles */}
        <div style={{position:"absolute",top:"-30px",right:"-30px",width:"100px",height:"100px",background:"#22c55e18",borderRadius:"50%",pointerEvents:"none"}}/>
        <div style={{position:"absolute",bottom:"-20px",left:"-20px",width:"70px",height:"70px",background:"#22c55e0e",borderRadius:"50%",pointerEvents:"none"}}/>

        {ms.length===0&&holPay===0?(
          <div style={{padding:"10px 0"}}>
            <div style={{fontSize:"36px",marginBottom:"10px"}}>📭</div>
            <div style={{fontSize:"14px",fontWeight:"700",color:"#86efac",marginBottom:"4px"}}>{t("d_no_shifts")}</div>
            <div style={{fontSize:"11px",color:"#4ade8055"}}>{t("d_add_hint")}</div>
          </div>
        ):ded?(
          <>
            {/* Toggle pill */}
            <div style={{display:"inline-flex",background:"#041f10",borderRadius:"20px",padding:"3px",marginBottom:"14px",border:"1px solid #166534"}}>
              {[{v:true,lbl:t("d_neto")},{v:false,lbl:t("cl_gross_lbl")}].map(({v,lbl})=>(
                <div key={String(v)} onClick={e=>{e.stopPropagation();setShowNet(v);setFlipKey(k=>k+1);}} style={{
                  padding:"4px 14px",borderRadius:"16px",fontSize:"11px",fontWeight:"700",cursor:"pointer",
                  background:showNet===v?"#22c55e":"none",
                  color:showNet===v?"#000":"var(--txt-dd)",
                  transition:"all 0.2s ease",
                }}>{lbl}</div>
              ))}
            </div>
            {/* Main number — animates on flip */}
            <div key={flipKey} style={{animation:"staggerIn 0.2s ease-out"}}>
              <div style={{fontSize:"11px",color:"#86efac99",letterSpacing:"1px",fontWeight:"700",marginBottom:"4px"}}>
                {showNet?t("d_net"):t("d_taxable")}
              </div>
              <div style={{fontSize:"40px",fontWeight:"900",color:"#4ade80",letterSpacing:"-2px",lineHeight:1}}>
                {prv(showNet?net:dedBase,privacyMode)}
              </div>
              {showNet?(
                <div style={{fontSize:"11px",color:"#86efac55",marginTop:"4px"}}>
                  {t("cl_gross_lbl")} {prv(dedBase,privacyMode)} · {t("d_deductions")} -{prv(ded.tot,privacyMode)}
                </div>
              ):(
                <div style={{fontSize:"11px",color:"#86efac55",marginTop:"4px"}}>
                  {prv(tG,privacyMode)} {t("d_salary")} + {prv(tA,privacyMode)} {t("d_allowances")}
                </div>
              )}
            </div>
            {cfg.monthlyGoal>0&&(()=>{
              const pct=Math.min(100,Math.round(net/cfg.monthlyGoal*100));
              return(
                <div style={{marginTop:"14px",width:"100%"}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"var(--txt-d)",marginBottom:"5px"}}>
                    <span>{t("d_goal_net")}</span><span style={{color:pct>=100?"#4ade80":"var(--txt-d)",fontWeight:"700"}}>{pct}%</span>
                  </div>
                  <div style={{background:"#041f10",borderRadius:"6px",height:"8px",overflow:"hidden"}}>
                    <div style={{width:`${pct}%`,height:"100%",background:pct>=100?"linear-gradient(90deg,#4ade80,#22d3ee)":"linear-gradient(90deg,#16a34a,#4ade80)",borderRadius:"6px",transition:"width 0.4s ease"}}/>
                  </div>
                  <div style={{fontSize:"10px",color:"var(--txt-d)",marginTop:"3px"}}>{prv(net,privacyMode)} {t("d_of")} {prv(cfg.monthlyGoal,privacyMode)}</div>
                </div>
              );
            })()}
          </>
        ):(
          <>
            <div style={{fontSize:"11px",color:"#86efac",letterSpacing:"1.5px",fontWeight:"700",marginBottom:"8px"}}>{t("d_est_salary")}</div>
            <div style={{fontSize:"40px",fontWeight:"900",color:"#4ade80",letterSpacing:"-2px",lineHeight:1}}>{prv(tG+tA,privacyMode)}</div>
            {cfg.monthlyGoal>0&&(()=>{const pct=Math.min(100,Math.round((tG+tA)/cfg.monthlyGoal*100));return(
              <div style={{marginTop:"10px",width:"100%"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"var(--txt-d)",marginBottom:"4px"}}>
                  <span>{t("d_goal")}</span><span style={{color:pct>=100?"#4ade80":"var(--txt-d)"}}>{pct}%</span>
                </div>
                <div style={{background:"#041f10",borderRadius:"6px",height:"8px",overflow:"hidden"}}>
                  <div style={{width:`${pct}%`,height:"100%",background:pct>=100?"linear-gradient(90deg,#4ade80,#22d3ee)":"linear-gradient(90deg,#16a34a,#4ade80)",borderRadius:"6px",transition:"width 0.4s ease"}}/>
                </div>
                <div style={{fontSize:"10px",color:"var(--txt-d)",marginTop:"3px"}}>{prv(tG+tA,privacyMode)} {t("d_of")} {prv(cfg.monthlyGoal,privacyMode)}</div>
              </div>
            );})()}
          </>
        )}
        {(ms.length>0||holPay>0)&&<div style={{color:"#4ade8066",fontSize:"11px",marginTop:"12px"}}>{fH(tH)} {t("d_hours")} · {ms.filter(s=>!isSpecialDay(s.type)).length} {t("d_shifts")}{autoHolDays.length>0?` + ${autoHolDays.length} ${t("d_hol_days")}`:""}</div>}
        {holPay>0&&<div style={{fontSize:"11px",color:"#fcd34d",marginTop:"4px"}}>✡️ {autoHolDays.length} {t("d_paid_hol")} · {prv(holPay,privacyMode)}</div>}
      </div>

      {tA>0&&(
        <div style={{...CARD,marginBottom:"10px",background:"#0d1f1a",border:"1px solid #065f46"}}>
          <div style={{fontSize:"12px",color:"#6ee7b7",fontWeight:"700",marginBottom:"10px"}}>{t("d_monthly_allow")}</div>
          {als.filter(a=>a.active&&a.type==="per_shift").map(a=>{
            const cnt=ms.filter(s=>(s.allowanceIds||[]).includes(a.id)).length;
            if(!cnt)return null;
            return(
              <div key={a.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #065f46"}}>
                <span style={{fontSize:"13px",color:"var(--txt-m)"}}>{a.name} <span style={{color:"var(--txt-dd)"}}>×{cnt}</span></span>
                <span style={{fontSize:"14px",fontWeight:"700",color:"#34d399"}}>{prv(a.amount*cnt,privacyMode)}</span>
              </div>
            );
          })}
          {als.filter(a=>a.active&&a.type==="per_month").map(a=>(
            <div key={a.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #065f46"}}>
              <span style={{fontSize:"13px",color:"var(--txt-m)"}}>{a.name} {t("d_monthly")}</span>
              <span style={{fontSize:"14px",fontWeight:"700",color:"#34d399"}}>{prv(a.amount,privacyMode)}</span>
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",paddingTop:"8px"}}>
            <span style={{fontSize:"13px",color:"var(--txt-d)",fontWeight:"700"}}>{t("d_total_allow")}</span>
            <span style={{fontSize:"15px",fontWeight:"900",color:"#34d399"}}>{prv(tA,privacyMode)}</span>
          </div>
        </div>
      )}

      {ded&&tG>0&&(
        <>
          <div style={{...CARD,marginBottom:"10px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"10px"}}>
              <div style={SEC}>{t("d_deductions")}</div>
              <div style={{fontSize:"10px",color:"var(--txt-dd)"}}>{t("d_bl_tax")} {prv(dedBase,privacyMode)} · {t("d_pen_ker")} {prv(tBase,privacyMode)}</div>
            </div>
            {[
              {l:t("ded_tax"),v:ded.tx,c:"#f87171",p:cfg.taxRate},
              {l:t("ded_ni"),v:ded.bl,c:"#fb923c",p:cfg.bituachLeumi,capped:ded.cappedNI},
              {l:t("ded_health"),v:ded.br,c:"#facc15",p:cfg.masBriut,capped:ded.cappedNI},
              {l:t("ded_pension_e"),v:ded.pe,c:"#60a5fa",p:cfg.pensionEmployee},
              {l:t("ded_keren_e"),v:ded.ke,c:"#a78bfa",p:cfg.kerenEmployee},
            ].map((r,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<4?"1px solid #1f2937":"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
                  <div style={{width:"3px",height:"14px",borderRadius:"2px",background:r.c}}/>
                  <span style={{fontSize:"13px",color:"var(--txt-m)"}}>{r.l}</span>
                  <span style={{fontSize:"10px",color:"var(--divider2)"}}>{r.p}%</span>
                  {r.capped&&<span style={{fontSize:"9px",color:"#4ade80",fontWeight:"700"}}>{t("d_ceiling")}</span>}
                </div>
                <span style={{fontSize:"14px",fontWeight:"700",color:r.c}}>-{prv(r.v,privacyMode)}</span>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",paddingTop:"8px"}}>
              <span style={{fontSize:"13px",color:"var(--txt-d)",fontWeight:"700"}}>{t("d_total_ded")}</span>
              <span style={{fontSize:"15px",fontWeight:"900",color:"#f87171"}}>-{prv(ded.tot,privacyMode)}</span>
            </div>
          </div>
          <div style={{...CARD,marginBottom:"12px",background:"#0d1b2a",border:"1px solid #1e3a5f"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>

                <div style={{fontSize:"15px",fontWeight:"800",color:"#60a5fa"}}>{prv(ded.pr,privacyMode)}</div>
                <div style={{fontSize:"9px",color:"#1e3a5f",marginTop:"1px"}}>{t("d_worker")}: {prv(ded.pe,privacyMode)} | {t("d_total")}: {prv(ded.pe+ded.pr,privacyMode)}</div>

                <div style={{fontSize:"9px",color:"#3b0764",marginTop:"1px"}}>{t("d_worker")}: {prv(ded.ke,privacyMode)} | {t("d_total")}: {prv(ded.ke+ded.kr,privacyMode)}</div>

// CUSTOM SHIFT CALENDAR
// ════════════════════════════════════════
function ShiftCalendar({value,onChange,shifts,cfg,als,onEditShift,onDeleteShift,inline=false}){
  const[open,setOpen]=useState(false);
  const[selectedDay,setSelectedDay]=useState(null); // date string for detail panel
  const[viewDate,setViewDate]=useState(()=>{
    const d=value?new Date(value+"T12:00:00"):new Date();
    return{y:d.getFullYear(),m:d.getMonth()};
  });

  const wMap=buildWeeklyThresholdMap(shifts,cfg);
  // Build shift map: date -> [shifts]
  const shiftMap={};
  shifts.forEach(s=>{
    if(!shiftMap[s.date]) shiftMap[s.date]=[];
    shiftMap[s.date].push(s);
  });

  const daysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
  const firstDay=(y,m)=>new Date(y,m,1).getDay();

  const{y,m}=viewDate;
  const days=daysInMonth(y,m);
  const startDay=firstDay(y,m);
  const monthNames=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
  const dayNames=["א","ב","ג","ד","ה","ו","ש"];

  const prevMonth=()=>{setSelectedDay(null);setViewDate(({y,m})=>{const d=new Date(y,m-1);return{y:d.getFullYear(),m:d.getMonth()};});};
  const nextMonth=()=>{setSelectedDay(null);setViewDate(({y,m})=>{const d=new Date(y,m+1);return{y:d.getFullYear(),m:d.getMonth()};});};

  const handleDayClick=(d)=>{
    const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    if(inline){
      onChange(ds);
      if(shiftMap[ds]&&shiftMap[ds].length>0){
        setSelectedDay(ds===selectedDay?null:ds);
      } else {
        setSelectedDay(null);
      }
      return;
    }
    if(shiftMap[ds]&&shiftMap[ds].length>0){
      setSelectedDay(ds===selectedDay?null:ds);
    } else if(IL_HOLIDAYS[ds]){
      setSelectedDay(ds===selectedDay?null:ds);
    } else {
      onChange(ds);setOpen(false);setSelectedDay(null);
    }
  };

  const selectedShifts=selectedDay?shiftMap[selectedDay]||[]:[];

  const displayDate=value?new Date(value+"T12:00:00").toLocaleDateString("he-IL",{weekday:"short",day:"numeric",month:"long",year:"numeric"}):"בחר תאריך";

  const calBody=(
    <div style={inline?{background:"var(--card)",padding:"12px 8px 8px",width:"100%",boxSizing:"border-box"}:{position:"absolute",top:"100%",right:0,left:0,zIndex:50,background:"var(--card)",border:"1px solid #1f2937",borderRadius:"14px",padding:"14px",marginTop:"6px",boxShadow:"0 10px 40px #000a"}}>
          {/* Month nav */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
            <button onClick={prevMonth} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"8px",width:"32px",height:"32px",fontSize:"18px",cursor:"pointer"}}>‹</button>
            <div style={{fontWeight:"800",color:"var(--txt-hi)",fontSize:"15px"}}>{monthNames[m]} {y}</div>
            <button onClick={nextMonth} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"8px",width:"32px",height:"32px",fontSize:"18px",cursor:"pointer"}}>›</button>
          </div>

          {/* Day headers */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px",marginBottom:"6px"}}>
            {dayNames.map((d,i)=>(
              <div key={d} style={{textAlign:"center",fontSize:"11px",fontWeight:"700",padding:"4px 0",
                color:i===6?"#a78bfa":i===5?"#fb923c":"var(--txt-dd)"}}>{d}</div>
            ))}
          </div>

          {/* Days grid */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"4px"}}>
            {Array.from({length:startDay}).map((_,i)=><div key={"e"+i}/>)}
            {Array.from({length:days}).map((_,i)=>{
              const d=i+1;
              const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
              const dayShifts=shiftMap[ds]||[];
              const hasShift=dayShifts.length>0;
              const isSelected=value===ds;
              const isPanelOpen=selectedDay===ds;
              const isToday=ds===tdy();
              const holiday=IL_HOLIDAYS[ds];
              const firstType=hasShift?dayShifts[0].type:null;
              const tColor=firstType?(isSpecialDay(firstType)?SPECIAL[firstType].color:ST[firstType].color):null;
              const dow=new Date(ds+"T12:00:00").getDay();
              const isSat=dow===6;const isFri=dow===5;
              const weekendBase=isSat?"#1e1040":isFri?"#1c110055":"var(--bg2)";
              const bg=isSelected?"#22c55e":isPanelOpen?(tColor+"33"||"#1a2a1a"):hasShift?(tColor+"22"):isToday?"var(--divider)":holiday?"#fcd34d12":weekendBase;
              const border=isSelected?"2px solid #22c55e":isPanelOpen?`2px solid ${tColor||"#22c55e"}`:isToday?"2px solid #22c55e66":hasShift?`2px solid ${tColor}55`:isSat?"1px solid #3730a355":isFri?"1px solid #92400e55":"1px solid #1f2937";
              const textColor=isSelected?"#000":isToday?"#4ade80":hasShift?tColor:isSat?"#a78bfa":isFri?"#fb923c":"var(--txt)";
              return(
                <button key={d} onClick={()=>handleDayClick(d)} style={{
                  padding:"4px 2px 5px",borderRadius:"10px",border,cursor:"pointer",background:bg,
                  color:textColor,
                  fontWeight:isSelected||isToday||isPanelOpen?"800":"500",
                  fontSize:"13px",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",
                  minHeight:"48px",justifyContent:"flex-start",paddingTop:"7px",
                }}>
                  <span>{d}</span>
                  <span style={{fontSize:"11px",lineHeight:1}}>
                    {hasShift
                      ? (isSpecialDay(dayShifts[0].type)?SPECIAL[dayShifts[0].type].icon:ST[dayShifts[0].type]?.icon)
                        +(dayShifts.length>1?" ·":"")
                      : holiday?<span style={{color:"#fcd34d"}}>{holiday.icon}</span>
                      : ""}
                  </span>
                </button>
              );
            })}
          </div>

          {/* Shift detail panel */}
          {selectedDay&&(selectedShifts.length>0||IL_HOLIDAYS[selectedDay])&&(
            <div style={{marginTop:"12px",borderTop:"1px solid #1f2937",paddingTop:"12px"}}>
              <div style={{fontSize:"12px",color:"var(--txt-d)",fontWeight:"700",marginBottom:"8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>{new Date(selectedDay+"T12:00:00").toLocaleDateString("he-IL",{weekday:"long",day:"numeric",month:"long"})}</span>
                {IL_HOLIDAYS[selectedDay]&&<span style={{fontSize:"12px",color:"#fcd34d",fontWeight:"700"}}>{IL_HOLIDAYS[selectedDay].icon} {IL_HOLIDAYS[selectedDay].name}</span>}
              </div>
              {IL_HOLIDAYS[selectedDay]&&selectedShifts.length===0&&(
                <div style={{background:"#2a1f00",border:"1px solid #fcd34d44",borderRadius:"10px",padding:"12px",marginBottom:"8px"}}>
                  <div style={{fontSize:"13px",color:"#fcd34d",fontWeight:"700"}}>{IL_HOLIDAYS[selectedDay].icon} {IL_HOLIDAYS[selectedDay].name}</div>
                  <div style={{fontSize:"11px",color:"var(--txt-d)",marginTop:"3px"}}>אין משמרת מוגדרת ליום זה</div>
                </div>
              )}
              {selectedShifts.map(s=>{
                const h=ch(s.start,s.end);
                const isSpec=isSpecialDay(s.type);
                const c=isSpec?SPECIAL[s.type]:(ST[s.type]||ST.regular);
                return(
                  <div key={s.id} style={{background:"var(--bg2)",border:`1px solid ${c.color}44`,borderRadius:"10px",padding:"10px",marginBottom:"8px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                          <span style={{fontSize:"14px"}}>{c.icon}</span>
                          <span style={{fontSize:"13px",fontWeight:"700",color:c.color}}>{c.label}</span>
                        </div>
                        <div style={{fontSize:"12px",color:"var(--txt-d)",marginTop:"3px"}}>
                          {s.start} – {s.end} · {fH(h)} שעות
                        </div>
                        {s.note&&<div style={{fontSize:"11px",color:"var(--txt-dd)",marginTop:"2px"}}>📝 {s.note}</div>}
                      </div>
                      <div style={{fontSize:"14px",fontWeight:"800",color:"#4ade80"}}>{fM(getShiftTotal(s,cfg,als,wMap[s.id]))}</div>
                    </div>
                    <div style={{display:"flex",gap:"6px"}}>
                      <button onClick={()=>{onEditShift&&onEditShift(s);setOpen(false);setSelectedDay(null);}} style={{flex:1,padding:"7px",background:"#1e3a5f",border:"none",color:"#60a5fa",borderRadius:"8px",cursor:"pointer",fontWeight:"700",fontSize:"12px"}}>✏️ ערוך</button>
                      <button onClick={()=>{onDeleteShift&&onDeleteShift(s.id);if(selectedShifts.length<=1)setSelectedDay(null);}} style={{padding:"7px 10px",background:"#2d0505",border:"none",color:"#f87171",borderRadius:"8px",cursor:"pointer",fontWeight:"700",fontSize:"12px"}}>🗑</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Legend */}
          <div style={{display:"flex",gap:"10px",marginTop:"10px",paddingTop:"10px",borderTop:"1px solid #1f2937",justifyContent:"center",flexWrap:"wrap"}}>
            {Object.entries(ST).map(([k,t])=>(
              <div key={k} style={{display:"flex",alignItems:"center",gap:"4px"}}>
                <span style={{fontSize:"12px"}}>{t.icon}</span>
                <span style={{fontSize:"10px",color:t.color}}>{t.label}</span>
              </div>
            ))}
            <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
              <span style={{fontSize:"12px"}}>🕯️</span>
              <span style={{fontSize:"10px",color:"#fcd34d"}}>חג / אירוע</span>
            </div>
          </div>
        </div>
  );
  if(inline) return calBody;
  return(
    <div style={{position:"relative"}}>
      <button onClick={()=>{setOpen(!open);setSelectedDay(null);}} style={{...SI,textAlign:"right",cursor:"pointer",background:"var(--bg2)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:value?"var(--txt)":"var(--txt-dd)"}}>{displayDate}</span>
        <span style={{color:"var(--txt-dd)"}}>📅</span>
      </button>
      {open&&calBody}
    </div>
  );
}

// MANUAL ADD SHIFT
// ════════════════════════════════════════
function AddShift({cfg,tpls,als,shifts,onAdd,onEdit,onDelete,privacyMode}){
  const uT=useT();
  const sAls=als.filter(a=>a.active&&a.type==="per_shift");
  const defIds=sAls.map(a=>a.id);
  const[form,setForm]=useState({date:null,start:"",end:"",type:"regular",note:"",templateName:"",allowanceIds:defIds,customMult:null});
  const[saved,setSaved]=useState(false);const[err,setErr]=useState("");const[showT,setShowT]=useState(true);
  const[editingShift,setEditingShift]=useState(null);
  const hours=form.start&&form.end?ch(form.start,form.end):0;
  const prev=hours>0?(isSpecialDay(form.type)?calcSpecialPay(hours,form.type,cfg):cp(hours,form.type,cfg,form.customMult)):null;
  const aTotal=csa(form.allowanceIds,als);
  const togA=(id)=>setForm(f=>({...f,allowanceIds:f.allowanceIds.includes(id)?f.allowanceIds.filter(x=>x!==id):[...f.allowanceIds,id]}));
  const applyT=(t)=>setForm(f=>({...f,start:t.start,end:t.end,type:t.type,templateName:t.name,customMult:t.customMult||null}));
  const selectDate=(ds)=>{
    const hol=IL_HOLIDAYS[ds];
    const autoType=hol?.paid?"holiday":"regular";
    setForm(f=>({...f,date:ds,type:autoType,start:"",end:"",templateName:""}));
  };
  const add=()=>{
    if(!form.date){setErr(uT("as_err_date"));return;}
    const isSpec=isSpecialDay(form.type);
    // ימים מיוחדים — שעות ברירת מחדל אם לא הוזנו
    const start=form.start||(isSpec?"08:00":"");
    const end=form.end||(isSpec?`${String(Math.floor(8+cfg.overtimeThreshold)).padStart(2,"0")}:${String(Math.round((cfg.overtimeThreshold%1)*60)).padStart(2,"0")}`:"");
    if(!isSpec&&(!start||!end)){setErr(uT("as_err_times"));return;}
    const h=ch(start,end);
    if(!isSpec&&h<0.1){setErr(uT("as_err_hours"));return;}
    setErr("");onAdd({...form,id:Date.now(),start,end});setSaved(true);
    setForm({date:null,start:"",end:"",type:"regular",note:"",templateName:"",allowanceIds:defIds,customMult:null});
    setTimeout(()=>setSaved(false),2000);
  };
  const hol=form.date?IL_HOLIDAYS[form.date]:null;
  return(
    <div style={{paddingBottom:"20px",width:"100%",boxSizing:"border-box"}}>
      {editingShift&&<EditModal shift={editingShift} cfg={cfg} als={als} onSave={s=>{onEdit(s);setEditingShift(null);}} onClose={()=>setEditingShift(null)}/>}
      <div style={{fontSize:"15px",fontWeight:"800",marginBottom:"10px",color:"var(--txt-hi)",padding:"12px 16px 0"}}>{uT("as_pick_day")}</div>
      <ShiftCalendar inline value={form.date} onChange={selectDate} shifts={shifts} cfg={cfg} als={als} onEditShift={s=>setEditingShift(s)} onDeleteShift={id=>onDelete(id)}/>

      {form.date&&(
        <div style={{marginTop:"16px",padding:"0 16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px",paddingBottom:"12px",borderTop:"1px solid #1f2937",paddingTop:"12px"}}>
            <div>
              <div style={{fontSize:"14px",fontWeight:"800",color:"var(--txt)"}}>{new Date(form.date+"T12:00:00").toLocaleDateString(uT("locale"),{weekday:"long",day:"numeric",month:"long"})}</div>
              {hol&&<div style={{fontSize:"12px",color:hol.paid?"#fcd34d":"var(--txt-d)",marginTop:"2px"}}>{hol.icon} {hol.name}{hol.paid?" · "+uT("as_auto_hol"):""}</div>}
            </div>
            <button onClick={()=>setForm(f=>({...f,date:null}))} style={{background:"var(--divider)",border:"none",color:"var(--txt-m)",borderRadius:"8px",padding:"6px 10px",cursor:"pointer",fontSize:"12px"}}>{uT("as_change")}</button>
          </div>

          {tpls.length>0&&!isSpecialDay(form.type)&&(
            <div style={{marginBottom:"14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                <div style={LBL}>{uT("as_template")}</div>
                <button onClick={()=>setShowT(!showT)} style={{background:"none",border:"none",color:"#60a5fa",fontSize:"12px",cursor:"pointer"}}>{showT?uT("as_hide"):uT("as_show")}</button>
              </div>
              {showT&&<div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                {tpls.map(t=>{
                  const color=t.color||ST[t.type].color;
                  const emoji=t.emoji||ST[t.type].icon;
                  const pct=t.customMult||Math.round(ST[t.type].mult*100);
                  const active=form.templateName===t.name;
                  return(
                    <button key={t.id} onClick={()=>applyT(t)} style={{background:active?color+"22":"var(--bg2)",border:`1.5px solid ${active?color:"var(--inp-b)"}`,borderRadius:"10px",padding:"10px 12px",cursor:"pointer",color:active?color:"var(--txt-m)",textAlign:"right"}}>
                      <div style={{fontWeight:"800",fontSize:"13px"}}>{emoji} {t.name}</div>
                      <div style={{fontSize:"11px",opacity:0.8,marginTop:"2px"}}>{t.start}–{t.end} · {fH(ch(t.start,t.end))}{uT("hr")} · {pct}%</div>
                    </button>
                  );
                })}
              </div>}
            </div>
          )}

          {!isSpecialDay(form.type)&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}}>
              <Field label={uT("as_start")}><input type="time" value={form.start} onChange={e=>setForm({...form,start:e.target.value,templateName:""})} style={SI}/></Field>
              <Field label={uT("as_end")}><input type="time" value={form.end} onChange={e=>setForm({...form,end:e.target.value,templateName:""})} style={SI}/></Field>
            </div>
          )}

          <Field label={uT("as_shift_type")}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
              {Object.entries(ST).filter(([k])=>cfg[k==="regular"?"morningEnabled":k==="afternoon"?"afternoonEnabled":"nightEnabled"]!==false).map(([k,t])=>(
                <button key={k} onClick={()=>setForm({...form,type:k})} style={{padding:"12px 6px",borderRadius:"11px",cursor:"pointer",border:form.type===k?`2px solid ${t.color}`:"2px solid #1f2937",background:form.type===k?t.bg:"var(--bg2)",color:form.type===k?t.color:"var(--txt-d)",fontWeight:"700",fontSize:"13px"}}>
                  <div style={{fontSize:"16px",marginBottom:"3px"}}>{t.icon}</div><div>{uT("st_"+k)}</div>
                </button>
              ))}
            </div>
          </Field>

          <Field label={uT("as_special")}>
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
              {Object.entries(SPECIAL).map(([k,s])=>(
                <button key={k} onClick={()=>setForm({...form,type:form.type===k?"regular":k})} style={{padding:"10px 12px",borderRadius:"10px",cursor:"pointer",border:`1.5px solid ${form.type===k?s.color:"var(--inp-b)"}`,background:form.type===k?s.bg:"var(--bg2)",color:form.type===k?s.color:"var(--txt-d)",fontWeight:"700",fontSize:"12px",textAlign:"right"}}>
                  <div style={{fontSize:"16px",marginBottom:"3px"}}>{s.icon}</div>
                  <div>{s.label}</div>
                  <div style={{fontSize:"10px",opacity:0.7,marginTop:"2px"}}>{s.desc}</div>
                </button>
              ))}
            </div>
            {isSpecialDay(form.type)&&<div style={{marginTop:"8px",fontSize:"11px",color:"var(--txt-dd)",background:"var(--card)",borderRadius:"8px",padding:"8px"}}>{uT("as_no_ot")}</div>}
          </Field>

          {sAls.length>0&&!isSpecialDay(form.type)&&(
            <Field label={uT("as_allowances")}>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                {sAls.map(a=>{const on=form.allowanceIds.includes(a.id);return(
                  <button key={a.id} onClick={()=>togA(a.id)} style={{padding:"10px 14px",borderRadius:"10px",cursor:"pointer",border:`1.5px solid ${on?"#34d399":"var(--inp-b)"}`,background:on?"#022c22":"var(--bg2)",color:on?"#34d399":"var(--txt-d)",fontWeight:"700",fontSize:"13px"}}>
                    🧾 {a.name} {fM(a.amount)}
                  </button>
                );})}
              </div>
            </Field>
          )}
          {prev&&(
            <div style={{background:isSpecialDay(form.type)?(SPECIAL[form.type].bg||"var(--card)"):"#052e16",border:`1px solid ${isSpecialDay(form.type)?SPECIAL[form.type].color+"44":"#166534"}`,borderRadius:"12px",padding:"14px",marginBottom:"14px"}}>
              <div style={{fontSize:"11px",color:isSpecialDay(form.type)?SPECIAL[form.type].color:"#86efac",marginBottom:"8px",fontWeight:"700"}}>{isSpecialDay(form.type)?SPECIAL[form.type].icon+" "+SPECIAL[form.type].label:uT("as_preview")}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:"13px",color:"var(--txt-d)"}}>{fH(hours)} {uT("hr")}</div>
                  {!isSpecialDay(form.type)&&prev.ot125H>0&&<div style={{fontSize:"12px",color:"#f87171"}}>{fH(prev.ot125H)}{uT("hr")} ×125%{prev.ot150H>0?` + ${fH(prev.ot150H)}${uT("hr")} ×150%`:""}</div>}
                  {isSpecialDay(form.type)&&<div style={{fontSize:"12px",color:"var(--txt-d)"}}>{SPECIAL[form.type].desc}</div>}

function Savings({shifts,cfg,privacyMode}){
  const uT=useT();
  const[savCfg,setSavCfg]=useState(()=>{
    const s=LS.get(K_SAV); return s?{...DEF_SAV_CFG,...s}:DEF_SAV_CFG;
  });
  const[tab,setTab]=useState("overview"); // overview | forecast | external | history
  const[editExt,setEditExt]=useState(null); // null | {id,name,balance,returnPct,type}
  const[showExtForm,setShowExtForm]=useState(false);
  const[newExt,setNewExt]=useState({name:"",balance:"",returnPct:"",type:"deposit",icon:"🏦"});
  const[savedMsg,setSavedMsg]=useState(false);
  const[editingBalance,setEditingBalance]=useState(false);

  const save=(cfg)=>{setSavCfg(cfg);LS.set(K_SAV,cfg);setSavedMsg(true);setTimeout(()=>setSavedMsg(false),2000);};
  const silentSave=(cfg)=>{setSavCfg(cfg);LS.set(K_SAV,cfg);};

  // עזר: שיעור תשואה מפרסט
  const getPct=(preset,custom)=>preset==="custom"?Number(custom||0):(RETURN_PRESETS.find(p=>p.id===preset)?.pct||6.5);

  // לוגיקת עדכון תשואה — מחזירה אובייקט cfg מעודכן
  const buildReturnUpdate=(sc,monthsDiff)=>{
    const wM=buildWeeklyThresholdMap(shifts,cfg);
    const tmpMon={};
    shifts.forEach(s=>{
      const ym=s.date.substring(0,7);
      if(!tmpMon[ym])tmpMon[ym]=0;
      const c=getShiftPay(s,cfg,wM[s.id]);
      tmpMon[ym]+=(c.regPay!==undefined?c.regPay:c.gross);
    });
    let tmpCP=0,tmpCK=0;
    Object.values(tmpMon).forEach(base=>{
      tmpCP+=base*(cfg.pensionEmployee+cfg.pensionEmployer)/100;
      tmpCK+=base*(cfg.kerenEmployee+cfg.kerenEmployer)/100;
    });
    const pPct=getPct(sc.pensionReturnPreset||"general",sc.pensionReturnCustom||6.5);
    const kPct=getPct(sc.kerenReturnPreset||"general",sc.kerenReturnCustom||6.5);
    const pFactor=Math.pow(1+pPct/100/12,monthsDiff);
    const kFactor=Math.pow(1+kPct/100/12,monthsDiff);
    const pBase=sc.pensionHistoric+tmpCP;
    const kBase=sc.kerenHistoric+tmpCK;
    const newPR=(pBase+(sc.pensionReturn||0))*pFactor-pBase;
    const newKR=(kBase+(sc.kerenReturn||0))*kFactor-kBase;
    const now2=new Date();
    const thisM1=`${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,'0')}-01`;
    const updExt=sc.externals.map(e=>{
      const ePct=getPct(e.returnPreset||"custom",e.returnPct||0);
      const md=e.monthlyDeposit||0;
      if(!ePct&&!md)return e;
      const r=ePct/100/12;
      let newBal=e.balance;
      if(r>0){
        const eFactor=Math.pow(1+r,monthsDiff);
        newBal=e.balance*eFactor+(md>0?md*(eFactor-1)/r:0);
      }else{
        newBal=e.balance+md*monthsDiff;
      }
      return{...e,balance:Math.round(newBal*100)/100};
    });
    return{...sc,pensionReturn:newPR,kerenReturn:newKR,externals:updExt,lastReturnApplied:thisM1};
  };

  // עדכון אוטומטי ב-1 לחודש
  useEffect(()=>{
    const now=new Date();
    const thisM1D=new Date(now.getFullYear(),now.getMonth(),1);
    const y=thisM1D.getFullYear(),m=String(thisM1D.getMonth()+1).padStart(2,'0');
    const thisM1=`${y}-${m}-01`;
    if(!savCfg.lastReturnApplied){
      silentSave({...savCfg,lastReturnApplied:thisM1});
      return;
    }
    const lastD=new Date(savCfg.lastReturnApplied+"T12:00:00");
    const diff=(thisM1D.getFullYear()-lastD.getFullYear())*12+(thisM1D.getMonth()-lastD.getMonth());
    if(diff<=0)return;
    silentSave(buildReturnUpdate(savCfg,diff));
  },[]);// eslint-disable-line

  // עדכון ידני מהכפתור
  const handleApplyReturns=()=>{
    const now=new Date();
    const thisM1D=new Date(now.getFullYear(),now.getMonth(),1);
    if(!savCfg.lastReturnApplied){save(buildReturnUpdate(savCfg,1));return;}
    const lastD=new Date(savCfg.lastReturnApplied+"T12:00:00");
    const diff=(thisM1D.getFullYear()-lastD.getFullYear())*12+(thisM1D.getMonth()-lastD.getMonth());
    if(diff<=0){setSavedMsg(true);setTimeout(()=>setSavedMsg(false),2000);return;}
    save(buildReturnUpdate(savCfg,diff));
  };

  // חישוב הפרשות חודשיות ממוצעות מהמשמרות
  // משתמש ב-getShiftPay (כולל cpAuto + מפת סף שבועי) לדיוק מלא
  const wMapSav=buildWeeklyThresholdMap(shifts,cfg);
  const mon={};
  shifts.forEach(s=>{
    const ym=s.date.substring(0,7);
    if(!mon[ym])mon[ym]=0;
    const c=getShiftPay(s,cfg,wMapSav[s.id]);
    mon[ym]+=(c.regPay!==undefined?c.regPay:c.gross); // שכר בסיס בלבד (ללא שעות נוספות)
  });
  const months=Object.keys(mon).sort();
  let cP=0,cK=0;
  const rows=months.map(ym=>{
    const base=mon[ym];
    const pe=base*cfg.pensionEmployee/100, pr=base*cfg.pensionEmployer/100;
    const ke=base*cfg.kerenEmployee/100,   kr=base*cfg.kerenEmployer/100;
    cP+=pe+pr; cK+=ke+kr;
    return{ym,base,pe,pr,ke,kr,cP,cK};
  });
  const avgMonthlyBase=months.length>0?Object.values(mon).reduce((a,b)=>a+b,0)/months.length:cfg.baseRate*190;
  const monthlyPension=avgMonthlyBase*(cfg.pensionEmployee+cfg.pensionEmployer)/100;
  const monthlyKeren=avgMonthlyBase*(cfg.kerenEmployee+cfg.kerenEmployer)/100;

  const totalPensionNow=savCfg.pensionHistoric+cP+(savCfg.pensionReturn||0);
  const totalKerenNow=savCfg.kerenHistoric+cK+(savCfg.kerenReturn||0);
  const extTotal=savCfg.externals.reduce((s,e)=>s+(e.balance||0),0);
  const grandTotal=totalPensionNow+totalKerenNow+extTotal;

  const EXT_ICONS=["🏦","🏠","💎","📊","🪙","💵","🏛️","🌍"];
  const EXT_TYPES=[
    {id:"deposit",label:uT("sv_type_dep")},
    {id:"gemel",label:uT("sv_type_gem")},
    {id:"real_estate",label:uT("sv_type_re")},
    {id:"stocks",label:uT("sv_type_stk")},
    {id:"other",label:uT("sv_type_oth")},
  ];

  const TABS=[
    {id:"overview",label:uT("sv_tab_ov"),icon:"📊"},
    {id:"returns",label:uT("sv_tab_ret"),icon:"💹"},
    {id:"external",label:uT("sv_tab_ext"),icon:"➕"},
    {id:"history", label:uT("sv_tab_hist"),icon:"📋"},
  ];

  return(
    <div style={{padding:"16px",paddingBottom:"20px"}}>
      <div style={{fontSize:"18px",fontWeight:"800",marginBottom:"16px",color:"var(--txt-hi)"}}>{uT("sv_title")}</div>

      {/* Sub tabs */}

            color:tab===t.id?"#4ade80":"var(--txt-d)",fontSize:"10px",fontWeight:"800",
