// AUTO-CALC NI + HEALTH INSURANCE
// ════════════════════════════════════════
function calcNIRates(grossSalary){
  // 2026 thresholds (official btl.gov.il)
  const LOW_THRESH = 7703;
  const NI_LOW = 1.04, NI_HIGH = 7.00;
  const HEALTH_LOW = 3.23, HEALTH_HIGH = 5.17;
  const low = Math.min(grossSalary, LOW_THRESH);
  const high = Math.max(0, grossSalary - LOW_THRESH);
  const niTotal = (low*NI_LOW + high*NI_HIGH) / 100;
  const healthTotal = (low*HEALTH_LOW + high*HEALTH_HIGH) / 100;
  const niPct = Math.round((niTotal/grossSalary)*1000)/10;
  const healthPct = Math.round((healthTotal/grossSalary)*1000)/10;
  return {niPct, healthPct, niTotal, healthTotal};
}

function AutoCalcNI({form,setForm}){
  const[show,setShow]=useState(false);
  const[salary,setSalary]=useState(form.baseRate*190||0);
  const[result,setResult]=useState(null);

  const calc=()=>{
    if(!salary||salary<=0) return;
    const r=calcNIRates(salary);
    setResult(r);
  };

  const apply=()=>{
    if(!result) return;
    setForm(f=>({...f,
      bituachLeumi:Math.round(result.niPct*10)/10,
      masBriut:Math.round(result.healthPct*10)/10,
    }));
    setShow(false);
    setResult(null);
  };

  return(
    <div style={{...CARD,marginBottom:"12px",background:"#0a1628",border:"1px solid #1e3a5f"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:"13px",fontWeight:"700",color:"#60a5fa"}}>🧮 חשב לי ביטוח לאומי ומס בריאות</div>
          <div style={{fontSize:"11px",color:"#4b5563",marginTop:"2px"}}>האחוז משתנה לפי גובה השכר</div>
        </div>
        <button onClick={()=>setShow(!show)} style={{background:"#1e3a5f",border:"none",color:"#93c5fd",borderRadius:"8px",padding:"6px 12px",cursor:"pointer",fontWeight:"700",fontSize:"12px"}}>
          {show?"סגור ▲":"פתח ▼"}
        </button>
      </div>

      {show&&(
        <div style={{marginTop:"14px"}}>
          <div style={{fontSize:"11px",color:"#6b7280",marginBottom:"6px",lineHeight:"1.6"}}>
            הזן את השכר הברוטו החודשי הממוצע שלך — האפליקציה תחשב את האחוזים האפקטיביים לפי חוק 2026.
          </div>
          <Field label="שכר ברוטו חודשי ממוצע (₪)">
            <NumInput value={salary} onChange={v=>setSalary(v)} step={100}/>
          </Field>
          <button onClick={calc} style={{width:"100%",padding:"11px",background:"#1e3a8a",border:"none",borderRadius:"10px",color:"#93c5fd",fontWeight:"800",fontSize:"14px",cursor:"pointer",marginBottom:"12px"}}>
            חשב
          </button>

          {result&&(
            <div style={{background:"#0d1117",borderRadius:"10px",padding:"12px",marginBottom:"12px"}}>
              <div style={{fontSize:"11px",color:"#6b7280",marginBottom:"10px"}}>תוצאת החישוב לשכר {fM(salary)}:</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
                <div style={{background:"#0c1a3e",borderRadius:"8px",padding:"10px",textAlign:"center"}}>
                  <div style={{fontSize:"10px",color:"#93c5fd",marginBottom:"4px"}}>ביטוח לאומי</div>
                  <div style={{fontSize:"20px",fontWeight:"900",color:"#60a5fa"}}>{result.niPct}%</div>
                  <div style={{fontSize:"10px",color:"#374151",marginTop:"2px"}}>{fM(result.niTotal)}/חודש</div>
                </div>
                <div style={{background:"#1a0c3e",borderRadius:"8px",padding:"10px",textAlign:"center"}}>
                  <div style={{fontSize:"10px",color:"#c4b5fd",marginBottom:"4px"}}>מס בריאות</div>
                  <div style={{fontSize:"20px",fontWeight:"900",color:"#a78bfa"}}>{result.healthPct}%</div>
                  <div style={{fontSize:"10px",color:"#374151",marginTop:"2px"}}>{fM(result.healthTotal)}/חודש</div>
                </div>
              </div>
              <div style={{fontSize:"10px",color:"#4b5563",marginBottom:"10px",lineHeight:"1.5"}}>
                * מחושב לפי מדרגות ביטוח לאומי 2026: עד ₪7,703 — 1.04%+3.23%, מעל — 7%+5.17%
              </div>
              <button onClick={apply} style={{width:"100%",padding:"11px",background:"#22c55e",border:"none",borderRadius:"10px",color:"#000",fontWeight:"800",fontSize:"14px",cursor:"pointer"}}>
                ✓ עדכן הגדרות אוטומטית
              </button>
            </div>
          )}

          {/* Reference table */}
          <div style={{fontSize:"11px",color:"#4b5563",marginBottom:"6px",fontWeight:"700"}}>טבלת אחוזים לפי שכר:</div>
          <div style={{borderRadius:"8px",overflow:"hidden",border:"1px solid #1f2937"}}>
            {[6000,8000,10000,12000,15000].map((s,i)=>{
              const r=calcNIRates(s);
              return(
              <div key={i} onClick={()=>{setSalary(s);setResult(calcNIRates(s));}}
                style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",background:i%2===0?"#0d1117":"#111827",cursor:"pointer",fontSize:"11px"}}>
                <span style={{color:"#9ca3af"}}>{fM(s)}</span>
                <span style={{color:"#60a5fa"}}>ב.ל. {r.niPct}%</span>
                <span style={{color:"#a78bfa"}}>בריאות {r.healthPct}%</span>
                <span style={{color:"#374151"}}>← לחץ</span>
              </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

    {l:"אישה",v:0.5,desc:"נקודה נוספת לנשים"},
    {l:"ילד עד גיל 18 (ילד 1)",v:2.5,desc:"לכל ילד עד גיל 5: 2.5 נקודות"},
    {l:"ילד מגיל 6–17",v:2.0,desc:"לכל ילד גילאי 6–17"},
    {l:"הורה יחיד",v:1.0,desc:"נקודה נוספת"},
    {l:"תואר ראשון",v:1.0,desc:"בשנת סיום הלימודים"},
  ];
  const POINT_VALUE=242; // ₪ per month per point (2025)

  const [points,setPoints]=useState(form.taxRate===0?2.25:2.25);

  const calcTax=(gross,pts)=>{
    // Simplified marginal tax calculation
    const credit=pts*POINT_VALUE;
    let tax=0;
    const brackets=[[6790,0.10],[9730,0.14],[15620,0.20],[21670,0.31],[44190,0.35],[56190,0.47],[Infinity,0.50]];
    let remaining=gross;
    let prev=0;
    for(const[top,rate] of brackets){
      const chunk=Math.min(remaining,top-prev);
      if(chunk<=0) break;
      tax+=chunk*rate;
      remaining-=chunk;
      prev=top;
      if(remaining<=0) break;
    }
    const netTax=Math.max(0,tax-credit);
    const pct=gross>0?Math.round((netTax/gross)*1000)/10:0;
    return{netTax,pct};
  };

  const gross=form.baseRate*(form.overtimeThreshold||8.6)*22;
  const result=calcTax(gross,points);

  return(
    <div style={{background:"#1a1000",border:"1px solid #92400e",borderRadius:"10px",padding:"12px",marginBottom:"14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:"12px",fontWeight:"700",color:"#fbbf24"}}>💡 מס הכנסה — איך מחשבים?</div>
          <div style={{fontSize:"11px",color:"#4b5563",marginTop:"2px"}}>לחץ להסבר ועזר חישוב</div>
        </div>
        <button onClick={()=>setShow(!show)} style={{background:"#2a1800",border:"none",color:"#fbbf24",borderRadius:"8px",padding:"5px 10px",cursor:"pointer",fontSize:"12px",fontWeight:"700"}}>
          {show?"סגור ▲":"פתח ▼"}
        </button>
      </div>

      {show&&(
        <div style={{marginTop:"12px"}}>
          <div style={{fontSize:"11px",color:"#6b7280",lineHeight:"1.7",marginBottom:"12px"}}>
            מס הכנסה לא קבוע — הוא תלוי ב<span style={{color:"#fbbf24",fontWeight:"700"}}> נקודות זיכוי</span>. כל נקודה = ₪{POINT_VALUE} הנחה במס לחודש.<br/>
            <span style={{color:"#22c55e"}}>הכי פשוט: תסתכל בתלוש שלך — כמה שולם בפועל ÷ ברוטו = האחוז שלך.</span>
          </div>

          <div style={{fontSize:"11px",color:"#fbbf24",fontWeight:"700",marginBottom:"8px"}}>נקודות זיכוי נפוצות:</div>
          {POINTS.map((p,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #2a1800",fontSize:"11px"}}>
              <span style={{color:"#e2e8f0"}}>{p.l}</span>
              <span style={{color:"#fbbf24",fontWeight:"700"}}>+{p.v} נקודות</span>
            </div>
          ))}

          <div style={{marginTop:"12px",background:"#0d1117",borderRadius:"8px",padding:"10px"}}>
            <div style={{fontSize:"11px",color:"#6b7280",marginBottom:"6px"}}>אומדן מהיר לפי שכר שלך ({fM(Math.round(gross))} ברוטו/חודש):</div>
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
              <span style={{fontSize:"11px",color:"#9ca3af"}}>נקודות זיכוי:</span>
              <NumInput value={points} onChange={v=>setPoints(v)} step={0.25} style={{...SI,width:"80px"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",background:"#111827",borderRadius:"6px",padding:"8px",marginBottom:"10px"}}>
              <span style={{fontSize:"11px",color:"#6b7280"}}>מס הכנסה משוער</span>
              <span style={{fontSize:"14px",fontWeight:"800",color:result.pct===0?"#22c55e":"#f87171"}}>
                {result.pct===0?"0% — פטור ✓":`${result.pct}% · ${fM(result.netTax)}/חודש`}
              </span>
            </div>
            <button onClick={()=>{setForm(f=>({...f,taxRate:result.pct}));setShow(false);}}
              style={{width:"100%",padding:"9px",background:"#92400e",border:"none",borderRadius:"8px",color:"#fde68a",fontWeight:"800",fontSize:"13px",cursor:"pointer"}}>
              ✓ עדכן מס הכנסה ל-{result.pct}%
            </button>
          </div>

          <div style={{marginTop:"10px",fontSize:"10px",color:"#374151",lineHeight:"1.6"}}>
            ⚠️ זהו <strong style={{color:"#6b7280"}}>אומדן בלבד</strong>. האחוז המדויק תלוי בנסיבות אישיות. תמיד בדוק בתלוש שלך.
          </div>
        </div>
      )}
    </div>
  );
}

            {newT.name&&(
              <div style={{background:newT.color+"15",border:`1px solid ${newT.color}44`,borderRadius:"10px",padding:"10px 12px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"8px"}}>
                <span style={{fontSize:"18px"}}>{newT.emoji}</span>
                <div>
                  <div style={{fontWeight:"800",color:newT.color,fontSize:"13px"}}>{newT.name}</div>
                  {newT.start&&newT.end&&<div style={{fontSize:"11px",color:"#6b7280"}}>{newT.start}–{newT.end}</div>}
                </div>
              </div>
            )}
            {tErr&&<div style={{color:"#f87171",fontSize:"12px",marginBottom:"8px"}}>⚠ {tErr}</div>}
            <Btn onClick={addT} color="#1e3a8a" textColor="#93c5fd" style={{fontSize:"14px"}}>+ הוסף תבנית</Btn>
          </div>
        </>
      )}

      {(sub==="pay"||sub==="ded")&&<Btn onClick={save} color={saved?"#15803d":"#22c55e"} textColor={saved?"#dcfce7":"#000"} style={{marginTop:"16px"}}>{saved?"✓ ההגדרות נשמרו!":"שמור הגדרות"}</Btn>}

      {sub==="pay"&&onReset&&(
        <>
          {/* Privacy mode setting */}
          <div style={{...CARD,marginTop:"16px",background:"#0d1117",border:"1px solid #1f2937"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:"13px",fontWeight:"700",color:"#e2e8f0"}}>
                  {privacyMode?"🙈":"👁"} מצב פרטיות
                </div>
                <div style={{fontSize:"11px",color:"#4b5563",marginTop:"2px"}}>
                  מסתיר את כל הסכומים בכל המסכים
                </div>
              </div>
              <Toggle on={privacyMode} onToggle={togglePrivacy}/>
            </div>
          </div>
          <button onClick={()=>{if(window.confirm("לאפס את האשף הראשוני ולהגדיר מחדש?"))onReset();}}
            style={{width:"100%",padding:"12px",background:"none",border:"1px solid #1f2937",borderRadius:"12px",color:"#4b5563",fontSize:"13px",fontWeight:"700",cursor:"pointer",marginTop:"10px"}}>
            🔄 הפעל מחדש את אשף ההגדרות
          </button>
        </>
      )}

      {sub==="vac"&&<VacationBalance shifts={shifts} vacCfg={vacCfg} onSaveVacCfg={onSaveVacCfg}/>}
    </div>
  );
}

// ════════════════════════════════════════
// ONBOARDING WIZARD
// ════════════════════════════════════════
function Onboarding({onDone,lang="he",setLang}){
  const t=useT();
  const[step,setStep]=useState(0);
  const[form,setForm]=useState({...DEF_CFG});
  const[salary,setSalary]=useState(()=>Math.round(DEF_CFG.baseRate*190));
  const[niResult,setNiResult]=useState(null);
  const[animDir,setAnimDir]=useState("right");
  const[als,setAls]=useState([]);
  const[newAl,setNewAl]=useState({name:"",type:"per_shift",amount:""});
  const[alErr,setAlErr]=useState("");

  const STEPS=[
    {title:t("ob_s0t"),subtitle:t("ob_s0s")},
    {title:t("ob_s1t"),subtitle:t("ob_s1s")},
    {title:t("ob_s2t"),subtitle:t("ob_s2s")},
    {title:t("ob_s3t"),subtitle:t("ob_s3s")},
    {title:t("ob_s4t"),subtitle:t("ob_s4s")},
    {title:t("ob_s5t"),subtitle:t("ob_s5s")},
  ];

  const go=(dir)=>{
    setAnimDir(dir>0?"right":"left");
    setStep(s=>s+dir);
  };

  const calcNI=()=>{
    const s=salary>0?salary:Math.round(form.baseRate*190);
    const r=calcNIRates(s);
    setNiResult(r);
    setForm(f=>({...f,
      bituachLeumi:Math.round(r.niPct*10)/10,
      masBriut:Math.round(r.healthPct*10)/10,
    }));
  };

  const addAl=()=>{
    if(!newAl.name.trim()){setAlErr("יש להזין שם");return;}
    const amt=parseFloat(newAl.amount);
    if(!amt||amt<=0){setAlErr("יש להזין סכום");return;}
    setAlErr("");
    setAls(a=>[...a,{...newAl,amount:amt,id:Date.now(),active:true}]);
    setNewAl({name:"",type:"per_shift",amount:""});
  };

  const finish=()=>{
    onDone(form,als);
  };

  const progress=step/(STEPS.length-1);

  return(
    <div dir={lang==="ru"?"ltr":"rtl"} style={{
      fontFamily:"'Heebo','Arial Hebrew',Arial,sans-serif",
      height:"100%",background:"#090c14",color:"#e2e8f0",
      display:"flex",flexDirection:"column",maxWidth:"430px",margin:"0 auto",
    }}>
      {/* Header */}
      <div style={{padding:"env(safe-area-inset-top,28px) 20px 0",background:"#090c14"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
          <div style={{fontSize:"17px",fontWeight:"900",color:"#f1f5f9"}}>שעתי ⏱</div>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            {setLang&&<button onClick={()=>setLang(lang==="he"?"ru":"he")} style={{background:"#1f2937",border:"1px solid #374151",color:"#9ca3af",borderRadius:"8px",padding:"4px 10px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>
              {lang==="he"?"🇷🇺 Русский":"🇮🇱 עברית"}
            </button>}
            {step>0&&step<STEPS.length-1&&(
            <button onClick={finish} style={{background:"none",border:"none",color:"#4b5563",fontSize:"12px",cursor:"pointer",fontWeight:"700"}}>
              {t("ob_skip")}
            </button>
            )}
          </div>
        </div>
        {/* Progress bar */}
        <div style={{height:"4px",background:"#1f2937",borderRadius:"2px",marginBottom:"20px"}}>
          <div style={{height:"100%",width:`${progress*100}%`,background:"linear-gradient(90deg,#22c55e,#4ade80)",borderRadius:"2px",transition:"width 0.4s ease"}}/>
        </div>
        {/* Steps dots */}
        <div style={{display:"flex",justifyContent:"center",gap:"8px",marginBottom:"24px"}}>
          {STEPS.map((_,i)=>(
            <div key={i} style={{width:i===step?20:8,height:"8px",borderRadius:"4px",background:i<=step?"#22c55e":"#1f2937",transition:"all 0.3s ease"}}/>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,padding:"0 20px",overflowY:"auto"}}>
        <div style={{animation:`${animDir==="right"?"slideInRight":"slideInLeft"} 0.25s ease-out`}}>
          <div style={{marginBottom:"24px"}}>
            <div style={{fontSize:"22px",fontWeight:"900",color:"#f1f5f9",marginBottom:"6px"}}>{STEPS[step].title}</div>
            <div style={{fontSize:"13px",color:"#6b7280"}}>{STEPS[step].subtitle}</div>
          </div>

          {/* ── Step 0: Welcome ── */}
          {step===0&&(
            <div>
              <div style={{background:"linear-gradient(145deg,#052e16,#14532d)",border:"1px solid #166534",borderRadius:"20px",padding:"24px",textAlign:"center",marginBottom:"24px"}}>
                <div style={{fontSize:"56px",marginBottom:"12px",animation:"spinShekel 3s linear infinite",display:"inline-block"}}>₪</div>
                <div style={{fontSize:"16px",fontWeight:"800",color:"#4ade80",marginBottom:"8px"}}>{t("ob_tagline")}</div>
                <div style={{fontSize:"13px",color:"#86efac88",lineHeight:"1.7",whiteSpace:"pre-line"}}>{t("ob_feat_desc")}</div>
              </div>
              {[
                {icon:"⏱",t:t("ob_f0t"),s:t("ob_f0s")},
                {icon:"📊",t:t("ob_f1t"),s:t("ob_f1s")},
                {icon:"🏦",t:t("ob_f2t"),s:t("ob_f2s")},
              ].map((f,i)=>(
                <div key={i} style={{display:"flex",gap:"14px",alignItems:"center",padding:"14px",background:"#111827",borderRadius:"14px",marginBottom:"10px",border:"1px solid #1f2937"}}>
                  <div style={{fontSize:"28px",flexShrink:0}}>{f.icon}</div>
                  <div><div style={{fontWeight:"700",color:"#e2e8f0",fontSize:"14px"}}>{f.t}</div><div style={{fontSize:"12px",color:"#6b7280",marginTop:"2px"}}>{f.s}</div></div>
                </div>
              ))}
            </div>
          )}

          {/* ── Step 1: Base pay ── */}
          {step===1&&(
            <div>
              <div style={{...CARD,marginBottom:"16px"}}>
                <div style={{fontSize:"12px",color:"#6b7280",marginBottom:"16px",lineHeight:"1.6",background:"#0d1117",borderRadius:"10px",padding:"12px",border:"1px solid #1f2937"}}>
                  💡 את/ה יכול/ה למצוא את הנתונים האלה בתלוש השכר שלך או בחוזה העבודה. אם לא בטוח/ה — השאר את ברירת המחדל ותוכל לשנות מאוחר יותר.
                </div>
                <Field label="שכר בסיס לשעה (₪)" hint="לפי חוזה/תלוש">
                  <NumInput value={form.baseRate} onChange={v=>setForm(f=>({...f,baseRate:v}))} step={0.01} min={0}/>
                </Field>
                <div style={{fontSize:"11px",color:"#4b5563",marginBottom:"16px",marginTop:"-8px"}}>
                  שכר מינימום 2025: ₪32.30/שעה
                </div>
                <Field label="שעות עבודה ביום רגיל" hint="ברירת מחדל: 8.6 שעות (לפי חוק)">
                  <NumInput value={form.overtimeThreshold} onChange={v=>setForm(f=>({...f,overtimeThreshold:v}))} step={0.1} min={1}/>
                </Field>
                <div style={{fontSize:"11px",color:"#4b5563",marginBottom:"16px",marginTop:"-8px"}}>
                  שעות מעל מספר זה יחושבו כשעות נוספות
                </div>
                <div style={{background:"#0c1a3e",border:"1px solid #1e3a8a",borderRadius:"10px",padding:"12px",marginTop:"4px"}}>
                  <div style={{fontSize:"11px",color:"#93c5fd",fontWeight:"700",marginBottom:"8px"}}>📋 אחוזי שעות נוספות (לפי חוק)</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                    <div>
                      <div style={{fontSize:"10px",color:"#93c5fd",marginBottom:"6px"}}>2 שעות ראשונות</div>
                      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                        <NumInput value={form.overtime125Pct||125} onChange={v=>setForm(f=>({...f,overtime125Pct:v}))} step={5} min={100} max={200} style={{fontSize:"14px",padding:"8px 10px"}}/>
                        <span style={{color:"#93c5fd",fontWeight:"700"}}>%</span>
                      </div>
                    </div>
                    <div>
                      <div style={{fontSize:"10px",color:"#93c5fd",marginBottom:"6px"}}>משעה 3 ואילך</div>
                      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                        <NumInput value={form.overtime150Pct||150} onChange={v=>setForm(f=>({...f,overtime150Pct:v}))} step={5} min={100} max={200} style={{fontSize:"14px",padding:"8px 10px"}}/>
                        <span style={{color:"#93c5fd",fontWeight:"700"}}>%</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── Step 2: Tax & NI ── */}
          {step===2&&(
            <div>
              {/* Auto NI calculator */}
              <div style={{...CARD,background:"#0a1628",border:"1px solid #1e3a5f",marginBottom:"14px"}}>
                <div style={{fontSize:"13px",fontWeight:"700",color:"#60a5fa",marginBottom:"4px"}}>🧮 חשב לי ביטוח לאומי ומס בריאות</div>
                <div style={{fontSize:"11px",color:"#4b5563",marginBottom:"12px"}}>הזן שכר ברוטו חודשי ממוצע — האחוז משתנה לפי גובה השכר</div>
                <Field label="שכר ברוטו חודשי משוער (₪)">
                  <NumInput value={salary} onChange={v=>setSalary(v>0?v:0)} step={100}/>
                </Field>
                <button onClick={calcNI} style={{width:"100%",padding:"11px",background:"#1e3a8a",border:"none",borderRadius:"10px",color:"#93c5fd",fontWeight:"800",fontSize:"14px",cursor:"pointer",marginBottom:niResult?"12px":"0"}}>
                  חשב אוטומטית
                </button>
                {niResult&&(
                  <div style={{background:"#0d1117",borderRadius:"10px",padding:"12px",marginTop:"4px"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                      <div style={{background:"#0c1a3e",borderRadius:"8px",padding:"10px",textAlign:"center"}}>
                        <div style={{fontSize:"10px",color:"#93c5fd",marginBottom:"4px"}}>ביטוח לאומי</div>
                        <div style={{fontSize:"20px",fontWeight:"900",color:"#60a5fa"}}>{niResult.niPct}%</div>
                      </div>
                      <div style={{background:"#1a0c3e",borderRadius:"8px",padding:"10px",textAlign:"center"}}>
                        <div style={{fontSize:"10px",color:"#c4b5fd",marginBottom:"4px"}}>מס בריאות</div>
                        <div style={{fontSize:"20px",fontWeight:"900",color:"#a78bfa"}}>{niResult.healthPct}%</div>
                      </div>
                    </div>
                    <div style={{fontSize:"10px",color:"#22c55e",textAlign:"center",marginTop:"8px",fontWeight:"700"}}>✓ עודכן אוטומטית</div>
                  </div>
                )}
              </div>

              <div style={CARD}>
                <div style={{fontSize:"12px",color:"#6b7280",fontWeight:"700",marginBottom:"12px"}}>עריכה ידנית</div>
                <Field label="מס הכנסה (%)" hint="בדוק בתלוש שלך">
                  <NumInput value={form.taxRate} onChange={v=>setForm(f=>({...f,taxRate:v}))} step={0.1} min={0} max={50}/>
                </Field>
                <Field label="ביטוח לאומי (%)">
                  <NumInput value={form.bituachLeumi} onChange={v=>setForm(f=>({...f,bituachLeumi:v}))} step={0.1} min={0}/>
                </Field>
                <Field label="מס בריאות (%)">
                  <NumInput value={form.masBriut} onChange={v=>setForm(f=>({...f,masBriut:v}))} step={0.1} min={0}/>
                </Field>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0d1117",borderRadius:"10px",padding:"12px",marginTop:"4px"}}>
                  <div>
                    <div style={{fontSize:"13px",fontWeight:"700",color:"#e2e8f0"}}>הפעל חישוב ניכויים</div>
                    <div style={{fontSize:"11px",color:"#6b7280",marginTop:"2px"}}>הצג שכר נטו בדשבורד</div>
                  </div>
                  <Toggle on={form.enableDeductions} onToggle={()=>setForm(f=>({...f,enableDeductions:!f.enableDeductions}))}/>
                </div>
              </div>
            </div>
          )}

          {/* ── Step 3: Pension & Keren ── */}
          {step===3&&(
            <div>
              <div style={{...CARD,marginBottom:"14px",background:"#0c1a3e",border:"1px solid #1e3a8a"}}>
                <div style={{fontSize:"11px",color:"#93c5fd",fontWeight:"700",marginBottom:"8px"}}>💡 חשוב לדעת</div>
                <div style={{fontSize:"11px",color:"#4b5563",lineHeight:"1.7"}}>
                  פנסיה וקרן השתלמות מחושבות <span style={{color:"#93c5fd",fontWeight:"700"}}>רק על שכר הבסיס</span> — ללא שעות נוספות ותוספות. כך לפי חוק.
                </div>
              </div>

              <div style={CARD}>
                <div style={{fontSize:"12px",color:"#6b7280",fontWeight:"700",marginBottom:"14px"}}>🏦 פנסיה</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}}>
                  <Field label="עובד (%)">
                    <NumInput value={form.pensionEmployee} onChange={v=>setForm(f=>({...f,pensionEmployee:v}))} step={0.5} min={0}/>
                  </Field>
                  <Field label="מעסיק (%)">
                    <NumInput value={form.pensionEmployer} onChange={v=>setForm(f=>({...f,pensionEmployer:v}))} step={0.5} min={0}/>
                  </Field>
                </div>
                <div style={{height:"1px",background:"#1f2937",margin:"4px 0 14px"}}/>
                <div style={{fontSize:"12px",color:"#6b7280",fontWeight:"700",marginBottom:"14px"}}>📈 קרן השתלמות</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                  <Field label="עובד (%)">
                    <NumInput value={form.kerenEmployee} onChange={v=>setForm(f=>({...f,kerenEmployee:v}))} step={0.5} min={0}/>
                  </Field>
                  <Field label="מעסיק (%)">
                    <NumInput value={form.kerenEmployer} onChange={v=>setForm(f=>({...f,kerenEmployer:v}))} step={0.5} min={0}/>
                  </Field>
                </div>
                <div style={{background:"#0d1117",borderRadius:"10px",padding:"10px",marginTop:"12px"}}>
                  <div style={{fontSize:"11px",color:"#6b7280",lineHeight:"1.6"}}>
                    📋 מינימום חוקי לפנסיה: עובד 6%, מעסיק 6.5%<br/>
                    📋 קרן השתלמות: עובד 2.5%, מעסיק 7.5%
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── Step 4: Allowances ── */}
          {step===4&&(
            <div>
              <div style={{...CARD,marginBottom:"12px",background:"#0d1f12",border:"1px solid #14532d"}}>
                <div style={{fontSize:"11px",color:"#4ade80",fontWeight:"700",marginBottom:"6px"}}>💡 מה זה תוספות?</div>
                <div style={{fontSize:"11px",color:"#4b5563",lineHeight:"1.7"}}>
                  סכומים קבועים שמתווספים לכל משמרת — למשל דמי נסיעות או כלכלה. אם אין לך — לחץ הבא.
                </div>
              </div>

              {/* Existing allowances */}
              {als.length>0&&(
                <div style={{marginBottom:"12px"}}>
                  {als.map(a=>(
                    <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",...CARD,marginBottom:"8px"}}>
                      <div>
                        <div style={{fontSize:"13px",fontWeight:"700",color:"#e2e8f0"}}>{a.name}</div>
                        <div style={{fontSize:"11px",color:"#6b7280"}}>{a.type==="per_shift"?"לכל משמרת":"חודשי"} · ₪{a.amount}</div>
                      </div>
                      <button onClick={()=>setAls(x=>x.filter(x=>x.id!==a.id))} style={{background:"#2d0505",border:"none",color:"#f87171",borderRadius:"8px",padding:"6px 10px",cursor:"pointer",fontSize:"12px"}}>הסר</button>
                    </div>
                  ))}
                </div>
              )}

              {/* Add new allowance */}
              <div style={CARD}>
                <div style={{fontSize:"12px",color:"#6b7280",fontWeight:"700",marginBottom:"12px"}}>➕ הוסף תוספת</div>
                <Field label="שם התוספת">
                  <input type="text" value={newAl.name} onChange={e=>setNewAl(a=>({...a,name:e.target.value}))} placeholder="נסיעות, כלכלה, אחר..." style={SI}/>
                </Field>
                <Field label="סוג">
                  <select value={newAl.type} onChange={e=>setNewAl(a=>({...a,type:e.target.value}))} style={SI}>
                    <option value="per_shift">לכל משמרת</option>
                    <option value="per_month">חודשי (קבוע)</option>
                  </select>
                </Field>
                <Field label="סכום (₪)">
                  <NumInput value={parseFloat(newAl.amount)||0} onChange={v=>setNewAl(a=>({...a,amount:String(v)}))} step={1} min={0}/>
                </Field>
                {alErr&&<div style={{color:"#f87171",fontSize:"12px",marginBottom:"8px"}}>⚠ {alErr}</div>}
                <Btn onClick={addAl} color="#052e16" textColor="#4ade80" style={{border:"1px solid #166534",fontSize:"13px"}}>+ הוסף תוספת</Btn>
              </div>
            </div>
          )}

          {/* ── Step 5: Done ── */}
          {step===5&&(
            <div>
              <div style={{textAlign:"center",marginBottom:"28px"}}>
                <div style={{fontSize:"64px",marginBottom:"12px"}}>🎉</div>
                <div style={{fontSize:"18px",fontWeight:"900",color:"#4ade80",marginBottom:"8px"}}>{t("ob_ready")}</div>
                <div style={{fontSize:"13px",color:"#6b7280"}}>{t("ob_saved")}</div>
              </div>

              <div style={{...CARD,marginBottom:"14px"}}>
                <div style={{fontSize:"12px",color:"#6b7280",fontWeight:"700",marginBottom:"12px"}}>{t("ob_summary")}</div>
                {[
                  {l:"שכר בסיס",v:`₪${form.baseRate}/שעה`},
                  {l:"שעות עבודה ביום רגיל",v:`${form.overtimeThreshold} שעות`},
                  {l:"מס הכנסה",v:`${form.taxRate}%`},
                  {l:"ביטוח לאומי",v:`${form.bituachLeumi}%`},
                  {l:"מס בריאות",v:`${form.masBriut}%`},
                  {l:"פנסיה עובד/מעסיק",v:`${form.pensionEmployee}%/${form.pensionEmployer}%`},
                  {l:"קרן השתלמות עובד/מעסיק",v:`${form.kerenEmployee}%/${form.kerenEmployer}%`},
                  {l:"תוספות",v:als.length>0?als.map(a=>a.name).join(", "):"ללא"},
                ].map((r,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<7?"1px solid #1f2937":"none"}}>
                    <span style={{fontSize:"12px",color:"#9ca3af"}}>{r.l}</span>
                    <span style={{fontSize:"12px",fontWeight:"700",color:i===7&&als.length>0?"#4ade80":"#e2e8f0"}}>{r.v}</span>
                  </div>
                ))}
              </div>

              <div style={{fontSize:"11px",color:"#4b5563",textAlign:"center",marginBottom:"20px"}}>
                {t("ob_settings_hint")}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Footer buttons */}
      <div style={{padding:"16px 20px",paddingBottom:"env(safe-area-inset-bottom,20px)",background:"#090c14",borderTop:"1px solid #1f2937",display:"flex",gap:"10px"}}>
        {step>0&&step<STEPS.length-1&&(
          <button onClick={()=>go(-1)} style={{flex:"0 0 auto",padding:"14px 18px",background:"#1f2937",border:"none",borderRadius:"12px",color:"#9ca3af",fontSize:"15px",fontWeight:"800",cursor:"pointer"}}>
            {t("ob_back")}
          </button>
        )}
        {step<STEPS.length-1&&(
          <button onClick={()=>go(1)} style={{flex:1,padding:"14px",background:"#22c55e",border:"none",borderRadius:"12px",color:"#000",fontSize:"15px",fontWeight:"800",cursor:"pointer"}}>
            {step===0?t("ob_start"):t("ob_next")}
          </button>
        )}
        {step===STEPS.length-1&&(
          <button onClick={finish} style={{flex:1,padding:"14px",background:"#22c55e",border:"none",borderRadius:"12px",color:"#000",fontSize:"16px",fontWeight:"900",cursor:"pointer",animation:"glowPulse 2s ease-in-out infinite"}}>
            {t("ob_enter")}
          </button>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════
function App(){
  const[tab,setTab]=useState("clock");
  const[prevTab,setPrevTab]=useState("clock");
  const[tabKey,setTabKey]=useState(0);
  const[nightMode,setNightMode]=useState(isNightTime);

  const[toast,setToast]=useState(null);
  const scrollRef=useRef(null);

  const showToast=(msg,color="#22c55e")=>{
    setToast({msg,color});
    setTimeout(()=>setToast(null),2500);
  };

  const scrollTop=()=>{if(scrollRef.current)scrollRef.current.scrollTop=0;};

  const switchTab=(t)=>{setPrevTab(tab);setTab(t);setTabKey(k=>k+1);scrollTop();};

  useEffect(()=>{
    const id=setInterval(()=>setNightMode(isNightTime()),60000);
    return()=>clearInterval(id);
  },[]);
  const[shifts,setShifts]=useState([]);
  const[cfg,setCfg]=useState(DEF_CFG);
  const[tpls,setTpls]=useState([]);
  const[als,setAls]=useState(DEF_ALS);
  const[vacCfg,setVacCfg]=useState(DEF_VAC);
  const[clockIn,setClockInState]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[onboarded,setOnboarded]=useState(false);
  const[privacyMode,setPrivacyMode]=useState(false);
  const[lang,setLang]=useState("he");
  const[selM,setSelM]=useState(()=>tdy().substring(0,7));

  useEffect(()=>{
    const s=LS.get(K.shifts);if(s)setShifts(s);
    const c=LS.get(K.cfg);if(c)setCfg({...DEF_CFG,...c});
    const t=LS.get(K.tpls);if(t)setTpls(t);
    const a=LS.get(K.als);if(a)setAls(a);
    const v=LS.get(K.vac);if(v)setVacCfg({...DEF_VAC,...v});
    const ci=LS.get(K.clockin);if(ci)setClockInState(ci);
    const ob=LS.get(K.onboarded);if(ob)setOnboarded(true);
    const pr=LS.get(K.privacy);if(pr)setPrivacyMode(true);
    const ln=LS.get(K.lang);if(ln)setLang(ln);
    setLoaded(true);
  },[]);

  const saveLang=l=>{setLang(l);LS.set(K.lang,l);};
  const togglePrivacy=()=>{
    const next=!privacyMode;
    setPrivacyMode(next);
    LS.set(K.privacy,next?true:null);
  };

  const setClockIn=(v)=>{setClockInState(v);LS.set(K.clockin,v);};
  const saveSh=useCallback(ns=>{setShifts(ns);LS.set(K.shifts,ns);},[]);
  const saveCfg=useCallback(ns=>{setCfg(ns);LS.set(K.cfg,ns);},[]);
  const saveTpls=useCallback(ns=>{setTpls(ns);LS.set(K.tpls,ns);},[]);
  const saveAls=useCallback(ns=>{setAls(ns);LS.set(K.als,ns);},[]);
  const saveVacCfg=useCallback(ns=>{setVacCfg(ns);LS.set(K.vac,ns);},[]);
  const addSh=useCallback(s=>{
    // לא לשמור משמרת עבודה קצרה מ-3 דקות (0.05 שעות)
    if(!isSpecialDay(s.type)&&ch(s.start,s.end)<0.05)return;
    saveSh([...shifts,s]);
  },[shifts,saveSh]);
  const delSh=useCallback(id=>saveSh(shifts.filter(s=>s.id!==id)),[shifts,saveSh]);
  const editSh=useCallback(s=>saveSh(shifts.map(x=>x.id===s.id?s:x)),[shifts,saveSh]);

  const finishOnboarding=(newCfg,newAls)=>{
    saveCfg(newCfg);
    if(newAls&&newAls.length>0) saveAls(newAls);
    LS.set(K.onboarded,true);
    setOnboarded(true);
  };

  const tabs=[
    {id:"clock",    icon:clockIn?"🔴":"🟢", label:clockIn?"במשמרת":"כניסה"},
    {id:"dashboard",icon:"📊",label:"סיכום"},
    {id:"add",      icon:"➕",label:"ידני"},
    {id:"shifts",   icon:"📋",label:"משמרות"},
    {id:"savings",  icon:"💰",label:"חסכונות"},
    {id:"graph",    icon:"📈",label:"גרף"},
    {id:"settings", icon:"⚙️",label:"הגדרות"},
  ];

  if(!loaded)return(
    <div style={{minHeight:"100vh",background:"#090c14",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"16px"}}>
      <div style={{fontSize:"52px",animation:"spinShekel 1.2s linear infinite",display:"inline-block"}}>₪</div>
      <div style={{color:"#4ade80",fontSize:"16px",fontWeight:"700",animation:"blink 1.2s ease-in-out infinite"}}>שעתי טוען...</div>
    </div>
  );

  if(!onboarded)return <LangCtx.Provider value={lang}><Onboarding onDone={finishOnboarding} lang={lang} setLang={saveLang}/></LangCtx.Provider>;

  return(
  <LangCtx.Provider value={lang}>
    <div dir="rtl" style={{fontFamily:"'Heebo','Arial Hebrew',sans-serif",minWidth:"100%",maxWidth:"430px",margin:"0 auto",height:"100%",display:"flex",flexDirection:"column",background:"#090c14",color:"#e2e8f0",filter:nightMode?"brightness(0.82) saturate(0.9)":"none",transition:"filter 1s ease",position:"relative"}}>

      {/* Toast notification */}
      {toast&&(
        <div style={{
          position:"absolute",top:"env(safe-area-inset-top,28px)",left:"50%",transform:"translateX(-50%)",
          zIndex:999,background:toast.color,borderRadius:"12px",padding:"10px 20px",
          fontSize:"13px",fontWeight:"800",color:"#000",whiteSpace:"nowrap",
          boxShadow:`0 4px 20px ${toast.color}66`,
          animation:"slideInUp 0.25s ease-out",
        }}>{toast.msg}</div>
      )}

      {/* Header - sticky at top */}
      <div style={{paddingTop:"env(safe-area-inset-top, 28px)",background:"#090c14",borderBottom:"1px solid #1f2937",flexShrink:0,zIndex:10,position:"relative"}}>
        <div style={{padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontSize:"17px",fontWeight:"900",color:"#f1f5f9"}}>שעתי ⏱</div>
        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
          {/* Privacy toggle */}
          <button onClick={togglePrivacy} style={{
            background:privacyMode?"#2d1f00":"#1f2937",
            border:`1px solid ${privacyMode?"#f59e0b":"#374151"}`,
            borderRadius:"8px",padding:"3px 10px",
            fontSize:"14px",cursor:"pointer",
            transition:"all 0.2s ease",
          }} title={privacyMode?"הצג סכומים":"הסתר סכומים"}>
            {privacyMode?"🙈":"👁"}
          </button>
          {clockIn&&<div style={{background:"#2d0505",border:"1px solid #ef4444",borderRadius:"8px",padding:"3px 10px",fontSize:"11px",color:"#f87171",fontWeight:"700",display:"flex",alignItems:"center",gap:"4px"}}>
            <span style={{animation:"blink 1s ease-in-out infinite"}}>●</span>
            <span style={{animation:"blink 1s ease-in-out infinite",animationDelay:"0.33s"}}>●</span>
            <span style={{animation:"blink 1s ease-in-out infinite",animationDelay:"0.66s"}}>●</span>
            <span>משמרת פעילה</span>
          </div>}
          <div style={{background:"#052e16",border:"1px solid #166534",borderRadius:"8px",padding:"3px 10px",fontSize:"11px",color:"#4ade80",fontWeight:"700"}}>
            {shifts.filter(s=>s.date.startsWith(tdy().substring(0,7))&&!isSpecialDay(s.type)).length} משמרות החודש
          </div>
        </div>
        </div>
      </div>

      {/* Privacy mode banner */}
      {privacyMode&&(
        <div style={{
          background:"#2d1f00",borderBottom:"1px solid #f59e0b44",
          padding:"5px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",
          flexShrink:0,
        }}>
          <div style={{fontSize:"11px",color:"#f59e0b",fontWeight:"700"}}>🙈 מצב פרטיות פעיל — סכומים מוסתרים</div>
          <button onClick={togglePrivacy} style={{background:"none",border:"none",color:"#f59e0b",fontSize:"11px",cursor:"pointer",fontWeight:"700",padding:"0"}}>
            הצג 👁
          </button>
        </div>
      )}

      {/* Scrollable content */}
      <div ref={scrollRef} style={{flex:1,overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch",minHeight:0}}>
        <div key={tabKey} className={slideClass(prevTab,tab)} style={{width:"100%"}}>
          {tab==="clock"    &&<ClockScreen clockIn={clockIn} setClockIn={setClockIn} als={als} cfg={cfg} onShiftSaved={s=>{addSh(s);showToast("✓ המשמרת נשמרה!");}} privacyMode={privacyMode} togglePrivacy={togglePrivacy}/>}
          {tab==="dashboard"&&<Dashboard shifts={shifts} cfg={cfg} als={als} selM={selM} setSelM={setSelM} privacyMode={privacyMode}/>}
          {tab==="add"      &&<AddShift cfg={cfg} tpls={tpls} als={als} shifts={shifts} onAdd={s=>{addSh(s);showToast("✓ המשמרת נשמרה!");scrollTop();}} onEdit={editSh} onDelete={delSh} privacyMode={privacyMode}/>}
          {tab==="shifts"   &&<ShiftsList shifts={shifts} cfg={cfg} als={als} onDelete={delSh} onEdit={editSh} privacyMode={privacyMode}/>}
          {tab==="savings"  &&<Savings shifts={shifts} cfg={cfg} privacyMode={privacyMode}/>}
          {tab==="graph"    &&<Graph shifts={shifts} cfg={cfg} als={als} privacyMode={privacyMode}/>}
          {tab==="settings" &&<Settings cfg={cfg} tpls={tpls} als={als} shifts={shifts} vacCfg={vacCfg} onSaveCfg={saveCfg} onSaveTpls={saveTpls} onSaveAls={saveAls} onSaveVacCfg={saveVacCfg} privacyMode={privacyMode} togglePrivacy={togglePrivacy} onReset={()=>{LS.set(K.onboarded,false);setOnboarded(false);}}/>}
        </div>
        {/* Watermark — inside scroll, above nav padding */}
        <div style={{textAlign:"center",padding:"12px 0 4px",fontSize:"10px",color:"#1f2937",letterSpacing:"0.5px"}}>
          made by illouzman
        </div>
      </div>

      {/* Bottom nav — flexShrink:0 guarantees it stays at bottom */}
      <div style={{flexShrink:0,background:"#0d1117",borderTop:"1px solid #1f2937",zIndex:20,paddingBottom:"env(safe-area-inset-bottom, 4px)"}}>
        <div style={{display:"flex",width:"100%"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>switchTab(t.id)} style={{flex:1,padding:"8px 0 10px",background:"none",border:"none",cursor:"pointer",color:tab===t.id?"#4ade80":"#4b5563"}}>
            <div style={{fontSize:"18px"}}>{t.icon}</div>
            <div style={{fontSize:"9px",fontWeight:tab===t.id?"800":"400",marginTop:"3px",letterSpacing:"-0.2px"}}>{t.label}</div>
            {tab===t.id&&<div style={{width:"16px",height:"2px",background:"#4ade80",borderRadius:"2px",margin:"3px auto 0"}}/>}
          </button>
        ))}
        </div>
      </div>
    </div>
  </LangCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
