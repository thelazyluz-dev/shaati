                      <div style={{fontSize:"12px",color:"var(--txt-d)",marginTop:"2px"}}>
                        {t.start}–{t.end} · {fH(ch(t.start,t.end))}{uT("hr")} · <span style={{color:color}}>{pct}%</span>
                        {t.customMult&&<span style={{fontSize:"10px",color:"#60a5fa",marginRight:"4px"}}> · {uT("sg_custom_b")}</span>}
                      </div>
                    </div>
                    <button onClick={()=>delT(t.id)} style={{background:"none",border:"none",color:"var(--divider2)",cursor:"pointer",fontSize:"18px"}}>🗑</button>
                  </div>
                );
              })}
            </div>
          )}
          <div style={CARD}>
            <div style={SEC}>{uT("sg_new_tpl")}</div>
            <Field label={uT("sg_name")}><input type="text" value={newT.name} onChange={e=>setNewT({...newT,name:e.target.value})} placeholder={uT("sg_tpl_ph")} style={SI}/></Field>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
              <Field label={uT("as_start")}><input type="time" value={newT.start} onChange={e=>setNewT({...newT,start:e.target.value})} style={SI}/></Field>
              <Field label={uT("as_end")}><input type="time" value={newT.end} onChange={e=>setNewT({...newT,end:e.target.value})} style={SI}/></Field>
            </div>
            {newT.start&&newT.end&&ch(newT.start,newT.end)>0&&(
              <div style={{fontSize:"12px",color:"var(--txt-d)",marginBottom:"12px",textAlign:"center"}}>⏱ {fH(ch(newT.start,newT.end))} {uT("hr")}</div>
            )}
            <Field label={uT("as_shift_type")}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
                {Object.entries(ST).filter(([k])=>form[k==="regular"?"morningEnabled":k==="afternoon"?"afternoonEnabled":"nightEnabled"]!==false).map(([k,t])=>(
                  <button key={k} onClick={()=>setNewT({...newT,type:k,customMult:null})} style={{padding:"10px 4px",borderRadius:"10px",cursor:"pointer",border:newT.type===k?`2px solid ${t.color}`:"2px solid #1f2937",background:newT.type===k?t.bg:"var(--bg2)",color:newT.type===k?t.color:"var(--txt-d)",fontWeight:"700",fontSize:"12px"}}>{t.icon} {uT("st_"+k)}</button>
                ))}
              </div>
            </Field>

            {/* Custom percentage override */}
            <div style={{...CARD,marginBottom:"14px",background:"var(--bg2)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                <div style={LBL}>{uT("sg_custom_pct")}</div>
                <button onClick={()=>setNewT({...newT,customMult:newT.customMult===null?ST[newT.type].mult*100:null})}
                  style={{background:newT.customMult!==null?"#052e16":"var(--divider)",border:`1.5px solid ${newT.customMult!==null?"#22c55e":"var(--divider2)"}`,color:newT.customMult!==null?"#22c55e":"var(--txt-d)",borderRadius:"20px",padding:"3px 12px",cursor:"pointer",fontWeight:"700",fontSize:"12px"}}>
                  {newT.customMult!==null?uT("sg_custom_on"):uT("sg_default")}
                </button>
              </div>
              {newT.customMult===null?(
                <div style={{fontSize:"12px",color:"var(--txt-dd)"}}>
                  {uT("sg_using_pct")}&nbsp;
                  <span style={{color:ST[newT.type].color,fontWeight:"700"}}>{Math.round(ST[newT.type].mult*100)}%</span>
                </div>
              ):(
                <>
                  <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                    <input type="number" step="1" min="100" max="300" value={newT.customMult}
                      onChange={e=>setNewT({...newT,customMult:parseFloat(e.target.value)||100})}
                      style={{...SI,flex:1}}
                    />
                    <span style={{color:"var(--txt)",fontWeight:"800",fontSize:"18px"}}>%</span>
                  </div>
                  <div style={{fontSize:"11px",color:"var(--txt-dd)",marginTop:"6px"}}>
                    {uT("sg_pct_hint")}
                  </div>
                  <div style={{marginTop:"8px",display:"flex",gap:"6px",flexWrap:"wrap"}}>
                    {[{l:"100%",v:100},{l:"117%",v:117},{l:"125%",v:125},{l:"133%",v:133},{l:"140%",v:140},{l:"150%",v:150},{l:"175%",v:175}].map(p=>(
                      <button key={p.v} onClick={()=>setNewT({...newT,customMult:p.v})}
                        style={{padding:"5px 10px",borderRadius:"8px",cursor:"pointer",fontWeight:"700",fontSize:"12px",
                          background:newT.customMult===p.v?"#1e3a5f":"var(--bg2)",
                          color:newT.customMult===p.v?"#60a5fa":"var(--txt-d)",
                          border:`1px solid ${newT.customMult===p.v?"#60a5fa":"var(--divider)"}`}}>
                        {p.l}
                      </button>
                    ))}
                  </div>
                </>
              )}
            </div>
            <Field label={uT("sg_emoji")}>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                {["⭐","🔵","🟡","🔴","🟢","💜","🏃","🌟","⚡","🎯","💼","🔥","🌙","☀️","🌤️"].map(e=>(
                  <button key={e} onClick={()=>setNewT({...newT,emoji:e})} style={{padding:"8px",borderRadius:"8px",cursor:"pointer",border:newT.emoji===e?"2px solid #22c55e":"2px solid #1f2937",background:newT.emoji===e?"#052e16":"var(--bg2)",fontSize:"18px"}}>
                    {e}
                  </button>
                ))}
              </div>
            </Field>
            <Field label={uT("sg_color")}>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                {["#22c55e","#60a5fa","#f87171","#fbbf24","#a78bfa","#34d399","#fb923c","#e879f9","#38bdf8","#4ade80"].map(c=>(
                  <button key={c} onClick={()=>setNewT({...newT,color:c})} style={{width:"32px",height:"32px",borderRadius:"50%",cursor:"pointer",background:c,border:newT.color===c?"3px solid #fff":"3px solid transparent",outline:newT.color===c?"2px solid "+c:"none",outlineOffset:"2px"}}>
                  </button>
                ))}
              </div>
            </Field>
            {/* Preview */}
            {newT.name&&(
              <div style={{background:newT.color+"15",border:`1px solid ${newT.color}44`,borderRadius:"10px",padding:"10px 12px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"8px"}}>
                <span style={{fontSize:"18px"}}>{newT.emoji}</span>
                <div>
                  <div style={{fontWeight:"800",color:newT.color,fontSize:"13px"}}>{newT.name}</div>
                  {newT.start&&newT.end&&<div style={{fontSize:"11px",color:"var(--txt-d)"}}>{newT.start}–{newT.end}</div>}
                </div>
              </div>
            )}
            {tErr&&<div style={{color:"#f87171",fontSize:"12px",marginBottom:"8px"}}>⚠ {tErr}</div>}
            <Btn onClick={addT} color="#1e3a8a" textColor="#93c5fd" style={{fontSize:"14px"}}>{uT("sg_add_tpl")}</Btn>
          </div>
        </>
      )}

      {(sub==="pay"||sub==="ded")&&<Btn onClick={save} color={saved?"#15803d":"#22c55e"} textColor={saved?"#dcfce7":"#000"} style={{marginTop:"16px"}}>{saved?uT("sg_saved"):uT("sg_save")}</Btn>}

      {sub==="pay"&&onReset&&(
        <>
          {/* Theme selector */}
          {onSaveTheme&&(
            <div style={{...CARD,marginTop:"16px",background:"var(--bg2)",border:"1px solid #1f2937"}}>
              <div style={{fontSize:"12px",color:"var(--txt-d)",fontWeight:"700",marginBottom:"10px"}}>{uT("sg_theme")}</div>
              <div style={{display:"flex",gap:"8px"}}>
                {[{v:"dark",label:uT("sg_theme_dark")},{v:"light",label:uT("sg_theme_light")}].map(opt=>(
                  <button key={opt.v} onClick={()=>onSaveTheme(opt.v)}
                    style={{flex:1,padding:"10px",borderRadius:"12px",cursor:"pointer",fontWeight:"800",fontSize:"14px",
                      background:theme===opt.v?"#1e3a5f":"var(--card)",
                      color:theme===opt.v?"#60a5fa":"var(--txt-dd)",
                      border:`2px solid ${theme===opt.v?"#3b82f6":"var(--divider)"}`,
                      transition:"all 0.2s ease"}}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>
          )}
          {/* Privacy mode setting */}
          <div style={{...CARD,marginTop:"16px",background:"var(--bg2)",border:"1px solid #1f2937"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:"13px",fontWeight:"700",color:"var(--txt)"}}>
                  {privacyMode?"🙈":"👁"} {uT("sg_privacy")}
                </div>
                <div style={{fontSize:"11px",color:"var(--txt-dd)",marginTop:"2px"}}>
                  {uT("sg_privacy_h")}
                </div>
              </div>
              <Toggle on={privacyMode} onToggle={togglePrivacy}/>
            </div>
          </div>
          <button onClick={()=>{if(window.confirm(uT("sg_reset_c")))onReset();}}
            style={{width:"100%",padding:"12px",background:"none",border:"1px solid #1f2937",borderRadius:"12px",color:"var(--txt-dd)",fontSize:"13px",fontWeight:"700",cursor:"pointer",marginTop:"10px"}}>
            {uT("sg_reset")}
          </button>
        </>
      )}

      {sub==="vac"&&<VacationBalance shifts={shifts} vacCfg={vacCfg} onSaveVacCfg={onSaveVacCfg}/>}
    </div>
  );
}

// ════════════════════════════════════════
// ONBOARDING WIZARD
// ════════════════════════════════════════
function Onboarding({onDone,lang="he",setLang,theme="dark",setTheme}){
  const t=useT();
  const[step,setStep]=useState(0);
  const[form,setForm]=useState({...DEF_CFG});
  const[salary,setSalary]=useState(()=>Math.round(DEF_CFG.baseRate*190));
  const[niResult,setNiResult]=useState(null);
  const[animDir,setAnimDir]=useState("right");
  const[als,setAls]=useState([]);
  const[newAl,setNewAl]=useState({name:"",type:"per_shift",amount:""});
  const[alErr,setAlErr]=useState("");
  const contentRef=useRef(null);

  const STEPS=[
    {title:t("ob_s0t"),subtitle:t("ob_s0s")},
    {title:t("ob_s1t"),subtitle:t("ob_s1s")},
    {title:t("ob_s2_shifts_t"),subtitle:t("ob_s2_shifts_s")},
    {title:t("ob_s2t"),subtitle:t("ob_s2s")},
    {title:t("ob_s3t"),subtitle:t("ob_s3s")},
    {title:t("ob_s4t"),subtitle:t("ob_s4s")},
    {title:t("ob_s5t"),subtitle:t("ob_s5s")},
  ];

  const go=(dir)=>{
    setAnimDir(dir>0?"right":"left");
    setStep(s=>s+dir);
    setTimeout(()=>{if(contentRef.current)contentRef.current.scrollTop=0;},30);
  };

  const calcNI=()=>{
    const s=salary>0?salary:Math.round(form.baseRate*190);
    const r=calcNIRates(s);
    setNiResult(r);
    setForm(f=>({...f,
      bituachLeumi:Math.round(r.niPct*10)/10,
      masBriut:Math.round(r.healthPct*10)/10,
    }));
  };

  const addAl=()=>{
    if(!newAl.name.trim()){setAlErr("יש להזין שם");return;}
    const amt=parseFloat(newAl.amount);
    if(!amt||amt<=0){setAlErr("יש להזין סכום");return;}
    setAlErr("");
    setAls(a=>[...a,{...newAl,amount:amt,id:Date.now(),active:true}]);
    setNewAl({name:"",type:"per_shift",amount:""});
  };

  const finish=()=>{
    onDone(form,als);
  };

  const progress=step/(STEPS.length-1);

  return(
    <div dir={lang==="ru"?"ltr":"rtl"} style={{
      fontFamily:"'Heebo','Arial Hebrew',Arial,sans-serif",
      height:"100%",background:"var(--bg)",color:"var(--txt)",
      display:"flex",flexDirection:"column",maxWidth:"430px",margin:"0 auto",
    }}>
      {/* Header */}
      <div style={{padding:"env(safe-area-inset-top,28px) 20px 0",background:"var(--bg)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
          <div style={{fontSize:"17px",fontWeight:"900",color:"var(--txt-hi)"}}>שעתי ⏱</div>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            {step>0&&step<STEPS.length-1&&(
            <button onClick={finish} style={{background:"none",border:"none",color:"var(--txt-dd)",fontSize:"12px",cursor:"pointer",fontWeight:"700"}}>
              {t("ob_skip")}
            </button>
            )}
          </div>
        </div>
        {/* Progress bar */}
        <div style={{height:"4px",background:"var(--divider)",borderRadius:"2px",marginBottom:"20px"}}>
          <div style={{height:"100%",width:`${progress*100}%`,background:"linear-gradient(90deg,#22c55e,#4ade80)",borderRadius:"2px",transition:"width 0.4s ease"}}/>
        </div>
        {/* Steps dots */}
        <div style={{display:"flex",justifyContent:"center",gap:"8px",marginBottom:"24px"}}>
          {STEPS.map((_,i)=>(
            <div key={i} style={{width:i===step?20:8,height:"8px",borderRadius:"4px",background:i<=step?"#22c55e":"var(--divider)",transition:"all 0.3s ease"}}/>
          ))}
        </div>
      </div>

      {/* Content */}
      <div ref={contentRef} style={{flex:1,padding:"0 20px",overflowY:"auto"}}>
        <div style={{animation:`${animDir==="right"?"slideInRight":"slideInLeft"} 0.25s ease-out`}}>
          <div style={{marginBottom:"24px"}}>
            <div style={{fontSize:"22px",fontWeight:"900",color:"var(--txt-hi)",marginBottom:"6px"}}>{STEPS[step].title}</div>
            <div style={{fontSize:"13px",color:"var(--txt-d)"}}>{STEPS[step].subtitle}</div>
          </div>

          {/* ── Step 0: Welcome ── */}
          {step===0&&(
            <div>
              {/* Language selector */}
              {setLang&&(
                <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
                  {[{v:"he",label:"🇮🇱 עברית"},{v:"ru",label:"🇷🇺 Русский"}].map(opt=>(
                    <button key={opt.v} onClick={()=>setLang(opt.v)}
                      style={{flex:1,padding:"10px",borderRadius:"12px",cursor:"pointer",fontWeight:"800",fontSize:"14px",
                        background:lang===opt.v?"#052e16":"var(--card)",
                        color:lang===opt.v?"#4ade80":"var(--txt-dd)",
                        border:`2px solid ${lang===opt.v?"#22c55e":"var(--divider)"}`,
                        transition:"all 0.2s ease"}}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              )}
              {/* Theme selector */}
              {setTheme&&(
                <div style={{display:"flex",gap:"8px",marginBottom:"20px"}}>
                  {[{v:"dark",label:t("sg_theme_dark")},{v:"light",label:t("sg_theme_light")}].map(opt=>(
                    <button key={opt.v} onClick={()=>setTheme(opt.v)}
                      style={{flex:1,padding:"10px",borderRadius:"12px",cursor:"pointer",fontWeight:"800",fontSize:"14px",
                        background:theme===opt.v?"#1e3a5f":"var(--card)",
                        color:theme===opt.v?"#60a5fa":"var(--txt-dd)",
                        border:`2px solid ${theme===opt.v?"#3b82f6":"var(--divider)"}`,
                        transition:"all 0.2s ease"}}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              )}
              <div style={{background:"linear-gradient(145deg,#052e16,#14532d)",border:"1px solid #166534",borderRadius:"20px",padding:"24px",textAlign:"center",marginBottom:"24px"}}>
                <div style={{fontSize:"56px",marginBottom:"12px",animation:"spinShekel 3s linear infinite",display:"inline-block"}}>₪</div>
                <div style={{fontSize:"16px",fontWeight:"800",color:"#4ade80",marginBottom:"8px"}}>{t("ob_tagline")}</div>
                <div style={{fontSize:"13px",color:"#86efac88",lineHeight:"1.7",whiteSpace:"pre-line"}}>{t("ob_feat_desc")}</div>
              </div>
              {[
                {icon:"⏱",t:t("ob_f0t"),s:t("ob_f0s")},
                {icon:"📊",t:t("ob_f1t"),s:t("ob_f1s")},
                {icon:"🏦",t:t("ob_f2t"),s:t("ob_f2s")},
              ].map((f,i)=>(
                <div key={i} style={{display:"flex",gap:"14px",alignItems:"center",padding:"14px",background:"var(--card)",borderRadius:"14px",marginBottom:"10px",border:"1px solid #1f2937"}}>
                  <div style={{fontSize:"28px",flexShrink:0}}>{f.icon}</div>
                  <div><div style={{fontWeight:"700",color:"var(--txt)",fontSize:"14px"}}>{f.t}</div><div style={{fontSize:"12px",color:"var(--txt-d)",marginTop:"2px"}}>{f.s}</div></div>
                </div>
              ))}
            </div>
          )}

          {/* ── Step 1: Base pay ── */}
          {step===1&&(
            <div>
              <div style={{...CARD,marginBottom:"16px"}}>
                <div style={{fontSize:"12px",color:"var(--txt-d)",marginBottom:"16px",lineHeight:"1.6",background:"var(--bg2)",borderRadius:"10px",padding:"12px",border:"1px solid #1f2937"}}>
                  💡 את/ה יכול/ה למצוא את הנתונים האלה בתלוש השכר שלך או בחוזה העבודה. אם לא בטוח/ה — השאר את ברירת המחדל ותוכל לשנות מאוחר יותר.
                </div>
                <Field label="שכר בסיס לשעה (₪)" hint="לפי חוזה/תלוש">
                  <NumInput value={form.baseRate} onChange={v=>setForm(f=>({...f,baseRate:v}))} step={0.01} min={0}/>
                </Field>
                <div style={{fontSize:"11px",color:"var(--txt-dd)",marginBottom:"16px",marginTop:"-8px"}}>
                  שכר מינימום 2025: ₪32.30/שעה
                </div>
                <Field label="שעות עבודה ביום רגיל" hint="ברירת מחדל: 8.6 שעות (לפי חוק)">
                  <NumInput value={form.overtimeThreshold} onChange={v=>setForm(f=>({...f,overtimeThreshold:v}))} step={0.1} min={1}/>
                </Field>
                <div style={{fontSize:"11px",color:"var(--txt-dd)",marginBottom:"16px",marginTop:"-8px"}}>
                  שעות מעל מספר זה יחושבו כשעות נוספות
                </div>
                <div style={{background:"#0c1a3e",border:"1px solid #1e3a8a",borderRadius:"10px",padding:"12px",marginTop:"4px"}}>
                  <div style={{fontSize:"11px",color:"#93c5fd",fontWeight:"700",marginBottom:"8px"}}>📋 אחוזי שעות נוספות (לפי חוק)</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                    <div>
                      <div style={{fontSize:"10px",color:"#93c5fd",marginBottom:"6px"}}>2 שעות ראשונות</div>
                      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                        <NumInput value={form.overtime125Pct||125} onChange={v=>setForm(f=>({...f,overtime125Pct:v}))} step={5} min={100} max={200} style={{fontSize:"14px",padding:"8px 10px"}}/>
                        <span style={{color:"#93c5fd",fontWeight:"700"}}>%</span>
                      </div>
                    </div>
                    <div>
                      <div style={{fontSize:"10px",color:"#93c5fd",marginBottom:"6px"}}>משעה 3 ואילך</div>
                      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                        <NumInput value={form.overtime150Pct||150} onChange={v=>setForm(f=>({...f,overtime150Pct:v}))} step={5} min={100} max={200} style={{fontSize:"14px",padding:"8px 10px"}}/>
                        <span style={{color:"#93c5fd",fontWeight:"700"}}>%</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── Step 2: Shifts ── */}
          {step===2&&(
            <div>
              <div style={{fontSize:"11px",color:"var(--txt-dd)",marginBottom:"14px"}}>{t("sg_sh_times_hint")}</div>
              {[
                {key:"morning",  labelKey:"sg_sh_morning",  enabledK:"morningEnabled",  startK:"morningStart",  multK:"morningMult",  knownK:"morningMultKnown",  defMult:100},
                {key:"afternoon",labelKey:"sg_sh_afternoon",enabledK:"afternoonEnabled",startK:"afternoonStart",multK:"afternoonMult",knownK:"afternoonMultKnown",defMult:117},
                {key:"night",    labelKey:"sg_sh_night",    enabledK:"nightEnabled",    startK:"nightStart",    multK:"nightMult",    knownK:"nightMultKnown",    defMult:140},
              ].map(s=>(
                <div key={s.key} style={{...CARD,marginBottom:"12px",opacity:form[s.enabledK]===false?0.5:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                    <div style={{fontSize:"14px",fontWeight:"800",color:"var(--txt)"}}>{t(s.labelKey)}</div>
                    <Toggle on={form[s.enabledK]!==false} onToggle={()=>setForm(f=>({...f,[s.enabledK]:f[s.enabledK]===false}))}/>
                  </div>
                  {form[s.enabledK]!==false&&(
                    <>
                      <div style={{fontSize:"11px",color:"var(--txt-d)",fontWeight:"700",marginBottom:"6px"}}>{t("sg_sh_from")}</div>
                      <input type="time" value={form[s.startK]||"06:00"} onChange={e=>setForm(f=>({...f,[s.startK]:e.target.value}))} style={{...SI,marginBottom:"12px"}}/>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
                        <div style={{fontSize:"11px",color:"var(--txt-d)",fontWeight:"700"}}>{t("sg_sh_pct")}</div>
                        <button onClick={()=>setForm(f=>({...f,[s.knownK]:f[s.knownK]===false?true:false}))}
                          style={{background:form[s.knownK]===false?"#052e16":"var(--divider)",border:`1.5px solid ${form[s.knownK]===false?"#22c55e":"var(--divider2)"}`,color:form[s.knownK]===false?"#22c55e":"var(--txt-d)",borderRadius:"16px",padding:"3px 10px",cursor:"pointer",fontWeight:"700",fontSize:"11px"}}>
                          {form[s.knownK]===false?t("sg_sh_legal"):t("sg_sh_known")}
                        </button>
                      </div>
                      {form[s.knownK]===false?(
                        <div style={{fontSize:"12px",color:"var(--txt-dd)",background:"var(--bg2)",borderRadius:"8px",padding:"8px"}}>
                          {t("sg_sh_unknown")} ({s.defMult}%)
                        </div>
                      ):(
                        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                          <NumInput value={form[s.multK]??s.defMult} onChange={v=>setForm(f=>({...f,[s.multK]:v}))} step={1} min={100} max={300}/>
                          <span style={{color:"var(--txt)",fontWeight:"800",fontSize:"16px"}}>%</span>
                        </div>
                      )}
                      <div style={{fontSize:"10px",color:"var(--txt-dd)",marginTop:"4px"}}>{t("sg_sh_pct_hint")}</div>
                    </>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* ── Step 3: Tax & NI ── */}
          {step===3&&(
            <div>
              {/* Auto NI calculator */}
              <div style={{...CARD,background:"#0a1628",border:"1px solid #1e3a5f",marginBottom:"14px"}}>
                <div style={{fontSize:"13px",fontWeight:"700",color:"#60a5fa",marginBottom:"4px"}}>🧮 חשב לי ביטוח לאומי ומס בריאות</div>
                <div style={{fontSize:"11px",color:"var(--txt-dd)",marginBottom:"12px"}}>הזן שכר ברוטו חודשי ממוצע — האחוז משתנה לפי גובה השכר</div>
                <Field label="שכר ברוטו חודשי משוער (₪)">
                  <NumInput value={salary} onChange={v=>setSalary(v>0?v:0)} step={100}/>
                </Field>
                <button onClick={calcNI} style={{width:"100%",padding:"11px",background:"#1e3a8a",border:"none",borderRadius:"10px",color:"#93c5fd",fontWeight:"800",fontSize:"14px",cursor:"pointer",marginBottom:niResult?"12px":"0"}}>
                  חשב אוטומטית
                </button>
                {niResult&&(
                  <div style={{background:"var(--bg2)",borderRadius:"10px",padding:"12px",marginTop:"4px"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                      <div style={{background:"#0c1a3e",borderRadius:"8px",padding:"10px",textAlign:"center"}}>
                        <div style={{fontSize:"10px",color:"#93c5fd",marginBottom:"4px"}}>ביטוח לאומי</div>
                        <div style={{fontSize:"20px",fontWeight:"900",color:"#60a5fa"}}>{niResult.niPct}%</div>
                      </div>
                      <div style={{background:"#1a0c3e",borderRadius:"8px",padding:"10px",textAlign:"center"}}>
                        <div style={{fontSize:"10px",color:"#c4b5fd",marginBottom:"4px"}}>מס בריאות</div>
                        <div style={{fontSize:"20px",fontWeight:"900",color:"#a78bfa"}}>{niResult.healthPct}%</div>
                      </div>
                    </div>
                    <div style={{fontSize:"10px",color:"#22c55e",textAlign:"center",marginTop:"8px",fontWeight:"700"}}>✓ עודכן אוטומטית</div>
                  </div>
                )}
              </div>

              <div style={CARD}>
                <div style={{fontSize:"12px",color:"var(--txt-d)",fontWeight:"700",marginBottom:"12px"}}>עריכה ידנית</div>
                <Field label="מס הכנסה (%)" hint="בדוק בתלוש שלך">
                  <NumInput value={form.taxRate} onChange={v=>setForm(f=>({...f,taxRate:v}))} step={0.1} min={0} max={50}/>
                </Field>
                <Field label="ביטוח לאומי (%)">
                  <NumInput value={form.bituachLeumi} onChange={v=>setForm(f=>({...f,bituachLeumi:v}))} step={0.1} min={0}/>
                </Field>
                <Field label="מס בריאות (%)">
                  <NumInput value={form.masBriut} onChange={v=>setForm(f=>({...f,masBriut:v}))} step={0.1} min={0}/>
                </Field>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--bg2)",borderRadius:"10px",padding:"12px",marginTop:"4px"}}>
                  <div>
                    <div style={{fontSize:"13px",fontWeight:"700",color:"var(--txt)"}}>הפעל חישוב ניכויים</div>
                    <div style={{fontSize:"11px",color:"var(--txt-d)",marginTop:"2px"}}>הצג שכר נטו בדשבורד</div>
                  </div>
                  <Toggle on={form.enableDeductions} onToggle={()=>setForm(f=>({...f,enableDeductions:!f.enableDeductions}))}/>
                </div>
              </div>
            </div>
          )}

          {/* ── Step 4: Pension & Keren ── */}
          {step===4&&(
            <div>
              <div style={{...CARD,marginBottom:"14px",background:"#0c1a3e",border:"1px solid #1e3a8a"}}>
                <div style={{fontSize:"11px",color:"#93c5fd",fontWeight:"700",marginBottom:"8px"}}>💡 חשוב לדעת</div>
                <div style={{fontSize:"11px",color:"var(--txt-dd)",lineHeight:"1.7"}}>
                  פנסיה וקרן השתלמות מחושבות <span style={{color:"#93c5fd",fontWeight:"700"}}>רק על שכר הבסיס</span> — ללא שעות נוספות ותוספות. כך לפי חוק.
                </div>
              </div>

              <div style={CARD}>
                <div style={{fontSize:"12px",color:"var(--txt-d)",fontWeight:"700",marginBottom:"14px"}}>🏦 פנסיה</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}}>
                  <Field label="עובד (%)">
                    <NumInput value={form.pensionEmployee} onChange={v=>setForm(f=>({...f,pensionEmployee:v}))} step={0.5} min={0}/>
                  </Field>
                  <Field label="מעסיק (%)">
                    <NumInput value={form.pensionEmployer} onChange={v=>setForm(f=>({...f,pensionEmployer:v}))} step={0.5} min={0}/>
                  </Field>
                </div>
                <div style={{height:"1px",background:"var(--divider)",margin:"4px 0 14px"}}/>
                <div style={{fontSize:"12px",color:"var(--txt-d)",fontWeight:"700",marginBottom:"14px"}}>📈 קרן השתלמות</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                  <Field label="עובד (%)">
                    <NumInput value={form.kerenEmployee} onChange={v=>setForm(f=>({...f,kerenEmployee:v}))} step={0.5} min={0}/>
                  </Field>
                  <Field label="מעסיק (%)">
                    <NumInput value={form.kerenEmployer} onChange={v=>setForm(f=>({...f,kerenEmployer:v}))} step={0.5} min={0}/>
                  </Field>
                </div>
                <div style={{background:"var(--bg2)",borderRadius:"10px",padding:"10px",marginTop:"12px"}}>
                  <div style={{fontSize:"11px",color:"var(--txt-d)",lineHeight:"1.6"}}>
                    📋 מינימום חוקי לפנסיה: עובד 6%, מעסיק 6.5%<br/>
                    📋 קרן השתלמות: עובד 2.5%, מעסיק 7.5%
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── Step 5: Allowances ── */}
          {step===5&&(
            <div>
              <div style={{...CARD,marginBottom:"12px",background:"#0d1f12",border:"1px solid #14532d"}}>
                <div style={{fontSize:"11px",color:"#4ade80",fontWeight:"700",marginBottom:"6px"}}>💡 מה זה תוספות?</div>
                <div style={{fontSize:"11px",color:"var(--txt-dd)",lineHeight:"1.7"}}>
                  סכומים קבועים שמתווספים לכל משמרת — למשל דמי נסיעות או כלכלה. אם אין לך — לחץ הבא.
                </div>
              </div>

              {/* Existing allowances */}
              {als.length>0&&(
                <div style={{marginBottom:"12px"}}>
                  {als.map(a=>(
                    <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",...CARD,marginBottom:"8px"}}>
                      <div>
                        <div style={{fontSize:"13px",fontWeight:"700",color:"var(--txt)"}}>{a.name}</div>
                        <div style={{fontSize:"11px",color:"var(--txt-d)"}}>{a.type==="per_shift"?"לכל משמרת":"חודשי"} · ₪{a.amount}</div>
                      </div>
                      <button onClick={()=>setAls(x=>x.filter(x=>x.id!==a.id))} style={{background:"#2d0505",border:"none",color:"#f87171",borderRadius:"8px",padding:"6px 10px",cursor:"pointer",fontSize:"12px"}}>הסר</button>
                    </div>
                  ))}
                </div>
              )}

              {/* Add new allowance */}
              <div style={CARD}>
                <div style={{fontSize:"12px",color:"var(--txt-d)",fontWeight:"700",marginBottom:"12px"}}>➕ הוסף תוספת</div>
                <Field label="שם התוספת">
                  <input type="text" value={newAl.name} onChange={e=>setNewAl(a=>({...a,name:e.target.value}))} placeholder="נסיעות, כלכלה, אחר..." style={SI}/>
                </Field>
                <Field label="סוג">
                  <select value={newAl.type} onChange={e=>setNewAl(a=>({...a,type:e.target.value}))} style={SI}>
                    <option value="per_shift">לכל משמרת</option>
                    <option value="per_month">חודשי (קבוע)</option>
                  </select>
                </Field>
                <Field label="סכום (₪)">
                  <NumInput value={parseFloat(newAl.amount)||0} onChange={v=>setNewAl(a=>({...a,amount:String(v)}))} step={1} min={0}/>
                </Field>
                {alErr&&<div style={{color:"#f87171",fontSize:"12px",marginBottom:"8px"}}>⚠ {alErr}</div>}
                <Btn onClick={addAl} color="#052e16" textColor="#4ade80" style={{border:"1px solid #166534",fontSize:"13px"}}>+ הוסף תוספת</Btn>
              </div>
            </div>
          )}

          {/* ── Step 6: Done ── */}
          {step===6&&(
            <div>
              <div style={{textAlign:"center",marginBottom:"28px"}}>
                <div style={{fontSize:"64px",marginBottom:"12px"}}>🎉</div>
                <div style={{fontSize:"18px",fontWeight:"900",color:"#4ade80",marginBottom:"8px"}}>{t("ob_ready")}</div>
                <div style={{fontSize:"13px",color:"var(--txt-d)"}}>{t("ob_saved")}</div>
              </div>

              <div style={{...CARD,marginBottom:"14px"}}>
                <div style={{fontSize:"12px",color:"var(--txt-d)",fontWeight:"700",marginBottom:"12px"}}>{t("ob_summary")}</div>
                {[
                  {l:"שכר בסיס",v:`₪${form.baseRate}/שעה`},
                  {l:"שעות עבודה ביום רגיל",v:`${form.overtimeThreshold} שעות`},
                  {l:"מס הכנסה",v:`${form.taxRate}%`},
                  {l:"ביטוח לאומי",v:`${form.bituachLeumi}%`},
                  {l:"מס בריאות",v:`${form.masBriut}%`},
                  {l:"פנסיה עובד/מעסיק",v:`${form.pensionEmployee}%/${form.pensionEmployer}%`},
                  {l:"קרן השתלמות עובד/מעסיק",v:`${form.kerenEmployee}%/${form.kerenEmployer}%`},
                  {l:"תוספות",v:als.length>0?als.map(a=>a.name).join(", "):"ללא"},
                ].map((r,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<7?"1px solid #1f2937":"none"}}>
                    <span style={{fontSize:"12px",color:"var(--txt-m)"}}>{r.l}</span>
                    <span style={{fontSize:"12px",fontWeight:"700",color:i===7&&als.length>0?"#4ade80":"var(--txt)"}}>{r.v}</span>
                  </div>
                ))}
              </div>

              <div style={{fontSize:"11px",color:"var(--txt-dd)",textAlign:"center",marginBottom:"20px"}}>
                {t("ob_settings_hint")}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Footer buttons */}
      <div style={{padding:"16px 20px",paddingBottom:"env(safe-area-inset-bottom,20px)",background:"var(--bg)",borderTop:"1px solid #1f2937",display:"flex",gap:"10px"}}>
        {step>0&&step<STEPS.length-1&&(
          <button onClick={()=>go(-1)} style={{flex:"0 0 auto",padding:"14px 18px",background:"var(--divider)",border:"none",borderRadius:"12px",color:"var(--txt-m)",fontSize:"15px",fontWeight:"800",cursor:"pointer"}}>
            {t("ob_back")}
          </button>
        )}
        {step<STEPS.length-1&&(
          <button onClick={()=>go(1)} style={{flex:1,padding:"14px",background:"#22c55e",border:"none",borderRadius:"12px",color:"#000",fontSize:"15px",fontWeight:"800",cursor:"pointer"}}>
            {step===0?t("ob_start"):t("ob_next")}
          </button>
        )}
        {step===STEPS.length-1&&(
          <button onClick={finish} style={{flex:1,padding:"14px",background:"#22c55e",border:"none",borderRadius:"12px",color:"#000",fontSize:"16px",fontWeight:"900",cursor:"pointer",animation:"glowPulse 2s ease-in-out infinite"}}>
            {t("ob_enter")}
          </button>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════
function App(){
  const[tab,setTab]=useState("clock");
  const[prevTab,setPrevTab]=useState("clock");
  const[tabKey,setTabKey]=useState(0);
  const[nightMode,setNightMode]=useState(isNightTime);

  const[toast,setToast]=useState(null);
  const scrollRef=useRef(null);

  const showToast=(msg,color="#22c55e")=>{
    setToast({msg,color});
    setTimeout(()=>setToast(null),2500);
  };

  const scrollTop=()=>{if(scrollRef.current)scrollRef.current.scrollTop=0;};

  const switchTab=(t)=>{setPrevTab(tab);setTab(t);setTabKey(k=>k+1);scrollTop();};

  useEffect(()=>{
    const id=setInterval(()=>setNightMode(isNightTime()),60000);
    return()=>clearInterval(id);
  },[]);
  const[shifts,setShifts]=useState([]);
  const[cfg,setCfg]=useState(DEF_CFG);
  const[tpls,setTpls]=useState([]);
  const[als,setAls]=useState(DEF_ALS);
  const[vacCfg,setVacCfg]=useState(DEF_VAC);
  const[clockIn,setClockInState]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[onboarded,setOnboarded]=useState(false);
  const[privacyMode,setPrivacyMode]=useState(false);
  const[lang,setLang]=useState("he");
  const[theme,setTheme]=useState("dark");
  const[selM,setSelM]=useState(()=>tdy().substring(0,7));

  useEffect(()=>{
    const s=LS.get(K.shifts);if(s)setShifts(s);
    const c=LS.get(K.cfg);if(c)setCfg({...DEF_CFG,...c});
    const t=LS.get(K.tpls);if(t)setTpls(t);
    const a=LS.get(K.als);if(a)setAls(a);
    const v=LS.get(K.vac);if(v)setVacCfg({...DEF_VAC,...v});
    const ci=LS.get(K.clockin);if(ci)setClockInState(ci);
    const ob=LS.get(K.onboarded);if(ob)setOnboarded(true);
    const pr=LS.get(K.privacy);if(pr)setPrivacyMode(true);
    const ln=LS.get(K.lang);if(ln)setLang(ln);
    const th=LS.get(K.theme);if(th){setTheme(th);document.documentElement.dataset.theme=th;}
    setLoaded(true);
  },[]);

  const saveTheme=t=>{setTheme(t);LS.set(K.theme,t);document.documentElement.dataset.theme=t;};
  const saveLang=l=>{setLang(l);LS.set(K.lang,l);};
  const togglePrivacy=()=>{
    const next=!privacyMode;
    setPrivacyMode(next);
    LS.set(K.privacy,next?true:null);
  };

  const setClockIn=(v)=>{setClockInState(v);LS.set(K.clockin,v);};
  const saveSh=useCallback(ns=>{setShifts(ns);LS.set(K.shifts,ns);},[]);
  const saveCfg=useCallback(ns=>{setCfg(ns);LS.set(K.cfg,ns);},[]);
  const saveTpls=useCallback(ns=>{setTpls(ns);LS.set(K.tpls,ns);},[]);
  const saveAls=useCallback(ns=>{setAls(ns);LS.set(K.als,ns);},[]);
  const saveVacCfg=useCallback(ns=>{setVacCfg(ns);LS.set(K.vac,ns);},[]);
  const addSh=useCallback(s=>{
    // לא לשמור משמרת עבודה קצרה מ-3 דקות (0.05 שעות)
    if(!isSpecialDay(s.type)&&ch(s.start,s.end)<0.05)return;
    saveSh([...shifts,s]);
  },[shifts,saveSh]);
  const delSh=useCallback(id=>saveSh(shifts.filter(s=>s.id!==id)),[shifts,saveSh]);
  const editSh=useCallback(s=>saveSh(shifts.map(x=>x.id===s.id?s:x)),[shifts,saveSh]);

  const finishOnboarding=(newCfg,newAls)=>{
    saveCfg(newCfg);
    if(newAls&&newAls.length>0) saveAls(newAls);
    LS.set(K.onboarded,true);
    setOnboarded(true);
  };

  const appT=k=>TR[lang]?.[k]??TR.he[k]??k;

  const tabs=[
    {id:"clock",    icon:clockIn?"🔴":"🟢", label:clockIn?appT("tab_active"):appT("tab_clock")},
    {id:"dashboard",icon:"📊",label:appT("tab_dash")},
    {id:"add",      icon:"➕",label:appT("tab_add")},
    {id:"shifts",   icon:"📋",label:appT("tab_shifts")},
    {id:"savings",  icon:"💰",label:appT("tab_save")},
    {id:"graph",    icon:"📈",label:appT("tab_graph")},
    {id:"settings", icon:"⚙️",label:appT("tab_cfg")},
  ];

  if(!loaded)return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"16px"}}>
      <div style={{fontSize:"52px",animation:"spinShekel 1.2s linear infinite",display:"inline-block"}}>₪</div>
      <div style={{color:"#4ade80",fontSize:"16px",fontWeight:"700",animation:"blink 1.2s ease-in-out infinite"}}>שעתי טוען...</div>
    </div>
  );

  if(!onboarded)return <LangCtx.Provider value={lang}><Onboarding onDone={finishOnboarding} lang={lang} setLang={saveLang} theme={theme} setTheme={saveTheme}/></LangCtx.Provider>;

  return(
  <LangCtx.Provider value={lang}>
    <div dir="rtl" style={{fontFamily:"'Heebo','Arial Hebrew',sans-serif",minWidth:"100%",maxWidth:"430px",margin:"0 auto",height:"100%",display:"flex",flexDirection:"column",background:"var(--bg)",color:"var(--txt)",filter:nightMode?"brightness(0.82) saturate(0.9)":"none",transition:"filter 1s ease",position:"relative"}}>

      {/* Toast notification */}
      {toast&&(
        <div style={{
          position:"absolute",top:"env(safe-area-inset-top,28px)",left:"50%",transform:"translateX(-50%)",
          zIndex:999,background:toast.color,borderRadius:"12px",padding:"10px 20px",
          fontSize:"13px",fontWeight:"800",color:"#000",whiteSpace:"nowrap",
          boxShadow:`0 4px 20px ${toast.color}66`,
          animation:"slideInUp 0.25s ease-out",
        }}>{toast.msg}</div>
      )}

      {/* Header - sticky at top */}
      <div style={{paddingTop:"env(safe-area-inset-top, 28px)",background:"var(--bg)",borderBottom:"1px solid #1f2937",flexShrink:0,zIndex:10,position:"relative"}}>
        <div style={{padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontSize:"17px",fontWeight:"900",color:"var(--txt-hi)"}}>שעתי ⏱</div>
        <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
          {/* Language toggle */}
          <button onClick={()=>saveLang(lang==="he"?"ru":"he")} style={{
            background:"#052e16",border:"1px solid #22c55e",
            borderRadius:"8px",padding:"4px 12px",
            fontSize:"12px",fontWeight:"800",cursor:"pointer",color:"#4ade80",
          }}>
            {lang==="he"?"RU 🇷🇺":"HE 🇮🇱"}
          </button>
          {/* Privacy toggle */}
          <button onClick={togglePrivacy} style={{
            background:privacyMode?"#2d1f00":"var(--divider)",
            border:`1px solid ${privacyMode?"#f59e0b":"var(--divider2)"}`,
            borderRadius:"8px",padding:"3px 10px",
            fontSize:"14px",cursor:"pointer",
            transition:"all 0.2s ease",
          }} title={privacyMode?"הצג סכומים":"הסתר סכומים"}>
            {privacyMode?"🙈":"👁"}
          </button>
          {clockIn&&<div style={{background:"#2d0505",border:"1px solid #ef4444",borderRadius:"8px",padding:"3px 10px",fontSize:"11px",color:"#f87171",fontWeight:"700",display:"flex",alignItems:"center",gap:"4px"}}>
            <span style={{animation:"blink 1s ease-in-out infinite"}}>●</span>
            <span style={{animation:"blink 1s ease-in-out infinite",animationDelay:"0.33s"}}>●</span>
            <span style={{animation:"blink 1s ease-in-out infinite",animationDelay:"0.66s"}}>●</span>
            <span>{appT("hdr_active")}</span>
          </div>}
          <div style={{background:"#052e16",border:"1px solid #166534",borderRadius:"8px",padding:"3px 10px",fontSize:"11px",color:"#4ade80",fontWeight:"700"}}>
            {shifts.filter(s=>s.date.startsWith(tdy().substring(0,7))&&!isSpecialDay(s.type)).length} {appT("hdr_month_shifts")}
          </div>
        </div>
        </div>
      </div>

      {/* Privacy mode banner */}
      {privacyMode&&(
        <div style={{
          background:"#2d1f00",borderBottom:"1px solid #f59e0b44",
          padding:"5px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",
          flexShrink:0,
        }}>
          <div style={{fontSize:"11px",color:"#f59e0b",fontWeight:"700"}}>🙈 {appT("hdr_privacy_on")}</div>
          <button onClick={togglePrivacy} style={{background:"none",border:"none",color:"#f59e0b",fontSize:"11px",cursor:"pointer",fontWeight:"700",padding:"0"}}>
            {appT("hdr_show")} 👁
          </button>
        </div>
      )}

      {/* Scrollable content */}
      <div ref={scrollRef} style={{flex:1,overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch",minHeight:0}}>
        <div key={tabKey} className={slideClass(prevTab,tab)} style={{width:"100%"}}>
          {tab==="clock"    &&<ClockScreen clockIn={clockIn} setClockIn={setClockIn} als={als} cfg={cfg} onShiftSaved={s=>{addSh(s);showToast("✓ המשמרת נשמרה!");}} privacyMode={privacyMode} togglePrivacy={togglePrivacy}/>}
          {tab==="dashboard"&&<Dashboard shifts={shifts} cfg={cfg} als={als} selM={selM} setSelM={setSelM} privacyMode={privacyMode}/>}
          {tab==="add"      &&<AddShift cfg={cfg} tpls={tpls} als={als} shifts={shifts} onAdd={s=>{addSh(s);showToast("✓ המשמרת נשמרה!");scrollTop();}} onEdit={editSh} onDelete={delSh} privacyMode={privacyMode}/>}
          {tab==="shifts"   &&<ShiftsList shifts={shifts} cfg={cfg} als={als} onDelete={delSh} onEdit={editSh} privacyMode={privacyMode}/>}
          {tab==="savings"  &&<Savings shifts={shifts} cfg={cfg} privacyMode={privacyMode}/>}
          {tab==="graph"    &&<Graph shifts={shifts} cfg={cfg} als={als} privacyMode={privacyMode}/>}
          {tab==="settings" &&<Settings cfg={cfg} tpls={tpls} als={als} shifts={shifts} vacCfg={vacCfg} onSaveCfg={saveCfg} onSaveTpls={saveTpls} onSaveAls={saveAls} onSaveVacCfg={saveVacCfg} privacyMode={privacyMode} togglePrivacy={togglePrivacy} onReset={()=>{LS.set(K.onboarded,false);setOnboarded(false);}} lang={lang} onSaveLang={saveLang} theme={theme} onSaveTheme={saveTheme}/>}
        </div>
        {/* Watermark — inside scroll, above nav padding */}
        <div style={{textAlign:"center",padding:"12px 0 4px",fontSize:"10px",color:"var(--divider)",letterSpacing:"0.5px"}}>
          made by illouzman
        </div>
      </div>

      {/* Bottom nav — sliding pill indicator */}
      <div style={{flexShrink:0,background:"var(--bg2)",borderTop:"1px solid #1f2937",zIndex:20,paddingBottom:"env(safe-area-inset-bottom, 4px)"}}>
        <div style={{display:"flex",width:"100%",position:"relative",padding:"4px"}}>
          {/* Sliding pill */}
          <div style={{
            position:"absolute",
            top:"4px",bottom:"4px",
            right:`calc(${tabs.findIndex(t=>t.id===tab)}*${100/tabs.length}% + 4px)`,
            width:`calc(${100/tabs.length}% - 8px)`,
            background:"#052e16",
            border:"1px solid #166534",
            borderRadius:"10px",
            transition:"right 0.25s cubic-bezier(0.4,0,0.2,1)",
            pointerEvents:"none",
            zIndex:0,
          }}/>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>switchTab(t.id)} style={{
              flex:1,padding:"7px 2px 9px",background:"none",border:"none",
              cursor:"pointer",color:tab===t.id?"#4ade80":"var(--txt-dd)",
              position:"relative",zIndex:1,
              transition:"color 0.2s ease",
            }}>
              <div style={{fontSize:"18px"}}>{t.icon}</div>
              <div style={{fontSize:"9px",fontWeight:tab===t.id?"800":"500",marginTop:"3px",letterSpacing:"-0.2px"}}>{t.label}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  </LangCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
