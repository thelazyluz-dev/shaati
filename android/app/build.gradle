plugins {
    id 'com.android.application'
}

android {
    namespace 'dev.thelazyluz.shaati'
    compileSdk 34

    defaultConfig {
        applicationId "dev.thelazyluz.shaati"
        minSdk 23
        targetSdk 34
        versionCode Integer.parseInt(System.getenv("VERSION_CODE") ?: "1")
        versionName System.getenv("VERSION_NAME") ?: "2.0"
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("KEYSTORE_FILE") ?: "unused.jks")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
            keyAlias "shaati"
            keyPassword System.getenv("KEYSTORE_PASSWORD") ?: ""
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
